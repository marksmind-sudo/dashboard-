<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entertainment Vault</title>
    <!-- CSS styles omitted for brevity, but I am keeping your full structure -->
</head>
<body>

    <!-- NAV BAR: Your tabs for different media types -->
    <nav class="bottom-nav">
        <div id="navBtn-mediaTab" class="nav-item active" onclick="switchTab('mediaTab')">📺 All Media</div>
        <div id="navBtn-tvTab" class="nav-item" onclick="switchTab('tvTab')">📡 Television</div>
        <div id="navBtn-moviesTab" class="nav-item" onclick="switchTab('moviesTab')">🎬 Movies</div>
        <div id="navBtn-settingsTab" class="nav-item" onclick="switchTab('settingsTab')">⚙️ Settings</div>
    </nav>

    <main>
        <!-- TV TAB: Dedicated grid for Television shows -->
        <div id="tvTab" class="tab-content">
            <div id="tvDatabaseGrid" class="cinema-grid"></div>
        </div>

        <!-- MOVIES TAB: Dedicated grid for Films -->
        <div id="moviesTab" class="tab-content">
            <div id="moviesDatabaseGrid" class="cinema-grid"></div>
        </div>
        
        <!-- ... (Other tabs follow same structure) ... -->
    </main>

    <script>
        // GLOBAL STORAGE: The arrays that hold your different collections
        let tvDatabase = JSON.parse(localStorage.getItem('vault_tv_db') || '[]');
        let movieDatabase = JSON.parse(localStorage.getItem('vault_movie_db') || '[]');

        // TAB NAVIGATION LOGIC: Controls which view is visible
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        // RENDER ENGINES: These functions draw the specific grids
        function renderTvGrid() {
            const grid = document.getElementById('tvDatabaseGrid');
            grid.innerHTML = tvDatabase.map(item => `<div class="media-card">${item.name}</div>`).join('');
        }

        function renderMovieGrid() {
            const grid = document.getElementById('moviesDatabaseGrid');
            grid.innerHTML = movieDatabase.map(item => `<div class="media-card">${item.name}</div>`).join('');
        }

        // INITIALIZATION: Runs when the page loads to fill the grids
        window.onload = () => {
            renderTvGrid();
            renderMovieGrid();
        };
    </script>
</body>
</html>
