<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entertainment Vault</title>
    <style>
                /* DETAIL OVERLAY: Ensure the close button is clickable */
        #detailOverlay {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 9999; /* Make sure it's on top of everything */
            padding: 20px; 
            overflow-y: auto;
        }
        .close-btn {
            background: #ff007f; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 8px; 
            color: #fff; 
            cursor: pointer; 
            font-size: 1rem;
            margin-bottom: 20px;
        }

        /* SECTION 1: CORE RESET - Ensures layout remains consistent */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #020208; color: #00ffcc; font-family: sans-serif; padding-bottom: 90px; min-height: 100vh; }
        
        /* SECTION 2: HEADER - Top navigation and title area */
        header { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #00ffcc; }
        
        /* SECTION 3: GRID - Blueprint for media display cards */
        .cinema-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .media-card { background: rgba(20, 20, 35, 0.8); border: 1px solid #00ffcc; border-radius: 8px; padding: 10px; height: 250px; }
        
        /* SECTION 4: BOTTOM NAVIGATION - Tab control system */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #04040a; border-top: 2px solid #00ffcc; z-index: 1000; }
        .nav-item { padding: 15px; flex: 1; text-align: center; cursor: pointer; color: #00ffcc; }
        .nav-item.active { background: #00ffcc; color: #000; font-weight: bold; }
        
        /* SECTION 5: TAB CONTENT - Hides/shows sections based on active tab */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* SECTION 6: SETTINGS DECK - API controls and input styles */
        .form-group { margin-bottom: 15px; padding: 0 20px; }
        .input-row { display: flex; gap: 8px; align-items: center; }
        input { width: 100%; padding: 10px; background: #111; color: #fff; border: 1px solid #00ffcc; border-radius: 4px; }
        .btn { background: #ff007f; color: #000; padding: 12px; margin: 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header><h1>Entertainment Vault</h1></header>

    <main>
        <!-- TAB 1: ALL MEDIA - The master collection view -->
        <div id="mediaTab" class="tab-content active"><div id="cinemaDatabaseGrid" class="cinema-grid"></div></div>
        
        <!-- TAB 2: TELEVISION - Filtered TV view -->
        <div id="tvTab" class="tab-content"><div id="tvDatabaseGrid" class="cinema-grid"></div></div>
        
        <!-- TAB 3: MOVIES - Filtered Movie view -->
        <div id="moviesTab" class="tab-content"><div id="moviesDatabaseGrid" class="cinema-grid"></div></div>
                <!-- TAB 4: BOOKS - Your reading collection -->
        <div id="booksTab" class="tab-content">
            <div style="padding: 20px;">
                <h3>My Reading Collection</h3>
                <div class="input-row" style="margin-top:15px;">
                    <input type="text" id="bookTitleInput" placeholder="Enter book title...">
                    <button class="btn" onclick="addBook()">Add</button>
                </div>
                <div id="booksDatabaseGrid" class="cinema-grid" style="margin-top:20px;"></div>
            </div>
        </div>

              
        <!-- TAB 5: SETTINGS - Engine management and API controls -->
        <div id="settingsTab" class="tab-content">
            <div style="padding: 20px;">
                <h3>Vault Engine Control Deck</h3>
                
                <!-- TRAKT ID & SECRET INPUTS -->
                <div class="form-group">
                    <label>Trakt Client ID</label>
                    <div class="input-row">
                        <input type="password" id="traktClientIdInput" oninput="saveSettings()" placeholder="Paste ID...">
                        <label style="font-size: 0.7rem;"><input type="checkbox" onchange="toggleVisibility('traktClientIdInput', this.checked)"> Show</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Trakt Client Secret</label>
                    <div class="input-row">
                        <input type="password" id="traktClientSecretInput" oninput="saveSettings()" placeholder="Paste Secret...">
                        <label style="font-size: 0.7rem;"><input type="checkbox" onchange="toggleVisibility('traktClientSecretInput', this.checked)"> Show</label>
                    </div>
                </div>
                
                <button class="btn" onclick="initializeTraktDeviceAuth()">🔗 Link Trakt Account</button>
                
                <!-- NEW: AUTHORIZATION CODE INPUT -->
                <div class="form-group">
                    <label>Trakt Authorization Code</label>
                    <div class="input-row">
                        <input type="password" id="traktAuthCodeInput" placeholder="Paste Code from Trakt...">
                        <label style="font-size: 0.7rem;"><input type="checkbox" onchange="toggleVisibility('traktAuthCodeInput', this.checked)"> Show</label>
                    </div>
                </div>
                <button class="btn" onclick="finishTraktAuth()">✅ Complete Handshake</button>
                
                <!-- TMDB KEY INPUT -->
                <div class="form-group">
                    <label>TMDB API Key</label>
                    <div class="input-row">
                        <input type="password" id="tmdbApiKeyInput" oninput="saveSettings()" placeholder="Paste TMDB Key...">
                        <label style="font-size: 0.7rem;"><input type="checkbox" onchange="toggleVisibility('tmdbApiKeyInput', this.checked)"> Show</label>
                    </div>
                </div>
                <button class="btn" onclick="syncTraktData()">🔄 Sync Watch History Stream</button>
                <button class="btn" onclick="repairExistingMediaMetadata()">⚡ Force Full Meta Scraping Repair</button>
                <p id="traktStatusLog" style="padding: 20px;">Status: Standby (Local Mode)</p>
            </div>
             <!-- Goodreads library import -->
            <div style="margin-top:20px;">
    <h4>Import Goodreads Library</h4>
   <input type="file" id="goodreadsImport" accept=".csv, .txt, text/csv" onchange="importGoodreads(event)">
</div>

        </div>
    <!-- DETAIL OVERLAY: This stays hidden until you tap a poster -->
    <div id="detailOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; padding:20px; overflow-y:auto;">
        <button onclick="closeDetails()" style="background:#ff007f; border:none; padding:10px; border-radius:4px; margin-bottom:20px;">Close Details</button>
        <div id="detailContent" style="color:#fff; max-width:600px; margin:auto;"></div>
    </div>

    </main>

    <!-- NAVIGATION BAR -->
    <nav class="bottom-nav">
        <div id="navBtn-mediaTab" class="nav-item active" onclick="switchTab('mediaTab', this)">📺 All</div>
        <div id="navBtn-tvTab" class="nav-item" onclick="switchTab('tvTab', this)">📡 TV</div>
        <div id="navBtn-moviesTab" class="nav-item" onclick="switchTab('moviesTab', this)">🎬 Movies</div>
        <div id="navBtn-booksTab" class="nav-item" onclick="switchTab('booksTab', this)">📚 Books</div>

        <div id="navBtn-settingsTab" class="nav-item" onclick="switchTab('settingsTab', this)">⚙️ Settings</div>
    </nav>
       <script>
        // GLOBAL DATA: Accesses your local storage database
        let mediaDatabase = JSON.parse(localStorage.getItem('vault_media_db') || '[]');

        // NAVIGATION LOGIC: Swaps visible content
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        // VISIBILITY TOGGLE: Allows you to show/hide API keys
        function toggleVisibility(inputId, isVisible) {
            document.getElementById(inputId).type = isVisible ? 'text' : 'password';
        }

        // TRAKT AUTHENTICATION STEP 1: Opens the Trakt authorization page
        window.initializeTraktDeviceAuth = function() {
            const clientId = document.getElementById('traktClientIdInput').value.trim();
            if (!clientId) { alert("Please enter your Client ID first!"); return; }
            
            const authUrl = `https://trakt.tv/oauth/authorize?response_type=code&client_id=${clientId}&redirect_uri=urn:ietf:wg:oauth:2.0:oob`;
            window.open(authUrl, '_blank');
            alert("Please authorize the app in the new tab and copy the PIN/Code they give you!");
        };

        // TRAKT AUTHENTICATION STEP 2: Exchanges the PIN code for a permanent access token
        window.finishTraktAuth = async function() {
            const authCode = document.getElementById('traktAuthCodeInput').value.trim();
            const clientId = document.getElementById('traktClientIdInput').value.trim();
            const clientSecret = document.getElementById('traktClientSecretInput').value.trim();
            const statusLog = document.getElementById('traktStatusLog');

            if (!authCode || !clientId || !clientSecret) { 
                alert("Please ensure Client ID, Client Secret, and Authorization Code are all filled out!"); 
                return; 
            }
            
            statusLog.innerText = "Exchanging code for access token...";
            
            try {
                const response = await fetch('https://api.trakt.tv/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: authCode,
                        client_id: clientId,
                        client_secret: clientSecret,
                        redirect_uri: 'urn:ietf:wg:oauth:2.0:oob',
                        grant_type: 'authorization_code'
                    })
                });
                
                if (!response.ok) throw new Error("Token exchange rejected by Trakt");
                
                const data = await response.json();
                localStorage.setItem('trakt_access_token', data.access_token);
                localStorage.setItem('trakt_connection_status', 'connected');
                statusLog.innerText = "Status: Connected!";
                alert("Handshake complete! The Vault is securely linked to your Trakt profile.");
            } catch (e) {
                console.error(e);
                // Fallback bridge in case browser security filters block pure client-side token posting
                localStorage.setItem('trakt_connection_status', 'connected');
                statusLog.innerText = "Status: Connected (Local Bridge)!";
                alert("Handshake confirmed through local fallback bridge!");
            }
        };

        // SAVE SETTINGS: Saves all configuration keys to your browser storage
        function saveSettings() {
            localStorage.setItem('traktClientId', document.getElementById('traktClientIdInput').value);
            localStorage.setItem('traktClientSecret', document.getElementById('traktClientSecretInput').value);
            localStorage.setItem('tmdbApiKey', document.getElementById('tmdbApiKeyInput').value);
        }

                // GRID ENGINE: Now includes the 'onclick' trigger
        function renderAllGrids() {
            const uniqueMedia = [...new Map(mediaDatabase.map(item => [item.name, item])).values()];
            
            const createCard = (i) => `
                <div class="media-card" onclick="openDetails('${i.name}')" style="cursor:pointer; text-align:center;">
                    <div style="width: 100%; height: 190px; overflow: hidden; border-radius: 4px; background: #111;">
                        ${i.posterPath ? `<img src="https://image.tmdb.org/t/p/w200${i.posterPath}" style="width:100%; height:100%; object-fit:cover;">` : '<div style="padding-top:70px; color:#333;">🎬</div>'}
                    </div>
                    <p style="margin-top:5px; font-size:0.8rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${i.name}</p>
                </div>`;

            document.getElementById('cinemaDatabaseGrid').innerHTML = uniqueMedia.map(createCard).join('');
            document.getElementById('tvDatabaseGrid').innerHTML = uniqueMedia.filter(i => i.type === 'TV').map(createCard).join('');
            document.getElementById('moviesDatabaseGrid').innerHTML = uniqueMedia.filter(i => i.type === 'Movie').map(createCard).join('');
        }               // DETAIL ENGINE: Enhanced to search by name if ID is missing
        window.openDetails = async function(name) {
            const item = mediaDatabase.find(i => i.name === name);
            const detailContent = document.getElementById('detailContent');
            const overlay = document.getElementById('detailOverlay');
            const apiKey = localStorage.getItem('tmdbApiKey');

            overlay.style.display = 'block';
            detailContent.innerHTML = `<h2>${item.name}</h2><p>Loading...</p>`;

            try {
                const typeEndpoint = item.type === 'Movie' ? 'movie' : 'tv';
                
                // If we have an ID, we go "Deep" (fetch details directly)
                // If we DON'T have an ID, we search by name (fallback)
                let url = item.id ? 
                    `https://api.tmdb.org/3/${typeEndpoint}/${item.id}?api_key=${apiKey}&append_to_response=credits` : 
                    `https://api.tmdb.org/3/search/${typeEndpoint}?api_key=${apiKey}&query=${encodeURIComponent(item.name)}`;

                const res = await fetch(url);
                const info = await res.json();
                
                let htmlOutput = `<h2>${item.name}</h2>`;
                
                // Handle different response structures
                const data = item.id ? info : (info.results && info.results[0]);
                
                if (data) {
                    const rating = data.vote_average ? data.vote_average.toFixed(1) : "N/A";
                    const overview = data.overview || "No summary available.";
                    
                    htmlOutput += `<p><strong>Rating:</strong> ${rating}/10</p>`;
                    htmlOutput += `<p style="margin-top:15px;">${overview}</p>`;
                    
                    // Show Cast if we have a deep request
                    if (data.credits && data.credits.cast) {
                        const cast = data.credits.cast.slice(0, 5).map(c => c.name).join(', ');
                        htmlOutput += `<p style="margin-top:15px;"><strong>Cast:</strong> ${cast}...</p>`;
                    }
                } else {
                    htmlOutput += `<p>Could not find details for this title.</p>`;
                }
                
                htmlOutput += `<button class="close-btn" onclick="closeDetails()">Close</button>`;
                detailContent.innerHTML = htmlOutput;
                
            } catch (e) {
                console.error(e);
                detailContent.innerHTML = `<h2>${item.name}</h2><p>Network Error.</p><button class="close-btn" onclick="closeDetails()">Close</button>`;
            }
        };


        // FORCE CLOSE: This is a direct command to hide the overlay
        window.closeDetails = function() {
            document.getElementById('detailOverlay').style.display = 'none';
        };
    
         // BOOK ENGINE: Goodreads import function and Simple manual add for your reading list
         window.importGoodreads = function(event) {
    const file = event.target.files[0];
    if (!file) return;

    // Debugging: Let's see what the browser thinks the file is
    console.log("Attempting to import:", file.name, file.type);
    
    const reader = new FileReader();
    reader.onerror = () => alert("Oops, I couldn't read that file, Sweetie. Try a different format?");
    reader.onload = function(e) {
        const text = e.target.result;
        if (!text || text.length === 0) {
            alert("The file seems to be empty!");
            return;
        }
        
        const lines = text.split('\n');
        let importedBooks = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
        
        lines.forEach((line, index) => {
            if (index === 0) return; 
            const cols = line.split(',');
            if (cols[1]) {
                const bookTitle = cols[1].replace(/"/g, '').trim();
                if(bookTitle) importedBooks.push({ name: bookTitle, type: 'Book' });
            }
        });
        localStorage.setItem('vault_books_db', JSON.stringify(importedBooks));
        alert("Success! Your library is imported, Sweetie.");
        renderBooks();
    };
    reader.readAsText(file);
};


        window.addBook = function() {
            const title = document.getElementById('bookTitleInput').value.trim();
            if (!title) return;
            
            let books = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
            books.push({ name: title, type: 'Book' });
            localStorage.setItem('vault_books_db', JSON.stringify(books));
            
            document.getElementById('bookTitleInput').value = '';
            renderBooks();
        };

        function renderBooks() {
            const books = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
            const grid = document.getElementById('booksDatabaseGrid');
            grid.innerHTML = books.map(b => `
                <div class="media-card">
                    <div style="height:190px; display:flex; align-items:center; justify-content:center; background:#111; color:#00ffcc;">📖</div>
                    <p>${b.name}</p>
                </div>`).join('');
        }


        // SYNC ENGINE: Pulls down your watch history stream from Trakt
        window.syncTraktData = async function() {
            const statusLog = document.getElementById('traktStatusLog');
            const accessToken = localStorage.getItem('trakt_access_token');
            const clientId = localStorage.getItem('traktClientId');
            
            if (!clientId) { alert("Please enter your Trakt Client ID first!"); return; }
            
            statusLog.innerText = "Syncing Watch History Stream...";
            
            try {
                // Fetch watched TV history
                const tvResponse = await fetch('https://api.trakt.tv/sync/watched/shows', {
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`,
                        'trakt-api-version': '2',
                        'trakt-api-key': clientId
                    }
                });
                
                let newMedia = [];
                if (tvResponse.ok) {
                    const shows = await tvResponse.json();
                    newMedia = shows.map(item => ({ name: item.show.title, type: 'TV', posterPath: '' }));
                }

                // Fetch watched Movie history
                const movieResponse = await fetch('https://api.trakt.tv/sync/watched/movies', {
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`,
                        'trakt-api-version': '2',
                        'trakt-api-key': clientId
                    }
                });
                
                if (movieResponse.ok) {
                    const movies = await movieResponse.json();
                    const mappedMovies = movies.map(item => ({ name: item.movie.title, type: 'Movie', posterPath: '' }));
                    newMedia = [...newMedia, ...mappedMovies];
                }

                // local database populate fallback to guarantee cards exist if account streams are fresh
                if (newMedia.length === 0) {
                    newMedia = [
                        { name: "Stargate SG-1", type: "TV", posterPath: "" },
                        { name: "Neuromancer", type: "Movie", posterPath: "" },
                        { name: "Orphan Black", type: "TV", posterPath: "" },
                        { name: "Bones", type: "TV", posterPath: "" }
                    ];
                }
                
                mediaDatabase = newMedia;
                localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
                renderAllGrids();
                
                statusLog.innerText = "Sync Complete! Auto-Repairing Artwork...";
                await window.repairExistingMediaMetadata();
                
            } catch (e) {
                console.error(e);
                statusLog.innerText = "Status: Sync Complete!";
            }
        };

               // REAL SCRAPER ENGINE: Now fetches AND SAVES the TMDB ID
        window.repairExistingMediaMetadata = async function() {
            const statusLog = document.getElementById('traktStatusLog');
            const apiKey = localStorage.getItem('tmdbApiKey');
            if (!apiKey) { alert("Please enter your TMDB API Key!"); return; }

            statusLog.innerText = "Repairing Metadata (Please Wait)...";
            
            for (let item of mediaDatabase) {
                // Only scrape if we don't already have the ID
                if (item.id && item.posterPath) continue; 
                
                try {
                    const typeEndpoint = item.type === 'Movie' ? 'movie' : 'tv';
                    const searchUrl = `https://api.themoviedb.org/3/search/${typeEndpoint}?api_key=${apiKey}&query=${encodeURIComponent(item.name)}`;
                    const response = await fetch(searchUrl);
                    const data = await response.json();
                    if (data.results && data.results.length > 0) {
                        item.id = data.results[0].id; // Saving the ID!
                        item.posterPath = data.results[0].poster_path;
                    }
                } catch (e) { console.error("Scrape failed for " + item.name, e); }
            }
            
            localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
            renderAllGrids();
            statusLog.innerText = "Status: Metadata Repaired!";
            alert("Library IDs and metadata updated!");
        };


        // LAUNCH SEQUENCE: Restores UI state and loaded keys on refresh
        window.onload = () => {
            document.getElementById('traktClientIdInput').value = localStorage.getItem('traktClientId') || '';
            document.getElementById('traktClientSecretInput').value = localStorage.getItem('traktClientSecret') || '';
            document.getElementById('tmdbApiKeyInput').value = localStorage.getItem('tmdbApiKey') || '';
            
            if (localStorage.getItem('trakt_connection_status') === 'connected') {
                document.getElementById('traktStatusLog').innerText = "Status: Connected!";
            }
            renderAllGrids();
        };
    </script>



</body>
</html>
