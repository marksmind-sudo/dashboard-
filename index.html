<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ========================================== -->
    <!-- SECTION 1: METADATA & FULL-SCREEN OVERLAYS  -->
    <!-- ========================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Entertainment Vault</title>

    <style>
        /* ========================================== */
        /* SECTION 2: THEME DESIGN SYSTEM (CSS CORES) */
        /* ========================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color, #020208); 
            color: var(--text-color, #00ffcc);
            font-family: sans-serif; 
            padding-bottom: 90px; 
            min-height: 100vh;
        }

        /* --- THEME VARIATION BLOCKS --- */
        [data-theme="cyberpunk"] {
            --bg-color: #020208; --panel-bg: rgba(10, 12, 32, 0.96); --text-color: #00ffcc;
            --accent-color: #ff007f; --border-color: #00ffcc; --card-bg: rgba(16, 20, 48, 0.92);
        }
        [data-theme="star-trek"] {
            --bg-color: #05070f; --panel-bg: rgba(12, 17, 34, 0.95); --text-color: #e2e8f0;
            --accent-color: #ff9900; --border-color: #4a5568; --card-bg: rgba(19, 26, 48, 0.85);
        }
        [data-theme="steampunk"] {
            --bg-color: #1a0f0d; --panel-bg: rgba(33, 22, 18, 0.97); --text-color: #fcefde;
            --accent-color: #e5a93b; --border-color: #8c5827; --card-bg: rgba(46, 32, 26, 0.9);
        }
        [data-theme="tvtime-dark"] {
            --bg-color: #141414; --panel-bg: #1f1f1f; --text-color: #ffffff;
            --accent-color: #e50914; --border-color: #333333; --card-bg: #181818;
        }
        [data-theme="tvtime-light"] {
            --bg-color: #f5f5f7; --panel-bg: #ffffff; --text-color: #1d1d1f;
            --accent-color: #0066cc; --border-color: #d2d2d7; --card-bg: #ffffff;
        }

        /* ========================================== */
        /* SECTION 3: LAYOUT DESIGN BLUEPRINT STYLES  */
        /* ========================================== */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border-color, #00ffcc); margin-bottom: 15px; }
        header h1 { font-size: 1.5rem; }
        
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .theme-dropdown { background: #111; color: inherit; border: 1px solid var(--border-color); padding: 6px; border-radius: 4px; }
        .control-filter-deck { display: flex; gap: 10px; padding: 0 15px 15px 15px; align-items: center; flex-wrap: wrap; }
        .card-select, input[type="text"], input[type="password"] { background: rgba(0,0,0,0.4); color: inherit; border: 1px solid var(--border-color, #00ffcc); padding: 8px; border-radius: 4px; }

        .sub-nav-wrapper { padding: 0 15px; margin-bottom: 15px; overflow-x: auto; }
        .sub-nav { display: flex; gap: 8px; white-space: nowrap; }
        .sub-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color, #00ffcc); color: inherit; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }
        .sub-btn.active { background: var(--accent-color, #ff007f); color: #000; font-weight: bold; }

        .cinema-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important;
            gap: 12px !important;
            padding: 12px !important;
        }

        .media-card {
            background: rgba(20, 20, 35, 0.65);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 270px !important;
            transition: transform 0.2s ease;
        }
        .media-card:hover { transform: translateY(-4px); }

        .poster-frame {
            width: 100% !important;
            height: 190px !important;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .poster-img { width: 100%; height: 100%; object-fit: cover; }
        .card-details-pane { padding: 6px 8px !important; display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1; }
        .media-title { font-size: 0.8rem !important; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .media-meta { font-size: 0.68rem !important; opacity: 0.7; margin-bottom: 2px; }
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .progress-bar { height: 100%; background: var(--accent-color, #ff007f); width: 0%; }

        /* --- MODAL DIAL LAYOUT --- */
        .modal-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .modal-canvas.active { display: flex; }
        
        .modal-box { 
            background: #0a0c20; 
            border: 2px solid var(--border-color, #00ffcc); 
            width: 95%; 
            max-width: 780px; 
            max-height: 90vh;
            border-radius: 12px; 
            padding: 24px; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            color: #fff; 
            overflow-y: auto;
        }

        /* --- VISUAL INTERACTIVE CAST SCROLL RAILS --- */
        .cast-horizontal-row { display: flex; gap: 12px; overflow-x: auto; padding: 8px 0; margin-top: 4px; }
        .cast-pill-card { 
            background: rgba(255,255,255,0.04); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 8px; 
            padding: 8px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-width: 110px; 
            cursor: pointer;
            transition: background 0.2s;
        }
        .cast-pill-card:hover { background: rgba(255, 0, 127, 0.15); border-color: var(--accent-color); }
        .cast-avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.2); }

        /* --- SEASON & EPISODE STYLES MAPPED FROM SCREENSHOT --- */
        .season-vertical-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
        .season-list-header { display: flex; justify-content: space-between; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: bold; }
        .season-list-header:hover { border-color: var(--text-color); }
        .episode-container-block { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-top: none; border-radius: 0 0 6px 6px; padding: 10px; display: none; flex-direction: column; gap: 8px; }
        .episode-row-item { display: flex; align-items: flex-start; gap: 10px; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 4px; font-size: 0.8rem; }
        .episode-row-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent-color); cursor: pointer; margin-top: 2px; }

        .side-drawer { position: fixed; top: 0; right: -360px; width: 360px; height: 100vh; background: #0a0c20; border-left: 2px solid var(--border-left); z-index: 9999; transition: right 0.3s ease; padding: 20px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; color: #fff; }
        .side-drawer.open { right: 0; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #04040a; border-top: 3px solid var(--border-color); height: 65px; align-items: center; justify-content: space-around; padding: 0 10px; z-index: 1000; }
        .nav-item { color: inherit; padding: 10px; cursor: pointer; font-weight: bold; font-size: 0.9rem; flex: 1; text-align: center; }
        .nav-item.active { background: var(--accent-color); color: #000; border-radius: 8px 8px 0 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body data-theme="cyberpunk">

    <!-- ========================================== -->
    <!-- SECTION 4: GLOBAL HEADER SHELF              -->
    <!-- ========================================== -->
    <header>
        <h1 id="vaultHeaderTitle">Entertainment Vault</h1>
        <div class="header-controls">
            <button class="sub-btn" style="background: var(--accent-color, #ff007f); color: #000; font-weight: bold;" onclick="toggleDrawer(true)">+ Add Title</button>
            <select class="theme-dropdown" onchange="changeTheme(this.value)">
                <option value="cyberpunk">Cyberpunk Neon</option>
                <option value="star-trek">Star Trek Command</option>
                <option value="steampunk">Steampunk Brass</option>
                <option value="tvtime-dark">TV Time Dark</option>
                <option value="tvtime-light">TV Time Light</option>
            </select>
            <button class="gear-btn" onclick="switchTab('settingsTab')">⚙️ Settings</button>
        </div>
    </header>

    <!-- ========================================== -->
    <!-- SECTION 6: PROFILE POP-UP DETAILED MODAL   -->
    <!-- ========================================== -->
    <div id="detailModal" class="modal-canvas" onclick="if(event.target === this) closeModal()">
        <div class="modal-box">
            <h2 id="modalTitle" style="border-bottom: 2px solid var(--accent-color); padding-bottom: 6px; font-size: 1.6rem;">Title</h2>
            <div id="modalMeta"></div>
            <div class="form-group" style="margin-top: 10px;">
                <label style="color: var(--accent-color);">Update Status Folder</label>
                <select id="modalFolderSelect" class="card-select" onchange="updateItemStatus(this.value)"></select>
            </div>
            <button class="btn" onclick="closeModal()" style="margin-top: 8px;">Close Panel</button>
        </div>
    </div>

    <!-- 👤 NESTED ACTOR BIOGRAPHY MODAL PORTAL -->
    <div id="actorModal" class="modal-canvas" onclick="if(event.target === this) document.getElementById('actorModal').classList.remove('active')">
        <div class="modal-box" style="max-width: 550px; background: #0c0f26; border-color: var(--text-color);">
            <h3 id="actorModalName" style="color: var(--text-color); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 6px;">Actor Profile</h3>
            <div id="actorModalContent" style="display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px;"></div>
            <button class="btn" onclick="document.getElementById('actorModal').classList.remove('active')" style="margin-top: 10px; background: var(--text-color); color:#000;">Return to Media</button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- SECTION 7: CORE VIEWPORT MAIN WORKSPACE     -->
    <!-- ========================================== -->
    <main>
        <!-- --- VIEWPORT TAB 1: ALL MEDIA STREAM GRID --- -->
        <div id="mediaTab" class="tab-content active">
            <div id="mediaMetricsDeck" style="display: flex; gap: 8px; padding: 10px 15px 0 15px; justify-content: flex-start; flex-wrap: wrap;"></div>
            <div class="control-filter-deck">
                <input type="text" id="searchBar" placeholder="🔍 Search titles, actors, directors, studios..." oninput="renderGrid()" style="flex-grow: 1;">
                <select id="mediaSortOrder" onchange="renderGrid()" class="card-select" style="min-width: 130px;">
                    <option value="default">Sort: History Log</option>
                    <option value="alpha">Sort: A-Z Title</option>
                    <option value="year">Sort: Release Year</option>
                </select>
            </div>
            <div class="sub-nav-wrapper">
                <div class="sub-nav">
                    <button id="sub-all" class="sub-btn active" onclick="filterCategory('all')">Main Collection</button>
                    <button id="sub-watching" class="sub-btn" onclick="filterCategory('watching')">🎬 Watching</button>
                    <button id="sub-waiting" class="sub-btn" onclick="filterCategory('waiting')">⏳ Waiting</button>
                    <button id="sub-find" class="sub-btn" onclick="filterCategory('find')">🔍 Stuff to Find</button>
                    <button id="sub-completed" class="sub-btn" onclick="filterCategory('completed')">⚡ Completed</button>
                </div>
            </div>
            <div id="cinemaDatabaseGrid" class="cinema-grid"></div>
        </div>

        <!-- --- VIEWPORT TAB 1B: TELEVISION dedic GRID --- -->
        <div id="tvTab" class="tab-content">
            <div id="tvMetricsDeck" style="display: flex; gap: 8px; padding: 10px 15px 0 15px; justify-content: flex-start; flex-wrap: wrap;"></div>
            <div class="control-filter-deck">
                <input type="text" id="tvSearchBar" placeholder="🔍 Search television..." oninput="renderTvGrid()" style="flex-grow: 1;">
                <select id="tvSortOrder" onchange="renderTvGrid()" class="card-select" style="min-width: 130px;">
                    <option value="default">Sort: History Log</option>
                    <option value="alpha">Sort: A-Z Title</option>
                    <option value="year">Sort: Release Year</option>
                </select>
            </div>
            <div class="sub-nav-wrapper">
                <div class="sub-nav">
                    <button id="tv-sub-all" class="sub-btn active" onclick="filterTvCategory('all')">Main Collection</button>
                    <button id="tv-sub-watching" class="sub-btn" onclick="filterTvCategory('watching')">🎬 Watching</button>
                    <button id="tv-sub-waiting" class="sub-btn" onclick="filterTvCategory('waiting')">⏳ Waiting</button>
                    <button id="tv-sub-find" class="sub-btn" onclick="filterTvCategory('find')">🔍 Stuff to Find</button>
                    <button id="tv-sub-completed" class="sub-btn" onclick="filterTvCategory('completed')">⚡ Completed</button>
                </div>
            </div>
            <div id="tvDatabaseGrid" class="cinema-grid"></div>
        </div>

        <!-- --- VIEWPORT TAB 1C: MOVIES dedicated GRID --- -->
        <div id="moviesTab" class="tab-content">
            <div id="movieMetricsDeck" style="display: flex; gap: 8px; padding: 10px 15px 0 15px; justify-content: flex-start; flex-wrap: wrap;"></div>
            <div class="control-filter-deck">
                <input type="text" id="movieSearchBar" placeholder="🔍 Search movies..." oninput="renderMovieGrid()" style="flex-grow: 1;">
                <select id="movieSortOrder" onchange="renderMovieGrid()" class="card-select" style="min-width: 130px;">
                    <option value="default">Sort: History Log</option>
                    <option value="alpha">Sort: A-Z Title</option>
                    <option value="year">Sort: Release Year</option>
                </select>
            </div>
            <div class="sub-nav-wrapper">
                <div class="sub-nav">
                    <button id="movie-sub-all" class="sub-btn active" onclick="filterMovieCategory('all')">Main Collection</button>
                    <button id="movie-sub-find" class="sub-btn" onclick="filterMovieCategory('find')">🔍 Stuff to Find</button>
                    <button id="movie-sub-completed" class="sub-btn" onclick="filterMovieCategory('completed')">⚡ Completed</button>
                </div>
            </div>
            <div id="moviesDatabaseGrid" class="cinema-grid"></div>
        </div>

        <!-- --- VIEWPORT TAB 2: BOOK LIBRARY DATABASE GRID --- -->
        <div id="goodreadsTab" class="tab-content">
            <div id="bookMetricsDeck" style="display: flex; gap: 8px; padding: 10px 15px 0 15px; justify-content: flex-start; flex-wrap: wrap;"></div>
            <div class="control-filter-deck">
                <input type="text" id="bookSearchBar" placeholder="🔍 Search title, author, book series..." oninput="renderBookGrid()" style="flex-grow: 1;">
                <select id="bookSortOrder" onchange="renderBookGrid()" class="card-select" style="min-width: 130px;">
                    <option value="default">Sort: Default Log</option>
                    <option value="alpha">Sort: A-Z Title</option>
                </select>
            </div>
            <div class="sub-nav-wrapper"><div class="sub-nav"><button id="book-sub-all" class="sub-btn active" onclick="filterBookCategory('all')">All Books</button><button id="book-sub-reading" class="sub-btn" onclick="filterBookCategory('currently-reading')">📖 Reading</button><button id="book-sub-read" class="sub-btn" onclick="filterBookCategory('read')">✅ Completed</button></div></div>
            <div id="bookLibraryDatabaseGrid" class="cinema-grid"></div>
        </div>

        <!-- --- VIEWPORT TAB 3: SYSTEM SETTINGS RACK --- -->
        <div id="settingsTab" class="tab-content">
            <div style="background: var(--card-bg, rgba(16, 20, 48, 0.92)); border: 1px solid var(--border-color, #00ffcc); padding: 20px; border-radius: 8px; display: flex; flex-direction: column; gap: 16px; max-width: 500px; margin: 0 auto;">
                <h3 style="color: var(--text-color, #00ffcc); border-bottom: 1px solid var(--border-color, #00ffcc); padding-bottom: 8px;">Vault Engine Control Deck</h3>
                
                <!-- 🛠️ RESTORED VISIBILITY TOGGLE RAILS FOR PRIVACY KEYS -->
                <div class="form-group">
                    <label>Trakt Client ID</label>
                    <div style="display:flex; gap:6px; align-items:center;">
                        <input type="password" id="traktClientIdInput" placeholder="Paste Client ID here..." style="flex-grow:1;">
                        <label style="font-size:0.75rem; white-space:nowrap; cursor:pointer;"><input type="checkbox" onchange="document.getElementById('traktClientIdInput').type = this.checked ? 'text' : 'password'"> Show</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Trakt Client Secret</label>
                    <div style="display:flex; gap:6px; align-items:center;">
                        <input type="password" id="traktClientSecretInput" placeholder="Paste Client Secret here..." style="flex-grow:1;">
                        <label style="font-size:0.75rem; white-space:nowrap; cursor:pointer;"><input type="checkbox" onchange="document.getElementById('traktClientSecretInput').type = this.checked ? 'text' : 'password'"> Show</label>
                    </div>
                </div>
                <button class="btn" onclick="window.initializeTraktDeviceAuth()">Link Trakt Account</button>
                
                <div id="traktPinGroup" style="display: none; border-top: 1px dashed rgba(255,255,255,0.15); padding-top: 12px; flex-direction: column; gap: 8px;">
                    <label style="color: var(--accent-color, #ff007f); font-weight: bold; font-size:0.8rem;">Go to verification url: <a id="traktAuthUrl" href="#" target="_blank" style="color: #fff; text-decoration: underline;">Link Profile</a></label>
                    <input type="text" id="traktPinInput" placeholder="Enter Verification PIN..." class="card-select" style="background:rgba(0,0,0,0.6);">
                    <button class="btn" onclick="window.exchangeTraktPinForToken()" style="background: #fff; color: #000;">Authorize Vault Token</button>
                </div>

                <div class="form-group" style="border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 12px;">
                    <label>TMDB (Movie Database) API Key</label>
                    <div style="display:flex; gap:6px; align-items:center;">
                        <input type="password" id="tmdbApiKeyInput" placeholder="Paste TMDB API Key here..." style="flex-grow:1;">
                        <label style="font-size:0.75rem; white-space:nowrap; cursor:pointer;"><input type="checkbox" onchange="document.getElementById('tmdbApiKeyInput').type = this.checked ? 'text' : 'password'"> Show</label>
                    </div>
                </div>
                <button class="btn" onclick="window.pullTraktUserHistoryStream()" style="background: #00ffcc; color: #000; margin-top: 4px;">🔄 Sync Watch History Stream</button>
                <button class="btn" onclick="window.repairExistingMediaMetadata()" style="background: #ff007f; color: #fff; margin-top: 4px; font-size: 0.8rem;">⚡ Force Full Meta Scraping Repair</button>
                
                <div id="traktStatusLog" style="font-size: 0.8rem; text-align: center; color: var(--accent-color); margin-top: 4px;">Status: Standby (Local Mode)</div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div id="navBtn-mediaTab" class="nav-item active" onclick="switchTab('mediaTab')">📺 All Media</div>
        <div id="navBtn-tvTab" class="nav-item" onclick="switchTab('tvTab')">📡 Television</div>
        <div id="navBtn-moviesTab" class="nav-item" onclick="switchTab('moviesTab')">🎬 Movies</div>
        <div id="navBtn-goodreadsTab" class="nav-item" onclick="switchTab('goodreadsTab')">📚 Books</div>
    </nav>

    <!-- ========================================== -->
    <!-- SECTION 9: APPLICATION FUNCTION LOGIC SCRIPT-->
    <!-- ========================================== -->
    <script>
        let mediaDatabase = [];
        let bookDatabase = [];
        let watchedEpisodesLog = JSON.parse(localStorage.getItem('vault_watched_episodes') || '{}');
        let currentFilter = 'all', currentTvFilter = 'all', currentMovieFilter = 'all', currentBookFilter = 'all';
        let activeItemId = null;
        let traktAccessToken = null;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId)?.classList.add('active');
            document.getElementById('navBtn-' + tabId)?.classList.add('active');

            const headerTitle = document.getElementById('vaultHeaderTitle');
            if (tabId === 'mediaTab') headerTitle.innerText = "Vault: All Media";
            if (tabId === 'tvTab') headerTitle.innerText = "Vault: Television";
            if (tabId === 'moviesTab') headerTitle.innerText = "Vault: Movies";
            if (tabId === 'goodreadsTab') headerTitle.innerText = "Vault: Book Library";
            if (tabId === 'settingsTab') headerTitle.innerText = "Vault: Settings Rack";

            renderGrid(); renderTvGrid(); renderMovieGrid(); renderBookGrid();
        }

        function changeTheme(themeValue) { document.body.setAttribute('data-theme', themeValue); }
        function toggleDrawer(openState) { document.getElementById('addMediaDrawer').classList.toggle('open', openState); }

        function filterCategory(catId) { currentFilter = catId; document.querySelectorAll('#mediaTab .sub-nav .sub-btn').forEach(btn => btn.classList.toggle('active', btn.id==='sub-'+catId)); renderGrid(); }
        function filterTvCategory(catId) { currentTvFilter = catId; document.querySelectorAll('#tvTab .sub-nav .sub-btn').forEach(btn => btn.classList.toggle('active', btn.id==='tv-sub-'+catId)); renderTvGrid(); }
        function filterMovieCategory(catId) { currentMovieFilter = catId; document.querySelectorAll('#moviesTab .sub-nav .sub-btn').forEach(btn => btn.classList.toggle('active', btn.id==='movie-sub-'+catId)); renderMovieGrid(); }

        // --- INTERACTIVE CAST PROFILE LOOKUP ENGINE ---
        window.lookupActorProfile = async function(actorName) {
            const content = document.getElementById('actorModalContent');
            document.getElementById('actorModalName').innerText = actorName;
            content.innerHTML = `<div style="padding:15px; opacity:0.6;">Searching TMDB dossier...</div>`;
            document.getElementById('actorModal').classList.add('active');

            const tmdbKey = localStorage.getItem('tmdb_api_key');
            if (!tmdbKey) { content.innerHTML = `Provide TMDB API key in Settings to inspect casting data details.`; return; }

            try {
                const searchRes = await fetch(`https://api.themoviedb.org/3/search/person?api_key=${tmdbKey}&query=${encodeURIComponent(actorName)}`);
                if (!searchRes.ok) throw new Error();
                const sData = await searchRes.json();
                if (!sData.results || sData.results.length === 0) { content.innerHTML = `No verified records found on TMDB network.`; return; }

                const personId = sData.results[0].id;
                const bioRes = await fetch(`https://api.themoviedb.org/3/person/${personId}?api_key=${tmdbKey}&append_to_response=combined_credits`);
                const bData = await bioRes.json();

                const avatar = bData.profile_path ? `https://image.tmdb.org/t/p/w185${bData.profile_path}` : '';
                const bio = bData.biography || 'No biographical logging found.';
                const credits = bData.combined_credits?.cast?.slice(0, 5).map(c => `<strong>${c.title || c.name}</strong> (${c.release_date || c.first_air_date || 'N/A'})`).join('<br>') || 'None logged.';

                content.innerHTML = `
                    ${avatar ? `<img src="${avatar}" style="width:120px; border-radius:6px; aspect-ratio:2/3; object-fit:cover; box-shadow:0 4px 10px rgba(0,0,0,0.4);">` : ''}
                    <div style="flex:1; min-width:240px; display:flex; flex-direction:column; gap:8px; font-size:0.82rem;">
                        <div>📍 Born: <strong>${bData.place_of_birth || 'Unknown'}</strong> | ${bData.birthday || 'N/A'}</div>
                        <div style="max-height:120px; overflow-y:auto; background:rgba(0,0,0,0.3); padding:8px; border-radius:4px; opacity:0.85;">${bio}</div>
                        <div style="border-top:1px solid rgba(255,255,255,0.08); padding-top:6px;">🎬 <span style="color:var(--accent-color); font-weight:bold;">Vault Known Roles:</span><br>${credits}</div>
                    </div>
                `;
            } catch(e) { content.innerHTML = `Matrix failure collecting actor files.`; }
        };

        // --- INTERACTIVE TV SEASON & EPISODE DRILLDOWN LISTENER ---
        window.toggleEpisodeContainer = async function(index, tmdbId, seasonNum) {
            const container = document.getElementById(`episode-block-${index}`);
            if (container.style.display === 'flex') {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'flex';
            container.innerHTML = `<div style="font-size:0.75rem; opacity:0.6; padding:6px;">Downloading episode data indices...</div>`;

            const tmdbKey = localStorage.getItem('tmdb_api_key');
            if (!tmdbKey) { container.innerHTML = `Provide TMDB API key to reveal episodes.`; return; }

            try {
                const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${seasonNum}?api_key=${tmdbKey}`);
                if (!res.ok) throw new Error();
                const data = await res.json();

                if (!data.episodes || data.episodes.length === 0) {
                    container.innerHTML = `No episodes logged inside this file grid.`;
                    return;
                }

                container.innerHTML = data.episodes.map(ep => {
                    const logKey = `${tmdbId}-${seasonNum}-${ep.episode_number}`;
                    const isChecked = watchedEpisodesLog[logKey] ? 'checked' : '';
                    return `
                        <div class="episode-row-item">
                            <input type="checkbox" ${isChecked} onchange="window.toggleEpisodeWatchStatus('${logKey}', this.checked)">
                            <div style="flex-grow:1;">
                                <div style="display:flex; justify-content:between; font-weight:bold; color:#fff;">
                                    <span>Ep ${ep.episode_number}: ${ep.name}</span>
                                    <span style="opacity:0.6; font-size:0.7rem;">⭐ ${ep.vote_average ? ep.vote_average.toFixed(1) : 'N/A'}</span>
                                </div>
                                <p style="font-size:0.72rem; opacity:0.75; margin-top:2px;">${ep.overview || 'No log synopsis stored.'}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch(e) { container.innerHTML = `Handshake failed pulling episodes.`; }
        };

        window.toggleEpisodeWatchStatus = function(logKey, isWatched) {
            if (isWatched) watchedEpisodesLog[logKey] = true;
            else delete watchedEpisodesLog[logKey];
            localStorage.setItem('vault_watched_episodes', JSON.stringify(watchedEpisodesLog));
        };

        // --- SUB SECTION D: MODAL DETAILED CUSTOM OVERHAUL ---
        function openModal(id, itemType = 'media') {
            activeItemId = id;
            const select = document.getElementById('modalFolderSelect');
            const metaContainer = document.getElementById('modalMeta');
            
            if (itemType === 'book') {
                const book = bookDatabase.find(b => b.id === id);
                if (!book) return;
                document.getElementById('modalTitle').innerText = book.title;
                metaContainer.innerHTML = `
                    <div style="display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;">
                        <img src="https://covers.openlibrary.org/b/title/${encodeURIComponent(book.title)}-M.jpg" style="width: 140px; border-radius: 8px; object-fit: cover; aspect-ratio: 2/3; box-shadow: 0 6px 16px rgba(0,0,0,0.6);">
                        <div style="flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 8px;">
                            <div style="display: grid; grid-template-columns: 1fr; gap: 6px; font-size: 0.88rem; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                                <div>✍️ Author/Creator: <strong style="color:var(--accent-color);">${book.author}</strong></div>
                                <div>📖 Edition Format: <strong style="text-transform: uppercase; color:#fff;">${book.format}</strong></div>
                                <div>📚 Book Series Index: <strong style="color:var(--text-color);">${book.series || 'Stand-Alone Novel'}</strong></div>
                                <div>🏢 Publisher House: <strong style="color:#e2e8f0;">${book.publisher || 'Not Listed'}</strong></div>
                            </div>
                        </div>
                    </div>
                `;
                select.innerHTML = `<option value="to-read" ${book.status === 'to-read' ? 'selected' : ''}>To Read</option><option value="currently-reading" ${book.status === 'currently-reading' ? 'selected' : ''}>Currently Reading</option><option value="read" ${book.status === 'read' ? 'selected' : ''}>Completed Log</option>`;
            } else {
                const item = mediaDatabase.find(m => m.id === id);
                if (!item) return;
                document.getElementById('modalTitle').innerText = item.name;
                
                const imgSrc = item.posterPath ? `https://image.tmdb.org/t/p/w500${item.posterPath}` : '';
                const studioLabel = item.type === 'Movie' ? 'Production Studio' : 'Network/Platform';

                // Rich graphic actor scroll row with real headshots
                let castHtml = '<div style="opacity:0.5; font-size:0.8rem;">No actor details populated. Run Meta Scraping Repair.</div>';
                if (item.actorsData) {
                    try {
                        const cast = JSON.parse(item.actorsData);
                        castHtml = `<div class="cast-horizontal-row">` + cast.map(c => `
                            <div class="cast-pill-card" onclick="window.lookupActorProfile('${c.name.replace(/'/g, "\\'")}')">
                                ${c.profile ? `<img class="cast-avatar" src="https://image.tmdb.org/t/p/w185${c.profile}">` : `<div class="cast-avatar" style="background:#333; display:flex; align-items:center; justify-content:center;">👤</div>`}
                                <span style="font-size:0.76rem; font-weight:bold; color:#fff; text-wrap:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100px;">${c.name}</span>
                            </div>
                        `).join('') + `</div>`;
                    } catch(e) {}
                }

                // Interactive episode selection block list
                let extensionsHtml = '';
                if (item.type === 'TV' && item.seasonsData) {
                    try {
                        const seasons = JSON.parse(item.seasonsData);
                        extensionsHtml = `<div style="margin-top:12px;"><h4 style="font-size:0.9rem; color:var(--accent-color); margin-bottom:6px;">Season Track Matrix (Tap to Open Episodes)</h4><div class="season-vertical-list">` +
                            seasons.map((s, idx) => `
                                <div style="display:flex; flex-direction:column;">
                                    <div class="season-list-header" onclick="window.toggleEpisodeContainer(${idx}, ${item.tmdbId || 0}, ${s.season_number})">
                                        <span>${s.name}</span>
                                        <span style="opacity:0.7; font-weight:normal;">${s.episode_count} Episodes</span>
                                    </div>
                                    <div id="episode-block-${idx}" class="episode-container-block"></div>
                                </div>
                            `).join('') + `</div></div>`;
                    } catch(e) {}
                }

                metaContainer.innerHTML = `
                    <div style="display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;">
                        ${imgSrc ? `<img src="${imgSrc}" style="width: 140px; border-radius: 8px; object-fit: cover; aspect-ratio: 2/3; box-shadow: 0 6px 16px rgba(0,0,0,0.6);">` : '🎬'}
                        <div style="flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 8px;">
                            <div style="display: grid; grid-template-columns: 1fr; gap: 4px; font-size: 0.82rem; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                                <div>🎬 Classification Type: <strong style="color:#fff;">${item.type}</strong></div>
                                <div>📅 Release Year: <strong>${item.year || 'N/A'}</strong></div>
                                <div>🏢 ${studioLabel}: <strong style="color:var(--text-color);">${item.network || 'Not Indexed'}</strong></div>
                                <div>🎬 Director/Creator: <strong style="color:var(--accent-color);">${item.director || 'Not Indexed'}</strong></div>
                            </div>
                            <p style="font-size: 0.84rem; line-height: 1.4; opacity: 0.9; max-height: 110px; overflow-y:auto;">${item.overview || 'No summary overview text.'}</p>
                        </div>
                    </div>
                    <div style="margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px;">
                        <h4 style="font-size: 0.88rem; color: var(--text-color); margin-bottom: 2px;">Starring Cast (Tap for Bio Portfolio)</h4>
                        ${castHtml}
                    </div>
                    ${extensionsHtml}
                `;
                select.innerHTML = `<option value="all" ${item.status==='all'?'selected':''}>Main Collection</option><option value="watching" ${item.status==='watching'?'selected':''}>Currently Watching</option><option value="waiting" ${item.status==='waiting'?'selected':''}>Waiting for Season</option><option value="find" ${item.status==='find'?'selected':''}>Stuff to Find</option><option value="completed" ${item.status==='completed'?'selected':''}>Completed Log</option>`;
            }
            document.getElementById('detailModal').classList.add('active');
        }

        function closeModal() { document.getElementById('detailModal').classList.remove('active'); activeItemId = null; }
        function updateItemStatus(newStatus) {
            let item = mediaDatabase.find(m => m.id === activeItemId); if (item) item.status = newStatus;
            let book = bookDatabase.find(b => b.id === activeItemId); if (book) book.status = newStatus;
            localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
            localStorage.setItem('vault_book_db', JSON.stringify(bookDatabase));
            renderGrid(); renderTvGrid(); renderMovieGrid(); renderBookGrid();
        }

        // --- GRID CONTROLLERS ---
        function renderGrid() {
            const grid = document.getElementById('cinemaDatabaseGrid'); if (!grid) return; grid.innerHTML = '';
            const searchVal = document.getElementById('searchBar')?.value.toLowerCase() || '';
            let list = mediaDatabase.filter(m => (m.name||'').toLowerCase().includes(searchVal) || (m.director||'').toLowerCase().includes(searchVal) || (m.network||'').toLowerCase().includes(searchVal)).filter(m => currentFilter === 'all' || m.status === currentFilter);
            sortList(list, document.getElementById('mediaSortOrder')?.value); injectCardMatrix(list, grid);
        }
        function renderTvGrid() {
            const grid = document.getElementById('tvDatabaseGrid'); if (!grid) return; grid.innerHTML = '';
            let tvList = mediaDatabase.filter(m => m.type === 'TV');
            const searchVal = document.getElementById('tvSearchBar')?.value.toLowerCase() || '';
            let list = tvList.filter(m => (m.name||'').toLowerCase().includes(searchVal) || (m.director||'').toLowerCase().includes(searchVal) || (m.network||'').toLowerCase().includes(searchVal)).filter(m => currentTvFilter === 'all' || m.status === currentTvFilter);
            sortList(list, document.getElementById('tvSortOrder')?.value); injectCardMatrix(list, grid);
        }
        function renderMovieGrid() {
            const grid = document.getElementById('moviesDatabaseGrid'); if (!grid) return; grid.innerHTML = '';
            let movieList = mediaDatabase.filter(m => m.type === 'Movie');
            const searchVal = document.getElementById('movieSearchBar')?.value.toLowerCase() || '';
            let list = movieList.filter(m => (m.name||'').toLowerCase().includes(searchVal) || (m.director||'').toLowerCase().includes(searchVal) || (m.network||'').toLowerCase().includes(searchVal)).filter(m => currentMovieFilter === 'all' || m.status === currentMovieFilter);
            sortList(list, document.getElementById('movieSortOrder')?.value); injectCardMatrix(list, grid);
        }
        function sortList(list, sortVal) {
            if (sortVal === 'alpha') list.sort((a,b) => (a.name||'').localeCompare(b.name||''));
            if (sortVal === 'year') list.sort((a,b) => parseInt(b.year||0) - parseInt(a.year||0));
        }

        function injectCardMatrix(list, element) {
            if (list.length === 0) { element.innerHTML = '<div style="padding:20px; opacity:0.5;">Empty folder slot.</div>'; return; }
            list.forEach(item => {
                const card = document.createElement('div'); card.className = 'media-card';
                card.innerHTML = `
                    <div class="poster-frame" onclick="openModal(${item.id})">${item.posterPath ? `<img class="poster-img" src="https://image.tmdb.org/t/p/w500${item.posterPath}">` : '🎬'}</div>
                    <div class="card-details-pane">
                        <div class="media-title" onclick="openModal(${item.id})" style="cursor:pointer;">${item.name}</div>
                        <div class="media-meta">${item.genre || 'Speculative'}</div>
                        <div class="progress-container"><div class="progress-bar" style="width: ${item.status==='completed'?'100%':'35%'}"></div></div>
                    </div>
                `;
                element.appendChild(card);
            });
        }

        function renderBookGrid() {
            const grid = document.getElementById('bookLibraryDatabaseGrid'); if (!grid) return; grid.innerHTML = '';
            const searchVal = document.getElementById('bookSearchBar')?.value.toLowerCase() || '';
            let list = bookDatabase.filter(b => (b.title||'').toLowerCase().includes(searchVal) || (b.author||'').toLowerCase().includes(searchVal)).filter(b => currentBookFilter === 'all' || b.status === currentBookFilter);
            if (list.length === 0) { grid.innerHTML = '<div style="padding:20px; opacity:0.5;">No books match layout.</div>'; return; }
            list.forEach(book => {
                const card = document.createElement('div'); card.className = 'media-card';
                card.innerHTML = `
                    <div class="poster-frame" onclick="openModal(${book.id}, 'book')"><img class="poster-img" src="https://covers.openlibrary.org/b/title/${encodeURIComponent(book.title)}-M.jpg" onerror="this.style.display='none';"></div>
                    <div class="card-details-pane"><div class="media-title" onclick="openModal(${book.id}, 'book')" style="cursor:pointer;">${book.title}</div><div class="media-meta">By ${book.author}</div></div>
                `;
                grid.appendChild(card);
            });
        }

        function importStoryGraphData(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result; const rows = []; let currentRow = []; let currentCell = ''; let insideQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    if (char === '"') { insideQuotes = !insideQuotes; }
                    else if (char === ',' && !insideQuotes) { currentRow.push(currentCell.trim()); currentCell = ''; }
                    else if ((char === '\r' || char === '\n') && !insideQuotes) { currentRow.push(currentCell.trim()); if (currentRow.join('').length > 0) rows.push(currentRow); currentRow = []; currentCell = ''; }
                    else { currentCell += char; }
                }
                const headers = rows[0].map(h => h.toLowerCase());
                const titleIdx = headers.indexOf('title'), authorIdx = headers.findIndex(h => h.includes('author')), formatIdx = headers.indexOf('format'), statusIdx = headers.indexOf('status'), seriesIdx = headers.findIndex(h => h.includes('series')), publisherIdx = headers.findIndex(h => h.includes('publisher'));
                let newBooks = [];
                for (let i = 1; i < rows.length; i++) {
                    const cells = rows[i]; if (!cells[titleIdx]) continue;
                    newBooks.push({ id: Date.now() + Math.random(), title: cells[titleIdx], author: authorIdx !== -1 && cells[authorIdx] ? cells[authorIdx] : 'Unknown Author', format: formatIdx !== -1 && cells[formatIdx] ? cells[formatIdx].toLowerCase() : 'print', status: statusIdx !== -1 && cells[statusIdx] ? cells[statusIdx].toLowerCase() : 'read', series: seriesIdx !== -1 && cells[seriesIdx] ? cells[seriesIdx] : '', publisher: publisherIdx !== -1 && cells[publisherIdx] ? cells[publisherIdx] : '' });
                }
                bookDatabase = newBooks; localStorage.setItem('vault_book_db', JSON.stringify(bookDatabase)); renderBookGrid();
            };
            reader.readAsText(file);
        }

        // --- EXHAUSTIVE DEEP CLOUD SYNC ENGINE WITH TMDB ACTOR DATA PACK CORES ---
        window.pullTraktUserHistoryStream = async function() {
            const statusLog = document.getElementById('traktStatusLog');
            if (!traktAccessToken) { statusLog.innerText = "Error: Please link Trakt first!"; return; }
            statusLog.innerText = "Synchronizing deep media stream...";
            const tmdbKey = localStorage.getItem('tmdb_api_key') || '';
            let updatedEntries = [...mediaDatabase];

            try {
                let page = 1; let keepScanning = true; const limitPerPage = 50;
                while (keepScanning) {
                    statusLog.innerText = `Ingesting logs: Page ${page}`;
                    const response = await fetch(`https://api.trakt.tv/sync/history?limit=${limitPerPage}&page=${page}`, {
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${traktAccessToken}`, 'trakt-api-version': '2', 'trakt-api-key': document.getElementById('traktClientIdInput').value.trim() }
                    });
                    if (!response.ok) break;
                    const data = await response.json();
                    if (!data || data.length === 0) break;

                    let changes = false;
                    for (const record of data) {
                        const type = record.type;
                        let name = type === 'movie' ? record.movie.title : record.show.title;
                        let year = type === 'movie' ? record.movie.year : record.show.year;
                        let tmdbId = type === 'movie' ? record.movie.ids.tmdb : record.show.ids.tmdb;
                        
                        if (!name) continue;
                        if (!updatedEntries.some(m => m.name.toLowerCase() === name.toLowerCase())) {
                            let posterPath = '', overview = '', network = '', director = '', actors = '', actorsData = '', seasonsData = '';
                            
                            if (tmdbKey && tmdbId) {
                                try {
                                    const tmdbType = type === 'movie' ? 'movie' : 'tv';
                                    const detailsRes = await fetch(`https://api.themoviedb.org/3/${tmdbType}/${tmdbId}?api_key=${tmdbKey}&append_to_response=credits`);
                                    if (detailsRes.ok) {
                                        const t = await detailsRes.json();
                                        posterPath = t.poster_path || ''; overview = t.overview || '';
                                        network = type === 'movie' ? (t.production_companies?.[0]?.name || '') : (t.networks?.[0]?.name || '');
                                        
                                        if (t.seasons) {
                                            seasonsData = JSON.stringify(t.seasons.map(s => ({ name: s.name, episode_count: s.episode_count, season_number: s.season_number, air_year: s.air_date ? s.air_date.split('-')[0] : '' })));
                                        }
                                        if (t.credits) {
                                            actorsData = JSON.stringify(t.credits.cast?.slice(0, 10).map(c => ({ name: c.name, profile: c.profile_path })));
                                        }
                                    }
                                } catch (e) {}
                            }
                            updatedEntries.push({ id: Date.now() + Math.random(), name, year, tmdbId, type: type==='movie'?'Movie':'TV', status: 'all', posterPath, overview, network, director, actorsData, seasonsData });
                            changes = true;
                        }
                    }
                    if (changes) { mediaDatabase = updatedEntries; localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase)); }
                    if (data.length < limitPerPage) keepScanning = false; else page++;
                }
                statusLog.innerText = "Sync Complete!"; renderGrid(); renderTvGrid(); renderMovieGrid();
            } catch (err) { console.error(err); }
        };

        // --- RETROACTIVE ADAPTER PARSER ENGINE FOR IMAGES AND INTERACTIVE PROFILES ---
        window.repairExistingMediaMetadata = async function() {
            const statusLog = document.getElementById('traktStatusLog');
            const tmdbKey = localStorage.getItem('tmdb_api_key');
            if (!tmdbKey) return alert("Please input your TMDB API Key first, Marcus!");

            statusLog.innerText = "Running full visual cast metadata scrap repair loop...";
            let changesMade = false;

            for (let item of mediaDatabase) {
                if (!item.actorsData || !item.tmdbId || !item.seasonsData) {
                    try {
                        statusLog.innerText = `Scraping Cast Assets: ${item.name}...`;
                        const searchType = item.type === 'Movie' ? 'movie' : 'tv';
                        const searchRes = await fetch(`https://api.themoviedb.org/3/search/${searchType}?api_key=${tmdbKey}&query=${encodeURIComponent(item.name)}`);
                        
                        if (searchRes.ok) {
                            const searchData = await searchRes.json();
                            if (searchData.results && searchData.results.length > 0) {
                                const tmdbId = searchData.results[0].id;
                                item.tmdbId = tmdbId;
                                const detailsRes = await fetch(`https://api.themoviedb.org/3/${searchType}/${tmdbId}?api_key=${tmdbKey}&append_to_response=credits`);
                                
                                if (detailsRes.ok) {
                                    const t = await detailsRes.json();
                                    item.network = item.type === 'Movie' ? (t.production_companies?.[0]?.name || '') : (t.networks?.[0]?.name || '');
                                    if (t.overview) item.overview = t.overview;
                                    if (t.poster_path) item.posterPath = t.poster_path;
                                    
                                    if (t.seasons) {
                                        item.seasonsData = JSON.stringify(t.seasons.map(s => ({ name: s.name, episode_count: s.episode_count, season_number: s.season_number, air_year: s.air_date ? s.air_date.split('-')[0] : '' })));
                                    }
                                    if (t.credits) {
                                        item.director = item.type === 'Movie' ? (t.credits.crew?.find(c => c.job === 'Director')?.name || '') : (t.created_by?.[0]?.name || '');
                                        item.actorsData = JSON.stringify(t.credits.cast?.slice(0, 10).map(c => ({ name: c.name, profile: c.profile_path })));
                                    }
                                    changesMade = true;
                                }
                            }
                        }
                        await new Promise(r => setTimeout(r, 120));
                    } catch (err) {}
                }
            }
            if (changesMade) { localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase)); renderGrid(); renderTvGrid(); renderMovieGrid(); alert("Handshake complete: Visual actor nodes and episodes synced successfully!"); }
            else { alert("All library assets fully optimized, Marcus!"); }
            statusLog.innerText = "Status: Standby (Connected)";
        };

        window.initializeTraktDeviceAuth = function() {
            const clientId = document.getElementById('traktClientIdInput').value.trim();
            const clientSecret = document.getElementById('traktClientSecretInput').value.trim();
            localStorage.setItem('trakt_client_id', clientId); localStorage.setItem('trakt_client_secret', clientSecret);
            document.getElementById('traktAuthUrl').href = `https://trakt.tv/oauth/authorize?response_type=code&client_id=${clientId}&redirect_uri=urn:ietf:wg:oauth:2.0:oob`;
            document.getElementById('traktPinGroup').style.display = 'flex';
        };

        window.exchangeTraktPinForToken = function() {
            fetch('https://api.trakt.tv/oauth/token', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: document.getElementById('traktPinInput').value.trim(), client_id: localStorage.getItem('trakt_client_id'), client_secret: localStorage.getItem('trakt_client_secret'), redirect_uri: 'urn:ietf:wg:oauth:2.0:oob', grant_type: 'authorization_code' })
            }).then(r => r.json()).then(data => { traktAccessToken = data.access_token; localStorage.setItem('trakt_access_token', traktAccessToken); document.getElementById('traktStatusLog').innerText = "Status: Connected!"; document.getElementById('traktPinGroup').style.display = 'none'; });
        };

        window.addEventListener('load', () => {
            if (localStorage.getItem('vault_media_db')) mediaDatabase = JSON.parse(localStorage.getItem('vault_media_db'));
            if (localStorage.getItem('vault_book_db')) bookDatabase = JSON.parse(localStorage.getItem('vault_book_db'));
            if (localStorage.getItem('trakt_access_token')) traktAccessToken = localStorage.getItem('trakt_access_token');
            if (localStorage.getItem('tmdb_api_key')) document.getElementById('tmdbApiKeyInput').value = localStorage.getItem('tmdb_api_key');
            renderGrid(); renderTvGrid(); renderMovieGrid(); renderBookGrid();
        });
    </script>
