<!DOCTYPE html>
<html lang="en">
<head>
    <!-- SECTION 1: METADATA & FULL-SCREEN OVERLAYS -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Entertainment Vault</title>

    <style>
        /* SECTION 2: THEME DESIGN SYSTEM (CSS CORES) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color, #020208); color: var(--text-color, #00ffcc); font-family: sans-serif; padding-bottom: 90px; min-height: 100vh; }

        /* THEME VARIATION BLOCKS: Defines color variables for different UI styles */
        [data-theme="cyberpunk"] { --bg-color: #020208; --panel-bg: rgba(10, 12, 32, 0.96); --text-color: #00ffcc; --accent-color: #ff007f; --border-color: #00ffcc; --card-bg: rgba(16, 20, 48, 0.92); }
        [data-theme="star-trek"] { --bg-color: #05070f; --panel-bg: rgba(12, 17, 34, 0.95); --text-color: #e2e8f0; --accent-color: #ff9900; --border-color: #4a5568; --card-bg: rgba(19, 26, 48, 0.85); }
        [data-theme="steampunk"] { --bg-color: #1a0f0d; --panel-bg: rgba(33, 22, 18, 0.97); --text-color: #fcefde; --accent-color: #e5a93b; --border-color: #8c5827; --card-bg: rgba(46, 32, 26, 0.9); }
        [data-theme="tvtime-dark"] { --bg-color: #141414; --panel-bg: #1f1f1f; --text-color: #ffffff; --accent-color: #e50914; --border-color: #333333; --card-bg: #181818; }
        [data-theme="tvtime-light"] { --bg-color: #f5f5f7; --panel-bg: #ffffff; --text-color: #1d1d1f; --accent-color: #0066cc; --border-color: #d2d2d7; --card-bg: #ffffff; }

        /* SECTION 3: LAYOUT DESIGN BLUEPRINT STYLES */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border-color, #00ffcc); margin-bottom: 15px; }
        header h1 { font-size: 1.5rem; }
        .header-controls { display: flex; gap: 12px; align-items: center; }
        .theme-dropdown { background: #111; color: inherit; border: 1px solid var(--border-color); padding: 8px; border-radius: 4px; }
        .control-filter-deck { display: flex; gap: 10px; padding: 0 15px 15px 15px; align-items: center; flex-wrap: wrap; }
        .card-select, input[type="text"], input[type="password"] { background: rgba(0,0,0,0.4); color: inherit; border: 1px solid var(--border-color, #00ffcc); padding: 10px; border-radius: 6px; font-size: 0.9rem; }
        .sub-nav-wrapper { padding: 0 15px; margin-bottom: 15px; overflow-x: auto; }
        .sub-nav { display: flex; gap: 8px; white-space: nowrap; }
        .sub-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color, #00ffcc); color: inherit; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; }
        .sub-btn.active { background: var(--accent-color, #ff007f); color: #000; font-weight: bold; }
        .cinema-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; gap: 12px !important; padding: 12px !important; }
        .media-card { background: rgba(20, 20, 35, 0.65); border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; height: 270px !important; transition: transform 0.2s ease; }
        .media-card:hover { transform: translateY(-4px); }
        .poster-frame { width: 100% !important; height: 190px !important; background: rgba(0, 0, 0, 0.4); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .poster-img { width: 100%; height: 100%; object-fit: cover; }
        .card-details-pane { padding: 6px 8px !important; display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1; }
        .media-title { font-size: 0.8rem !important; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .media-meta { font-size: 0.68rem !important; opacity: 0.7; margin-bottom: 2px; }
        
        /* SECTION 6: MODAL OVERLAYS */
        .modal-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .modal-canvas.active { display: flex; }
        .modal-box { background: #090b1e; border: 2px solid var(--border-color, #00ffcc); width: 98%; max-width: 1100px; max-height: 90vh; border-radius: 14px; padding: 24px; display: flex; flex-direction: column; gap: 16px; color: #fff; position: relative; }
        .side-drawer { position: fixed; top: 0; right: -360px; width: 360px; height: 100vh; background: #0a0c20; border-left: 2px solid var(--border-color); z-index: 9999; transition: right 0.3s ease; padding: 20px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; color: #fff; }
        .side-drawer.open { right: 0; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.85rem; font-weight: bold; }
        .btn { background: var(--accent-color, #ff007f); color: #000; font-weight: bold; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; text-align: center; width: 100%; transition: opacity 0.2s; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #04040a; border-top: 3px solid var(--border-color); height: 65px; align-items: center; justify-content: space-around; padding: 0 10px; z-index: 1000; }
        .nav-item { color: inherit; padding: 10px; cursor: pointer; font-weight: bold; font-size: 0.9rem; flex: 1; text-align: center; }
        .nav-item.active { background: var(--accent-color); color: #000; border-radius: 8px 8px 0 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .gear-btn { background: rgba(255,255,255,0.08); border: 1px solid var(--border-color); color: #fff; font-weight: bold; font-size: 0.88rem; padding: 8px 14px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    </style>
</head>
<body data-theme="cyberpunk">

    <header>
        <h1 id="vaultHeaderTitle">Entertainment Vault</h1>
        <div class="header-controls">
            <button class="sub-btn" style="background: var(--accent-color, #ff007f); color: #000; font-weight: bold;" onclick="toggleDrawer(true)">+ Add Title</button>
            <select class="theme-dropdown" onchange="changeTheme(this.value)">
                <option value="cyberpunk">Cyberpunk Neon</option>
                <option value="star-trek">Star Trek Command</option>
                <option value="steampunk">Steampunk Brass</option>
                <option value="tvtime-dark">TV Time Dark</option>
                <option value="tvtime-light">TV Time Light</option>
            </select>
            <button class="gear-btn" onclick="switchTab('settingsTab')">⚙️ Control Engine</button>
        </div>
    </header>

    <!-- DRAWER: Panel for manually adding new media titles -->
    <div id="addMediaDrawer" class="side-drawer">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3>Add New Media Entry</h3>
            <button onclick="toggleDrawer(false)" style="background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer;">✕</button>
        </div>
        <div class="form-group"><label>Title Name</label><input type="text" id="addTitle" placeholder="e.g., Stargate SG-1"></div>
        <div class="form-group"><label>Category Type</label><select id="addType" class="card-select"><option value="TV">TV Series</option><option value="Movie">Movie</option></select></div>
        <div class="form-group"><label>Genres</label><input type="text" id="addGenre" placeholder="Sci-Fi, Adventure"></div>
        <div class="form-group"><label>Folder Tracking Section</label><select id="addStatus" class="card-select"><option value="all">Main Collection</option><option value="watching">Currently Watching</option><option value="waiting">Waiting for Season</option><option value="find">Stuff to Find</option><option value="completed">Completed Log</option></select></div>
        <button class="btn" onclick="addNewItem()" style="margin-top: 10px;">Ingest Entry</button>
    </div>

    <main>
        <!-- TABS FOR CONTENT ORGANIZATION -->
        <div id="mediaTab" class="tab-content active">
            <div id="cinemaDatabaseGrid" class="cinema-grid"></div>
        </div>

        <div id="settingsTab" class="tab-content">
            <!-- SETTINGS: Panel for API keys and connection management -->
            <div style="background: var(--card-bg, rgba(16, 20, 48, 0.92)); border: 1px solid var(--border-color, #00ffcc); padding: 24px; border-radius: 12px; display: flex; flex-direction: column; gap: 20px; max-width: 550px; margin: 0 auto; box-shadow: 0 6px 20px rgba(0,0,0,0.4);">
                <h3 style="color: var(--text-color, #00ffcc); border-bottom: 1px solid var(--border-color, #00ffcc); padding-bottom: 10px;">Vault Engine Control Deck</h3>
                <div class="form-group">
                    <label>Trakt Client ID</label>
                    <input type="password" id="traktClientIdInput" oninput="saveSettings()" placeholder="Paste ID...">
                </div>
                <button class="btn" onclick="window.pullTraktUserHistoryStream()">🔄 Sync Watch History Stream</button>
                <div id="traktStatusLog" style="font-size: 0.85rem; text-align: center; color: var(--accent-color); font-weight: bold;">Status: Standby (Local Mode)</div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div id="navBtn-mediaTab" class="nav-item active" onclick="switchTab('mediaTab')">📺 All Media</div>
        <div id="navBtn-settingsTab" class="nav-item" onclick="switchTab('settingsTab')">⚙️ Settings</div>
    </nav>
  
    <!-- SECTION 9: APPLICATION FUNCTION LOGIC SCRIPT -->
    <script>
        // --- NUCLEAR RESET: Force clear connections on startup to prevent sync stalls ---
        localStorage.removeItem('trakt_access_token');

        // A. GLOBAL STATE: Main database array holding all media entries
        let mediaDatabase = [];

        // B. ADD NEW MEDIA ENTRY ENGINE: Takes user input and saves to local database
        window.addNewItem = function() {
            const name = document.getElementById('addTitle').value;
            const type = document.getElementById('addType').value;
            const genre = document.getElementById('addGenre').value;
            const status = document.getElementById('addStatus').value;

            if (!name) return alert("Please enter a title!");

            const newItem = { id: Date.now(), name: name, type: type, genre: genre, status: status };
            mediaDatabase.push(newItem);
            localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
            
            toggleDrawer(false);
            renderGrid();
            alert("Ingested: " + name);
        };

        // C. LOAD ENGINE: Automatically loads saved media and populates UI on launch
        window.onload = () => {
            const savedData = localStorage.getItem('vault_media_db');
            if (savedData) {
                mediaDatabase = JSON.parse(savedData);
            }
            renderGrid();
        };

        // D. DISPLAY ENGINE: Draws the cards on the screen based on the database
        function renderGrid() {
            const grid = document.getElementById('cinemaDatabaseGrid');
            grid.innerHTML = ''; 
            
            mediaDatabase.forEach(item => {
                const card = document.createElement('div');
                card.className = 'media-card';
                card.innerHTML = `
                    <div class="poster-frame"><span>No Poster</span></div>
                    <div class="card-details-pane">
                        <div class="media-title">${item.name}</div>
                        <div class="media-meta">${item.type} • ${item.genre}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // E. NAVIGATION: Manages switching between different dashboard tabs
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId)?.classList.add('active');
            document.getElementById('navBtn-' + tabId)?.classList.add('active');
        }

        // F. UTILITIES: Handles drawer and theme toggles
        function changeTheme(themeValue) { document.body.setAttribute('data-theme', themeValue); }
        function toggleDrawer(openState) { document.getElementById('addMediaDrawer').classList.toggle('open', openState); }
        function saveSettings() { /* Logic to persist API keys to localStorage */ }
    </script>
</body>
</html>
