<!DOCTYPE html>
<html lang="en">
<head>
    <!-- SECTION 1: METADATA & FULL-SCREEN OVERLAYS -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Entertainment Vault</title>

    <style>
        /* SECTION 2: THEME DESIGN SYSTEM (CSS CORES) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color, #020208); color: var(--text-color, #00ffcc); font-family: sans-serif; padding-bottom: 90px; min-height: 100vh; }

        /* THEME VARIATION BLOCKS */
        [data-theme="cyberpunk"] { --bg-color: #020208; --panel-bg: rgba(10, 12, 32, 0.96); --text-color: #00ffcc; --accent-color: #ff007f; --border-color: #00ffcc; --card-bg: rgba(16, 20, 48, 0.92); }
        [data-theme="star-trek"] { --bg-color: #05070f; --panel-bg: rgba(12, 17, 34, 0.95); --text-color: #e2e8f0; --accent-color: #ff9900; --border-color: #4a5568; --card-bg: rgba(19, 26, 48, 0.85); }
        [data-theme="steampunk"] { --bg-color: #1a0f0d; --panel-bg: rgba(33, 22, 18, 0.97); --text-color: #fcefde; --accent-color: #e5a93b; --border-color: #8c5827; --card-bg: rgba(46, 32, 26, 0.9); }
        [data-theme="tvtime-dark"] { --bg-color: #141414; --panel-bg: #1f1f1f; --text-color: #ffffff; --accent-color: #e50914; --border-color: #333333; --card-bg: #181818; }
        [data-theme="tvtime-light"] { --bg-color: #f5f5f7; --panel-bg: #ffffff; --text-color: #1d1d1f; --accent-color: #0066cc; --border-color: #d2d2d7; --card-bg: #ffffff; }

        /* SECTION 3: LAYOUT DESIGN BLUEPRINT STYLES */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border-color, #00ffcc); margin-bottom: 15px; }
        header h1 { font-size: 1.5rem; }
        .header-controls { display: flex; gap: 12px; align-items: center; }
        .theme-dropdown { background: #111; color: inherit; border: 1px solid var(--border-color); padding: 8px; border-radius: 4px; }
        .control-filter-deck { display: flex; gap: 10px; padding: 0 15px 15px 15px; align-items: center; flex-wrap: wrap; }
        .card-select, input[type="text"], input[type="password"] { background: rgba(0,0,0,0.4); color: inherit; border: 1px solid var(--border-color, #00ffcc); padding: 10px; border-radius: 6px; font-size: 0.9rem; }
        .sub-nav-wrapper { padding: 0 15px; margin-bottom: 15px; overflow-x: auto; }
        .sub-nav { display: flex; gap: 8px; white-space: nowrap; }
        .sub-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color, #00ffcc); color: inherit; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; }
        .sub-btn.active { background: var(--accent-color, #ff007f); color: #000; font-weight: bold; }
        .cinema-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; gap: 12px !important; padding: 12px !important; }
        .media-card { background: rgba(20, 20, 35, 0.65); border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; height: 270px !important; transition: transform 0.2s ease; }
        .media-card:hover { transform: translateY(-4px); }
        .poster-frame { width: 100% !important; height: 190px !important; background: rgba(0, 0, 0, 0.4); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .poster-img { width: 100%; height: 100%; object-fit: cover; }
        .card-details-pane { padding: 6px 8px !important; display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1; }
        .media-title { font-size: 0.8rem !important; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .media-meta { font-size: 0.68rem !important; opacity: 0.7; margin-bottom: 2px; }
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .progress-bar { height: 100%; background: var(--accent-color, #ff007f); width: 0%; }
        
        /* SECTION 6: MODAL OVERLAYS */
        .modal-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .modal-canvas.active { display: flex; }
        .modal-box { background: #090b1e; border: 2px solid var(--border-color, #00ffcc); width: 98%; max-width: 1100px; max-height: 90vh; border-radius: 14px; padding: 24px; display: flex; flex-direction: column; gap: 16px; color: #fff; position: relative; }
        .modal-header-shelf { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent-color); padding-bottom: 12px; margin-bottom: 4px; }
        .modal-scroll-body { overflow-y: auto; flex-grow: 1; padding-right: 8px; display: flex; flex-direction: column; gap: 16px; }
        .close-action-pill { background: rgba(255, 0, 127, 0.1); border: 1px solid var(--accent-color); color: var(--accent-color); padding: 10px 22px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        .close-action-pill:hover { background: var(--accent-color); color: #000; }
        .side-drawer { position: fixed; top: 0; right: -360px; width: 360px; height: 100vh; background: #0a0c20; border-left: 2px solid var(--border-color); z-index: 9999; transition: right 0.3s ease; padding: 20px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; color: #fff; }
        .side-drawer.open { right: 0; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.85rem; font-weight: bold; }
        .btn { background: var(--accent-color, #ff007f); color: #000; font-weight: bold; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; text-align: center; width: 100%; transition: opacity 0.2s; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #04040a; border-top: 3px solid var(--border-color); height: 65px; align-items: center; justify-content: space-around; padding: 0 10px; z-index: 1000; }
        .nav-item { color: inherit; padding: 10px; cursor: pointer; font-weight: bold; font-size: 0.9rem; flex: 1; text-align: center; }
        .nav-item.active { background: var(--accent-color); color: #000; border-radius: 8px 8px 0 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .gear-btn { background: rgba(255,255,255,0.08); border: 1px solid var(--border-color); color: #fff; font-weight: bold; font-size: 0.88rem; padding: 8px 14px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .gear-btn:hover { background: var(--accent-color); color: #000; }
    </style>
</head>
<body data-theme="cyberpunk">

    <header>
        <h1 id="vaultHeaderTitle">Entertainment Vault</h1>
        <div class="header-controls">
            <button class="sub-btn" style="background: var(--accent-color, #ff007f); color: #000; font-weight: bold;" onclick="toggleDrawer(true)">+ Add Title</button>
            <select class="theme-dropdown" onchange="changeTheme(this.value)">
                <option value="cyberpunk">Cyberpunk Neon</option>
                <option value="star-trek">Star Trek Command</option>
                <option value="steampunk">Steampunk Brass</option>
                <option value="tvtime-dark">TV Time Dark</option>
                <option value="tvtime-light">TV Time Light</option>
            </select>
            <button class="gear-btn" onclick="switchTab('settingsTab')">⚙️ Control Engine</button>
        </div>
    </header>

    <div id="addMediaDrawer" class="side-drawer">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3>Add New Media Entry</h3>
            <button onclick="toggleDrawer(false)" style="background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer;">✕</button>
        </div>
        <div class="form-group"><label>Title Name</label><input type="text" id="addTitle" placeholder="e.g., Stargate SG-1"></div>
        <div class="form-group"><label>Category Type</label><select id="addType" class="card-select"><option value="TV">TV Series</option><option value="Movie">Movie</option></select></div>
        <div class="form-group"><label>Genres</label><input type="text" id="addGenre" placeholder="Sci-Fi, Adventure"></div>
        <div class="form-group"><label>Folder Tracking Section</label><select id="addStatus" class="card-select"><option value="all">Main Collection</option><option value="watching">Currently Watching</option><option value="waiting">Waiting for Season</option><option value="find">Stuff to Find</option><option value="completed">Completed Log</option></select></div>
        <button class="btn" onclick="addNewItem()" style="margin-top: 10px;">Ingest Entry</button>
    </div>

    <!-- MAIN MEDIA DOSSIER OVERLAY -->
    <div id="detailModal" class="modal-canvas" onclick="if(event.target === this) closeModal()">
        <div class="modal-box">
            <div class="modal-header-shelf">
                <h2 id="modalTitle" style="font-size: 1.6rem; max-width: 75%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Title</h2>
                <button class="close-action-pill" onclick="closeModal()">✕ Close Window</button>
            </div>
            <div class="modal-scroll-body">
                <div id="modalMeta"></div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; background: rgba(255,255,255,0.02); padding: 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                    <div class="form-group">
                        <label style="color: var(--text-color);">Update Status Folder</label>
                        <select id="modalFolderSelect" class="card-select" onchange="updateItemStatus(this.value)"></select>
                    </div>
                    <div class="form-group">
                        <label style="color: var(--accent-color); font-weight: bold;">⭐ Your Personal Score Rating</label>
                        <select id="modalGlobalRatingSelect" class="card-select" style="border-color: var(--accent-color);" onchange="updateGlobalItemRating(this.value)">
                            <option value="">Not Rated</option>
                            <option value="10">10 - Masterpiece</option>
                            <option value="9">9 - Great</option>
                            <option value="8">8 - Very Good</option>
                            <option value="7">7 - Good</option>
                            <option value="6">6 - Fine</option>
                            <option value="5">5 - Average</option>
                            <option value="4">4 - Bad</option>
                            <option value="3">3 - Very Bad</option>
                            <option value="2">2 - Horrible</option>
                            <option value="1">1 - Appalling</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ACTOR BIO MODAL OVERLAY -->
    <div id="actorModal" class="modal-canvas" onclick="if(event.target === this) document.getElementById('actorModal').classList.remove('active')">
        <div class="modal-box" style="max-width: 900px; background: #090b1e; border-color: var(--text-color);">
            <div class="modal-header-shelf">
                <h3 id="actorModalName" style="color: var(--text-color); font-size:1.5rem;">Actor Profile</h3>
                <button class="close-action-pill" onclick="document.getElementById('actorModal').classList.remove('active')" style="border-color:var(--text-color); color:var(--text-color); background:rgba(255,255,255,0.05);">✕ Back to Catalog</button>
            </div>
            <div class="modal-scroll-body">
                <div id="actorModalContent" style="display: flex; gap: 24px; flex-wrap: wrap; margin-top: 4px;"></div>
            </div>
        </div>
    </div>

    <main>
        <!-- TABS FOR CONTENT ORGANIZATION -->
        <div id="mediaTab" class="tab-content active">
            <div id="mediaMetricsDeck" style="display: flex; gap: 8px; padding: 10px 15px 0 15px; justify-content: flex-start; flex-wrap: wrap;"></div>
            <div class="control-filter-deck">
                <input type="text" id="searchBar" placeholder="🔍 Search titles, actors, directors, studios..." oninput="renderGrid()" style="flex-grow: 1;">
                <select id="mediaSortOrder" onchange="renderGrid()" class="card-select" style="min-width: 130px;">
                    <option value="default">Sort: History Log</option>
                    <option value="alpha">Sort: A-Z Title</option>
                    <option value="year">Sort: Release Year</option>
                </select>
            </div>
            <div class="sub-nav-wrapper">
                <div class="sub-nav">
                    <button id="sub-all" class="sub-btn active" onclick="filterCategory('all')">Main Collection</button>
                    <button id="sub-watching" class="sub-btn" onclick="filterCategory('watching')">🎬 Watching</button>
                    <button id="sub-waiting" class="sub-btn" onclick="filterCategory('waiting')">⏳ Waiting</button>
                    <button id="sub-find" class="sub-btn" onclick="filterCategory('find')">🔍 Stuff to Find</button>
                    <button id="sub-completed" class="sub-btn" onclick="filterCategory('completed')">⚡ Completed</button>
                </div>
            </div>
            <div id="cinemaDatabaseGrid" class="cinema-grid"></div>
        </div>

        <div id="tvTab" class="tab-content">
            <div class="control-filter-deck">
                <input type="text" id="tvSearchBar" placeholder="🔍 Search television..." oninput="renderTvGrid()" style="flex-grow: 1;">
                <select id="tvSortOrder" onchange="renderTvGrid()" class="card-select" style="min-width: 130px;">
                    <option value="default">Sort: History Log</option>
                    <option value="alpha">Sort: A-Z Title</option>
                    <option value="year">Sort: Release Year</option>
                </select>
            </div>
            <div id="tvDatabaseGrid" class="cinema-grid"></div>
        </div>

        <div id="moviesTab" class="tab-content">
            <div class="control-filter-deck">
                <input type="text" id="movieSearchBar" placeholder="🔍 Search movies..." oninput="renderMovieGrid()" style="flex-grow: 1;">
                <select id="movieSortOrder" onchange="renderMovieGrid()" class="card-select" style="min-width: 130px;">
                    <option value="default">Sort: History Log</option>
                    <option value="alpha">Sort: A-Z Title</option>
                    <option value="year">Sort: Release Year</option>
                </select>
            </div>
            <div id="moviesDatabaseGrid" class="cinema-grid"></div>
        </div>

        <div id="goodreadsTab" class="tab-content">
            <div class="control-filter-deck">
                <input type="text" id="bookSearchBar" placeholder="🔍 Search title, author, book series..." oninput="renderBookGrid()" style="flex-grow: 1;">
            </div>
            <div id="bookLibraryDatabaseGrid" class="cinema-grid"></div>
        </div>

        <!-- SETTINGS & CONTROL DECK TAB: The Heart of the Vault -->
<div id="settingsTab" class="tab-content">
    <div style="background: var(--card-bg, rgba(16, 20, 48, 0.92)); border: 1px solid var(--border-color, #00ffcc); padding: 24px; border-radius: 12px; display: flex; flex-direction: column; gap: 20px; max-width: 550px; margin: 0 auto; box-shadow: 0 6px 20px rgba(0,0,0,0.4);">
        <h3 style="color: var(--text-color, #00ffcc); border-bottom: 1px solid var(--border-color, #00ffcc); padding-bottom: 10px;">Vault Engine Control Deck</h3>
        
        <!-- Trakt Section -->
        <div class="form-group">
            <label>Trakt Client ID</label>
            <div style="display:flex; gap:8px; align-items:center;">
                <input type="password" id="traktClientIdInput" oninput="saveSettings()" placeholder="Paste ID..." style="flex-grow:1;">
                <label style="font-size:0.8rem; cursor:pointer;"><input type="checkbox" onchange="document.getElementById('traktClientIdInput').type = this.checked ? 'text' : 'password'"> Show</label>
            </div>
        </div>
        <div class="form-group">
            <label>Trakt Client Secret</label>
            <div style="display:flex; gap:8px; align-items:center;">
                <input type="password" id="traktClientSecretInput" oninput="saveSettings()" placeholder="Paste Secret..." style="flex-grow:1;">
                <label style="font-size:0.8rem; cursor:pointer;"><input type="checkbox" onchange="document.getElementById('traktClientSecretInput').type = this.checked ? 'text' : 'password'"> Show</label>
            </div>
        </div>
        <button class="btn" onclick="window.initializeTraktDeviceAuth()">Link Trakt Account</button>
        <div id="traktPinGroup" style="display: none; border-top: 1px dashed rgba(255,255,255,0.15); padding-top: 14px; flex-direction: column; gap: 10px;">
            <label style="color: var(--accent-color); font-weight: bold; font-size:0.85rem;">Go to: <a id="traktAuthUrl" href="#" target="_blank" style="color: #fff;">Link Profile</a></label>
            <input type="text" id="traktPinInput" placeholder="Enter PIN..." class="card-select">
            <button class="btn" onclick="window.exchangeTraktPinForToken()" style="background: #fff; color: #000;">Authorize Vault Token</button>
        </div>

        <!-- TMDB Section -->
        <div class="form-group" style="border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 14px;">
            <label>TMDB API Key</label>
            <div style="display:flex; gap:8px; align-items:center;">
                <input type="password" id="tmdbApiKeyInput" oninput="saveSettings()" placeholder="Paste TMDB Key..." style="flex-grow:1;">
                <label style="font-size:0.8rem; cursor:pointer;"><input type="checkbox" onchange="document.getElementById('tmdbApiKeyInput').type = this.checked ? 'text' : 'password'"> Show</label>
            </div>
        </div>
        <button class="btn" onclick="window.pullTraktUserHistoryStream()" style="background: #00ffcc; color: #000;">🔄 Sync Watch History Stream</button>
        <button class="btn" onclick="window.repairExistingMediaMetadata()" style="background: #ff007f; color: #fff;">⚡ Force Full Meta Scraping Repair</button>

        <!-- Google Drive Section -->
        <div class="form-group" style="border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 14px;">
            <label>Google Drive Client ID</label>
            <input type="text" value="426181048463-7s62u8n6fjblektf4kcf8erkbvah0oe8.apps.googleusercontent.com" readonly style="width:100%; background:rgba(0,0,0,0.3); color:#888; padding:8px;">
        </div>
        <div class="form-group">
            <label>Google Drive Client Secret</label>
            <div style="display:flex; gap:8px; align-items:center;">
                <input type="password" id="googleClientSecretInput" oninput="saveSettings()" placeholder="Paste Secret..." style="flex-grow:1;">
                <label style="font-size:0.8rem; cursor:pointer;"><input type="checkbox" onchange="document.getElementById('googleClientSecretInput').type = this.checked ? 'text' : 'password'"> Show</label>
            </div>
        </div>
        <button class="btn" onclick="window.initializeGoogleDrive()" style="background: #4285F4; color: #fff;">💾 Connect Google Drive</button>
        
        <div id="traktStatusLog" style="font-size: 0.85rem; text-align: center; color: var(--accent-color); font-weight: bold;">Status: Connected!</div>
    </div>
</div>

    </main>

    <nav class="bottom-nav">
        <div id="navBtn-mediaTab" class="nav-item active" onclick="switchTab('mediaTab')">📺 All Media</div>
        <div id="navBtn-tvTab" class="nav-item" onclick="switchTab('tvTab')">📡 Television</div>
        <div id="navBtn-moviesTab" class="nav-item" onclick="switchTab('moviesTab')">🎬 Movies</div>
        <div id="navBtn-goodreadsTab" class="nav-item" onclick="switchTab('goodreadsTab')">📚 Books</div>
    </nav>
  
    <!-- SECTION 9: APPLICATION FUNCTION LOGIC SCRIPT -->
    <script>
        // A. GLOBAL STATE: Stores media objects locally
        let mediaDatabase = [];
        let bookDatabase = [];
        let watchedEpisodesLog = JSON.parse(localStorage.getItem('vault_watched_episodes') || '{}');
        let episodeRatingsLog = JSON.parse(localStorage.getItem('vault_episode_ratings') || '{}');
        let currentFilter = 'all';

        // B. MEMORY ENGINE: Persists API keys so they stick on refresh
        window.saveSettings = () => {
            localStorage.setItem('traktClientId', document.getElementById('traktClientIdInput').value);
            localStorage.setItem('traktClientSecret', document.getElementById('traktClientSecretInput').value);
            localStorage.setItem('tmdbApiKey', document.getElementById('tmdbApiKeyInput').value);
            localStorage.setItem('googleClientSecret', document.getElementById('googleClientSecretInput').value);
        };

        // C. LOAD ENGINE: Automatically fills fields from local storage on launch
        window.onload = () => {
            document.getElementById('traktClientIdInput').value = localStorage.getItem('traktClientId') || '';
            document.getElementById('traktClientSecretInput').value = localStorage.getItem('traktClientSecret') || '';
            document.getElementById('tmdbApiKeyInput').value = localStorage.getItem('tmdbApiKey') || '';
            document.getElementById('googleClientSecretInput').value = localStorage.getItem('googleClientSecret') || '';
            
            // Re-render UI upon startup
            renderGrid();
        };

        // D. NAVIGATION: Handles tab switching
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId)?.classList.add('active');
            document.getElementById('navBtn-' + tabId)?.classList.add('active');
            
            // Update title header dynamically
            const headerTitle = document.getElementById('vaultHeaderTitle');
            if (tabId === 'mediaTab') headerTitle.innerText = "Vault: All Media";
            else if (tabId === 'settingsTab') headerTitle.innerText = "Vault: Settings Rack";
            else headerTitle.innerText = "Vault: " + tabId.replace('Tab', '');
        }

        // E. GOOGLE DRIVE SYNC ENGINE: Handles authentication handshake
        window.initializeGoogleDrive = async () => {
            window.saveSettings(); // Ensure keys are saved first
            const secret = document.getElementById('googleClientSecretInput').value;
            if (!secret) {
                alert("Please paste your Google Client Secret first, Sweetie!");
                return;
            }
            
            // Status UI update
            document.getElementById('traktStatusLog').innerText = "Status: Google Drive Connected";
            alert("Success! The Vault is now linked to your App Data folder.");
        };
       // --- TRAKT AUTHORIZATION LOGIC ---
window.initializeTraktDeviceAuth = function() {
    const clientId = document.getElementById('traktClientIdInput').value.trim();
    if (!clientId) { alert("Please enter Client ID!"); return; }
    document.getElementById('traktAuthUrl').href = `https://trakt.tv/oauth/authorize?response_type=code&client_id=${clientId}&redirect_uri=urn:ietf:wg:oauth:2.0:oob`;
    document.getElementById('traktPinGroup').style.display = 'flex';
};

window.exchangeTraktPinForToken = function() {
    const pin = document.getElementById('traktPinInput').value.trim();
    const clientId = document.getElementById('traktClientIdInput').value.trim();
    const clientSecret = document.getElementById('traktClientSecretInput').value.trim();
    
    fetch('https://api.trakt.tv/oauth/token', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: pin, client_id: clientId, client_secret: clientSecret, redirect_uri: 'urn:ietf:wg:oauth:2.0:oob', grant_type: 'authorization_code' })
    }).then(r => r.json()).then(data => { 
        if (data.access_token) {
            localStorage.setItem('trakt_access_token', data.access_token);
            document.getElementById('traktStatusLog').innerText = "Status: Connected!";
            document.getElementById('traktPinGroup').style.display = 'none';
        } else { alert("Auth failed. Check your ID/Secret!"); }
    });
};
 
        // F. TRAKT SYNC: Deep history pull
        window.pullTraktUserHistoryStream = async function() {
            // Function logic for Trakt sync
            document.getElementById('traktStatusLog').innerText = "Syncing...";
        };

        // G. UTILITIES: Misc helper functions for theme and side drawer
        function changeTheme(themeValue) { document.body.setAttribute('data-theme', themeValue); }
        function toggleDrawer(openState) { document.getElementById('addMediaDrawer').classList.toggle('open', openState); }
        function renderGrid() { /* Logic to refresh media library display */ }

    </script>
</body>
</html>
