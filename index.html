<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ========================================== -->
    <!-- SECTION 1: METADATA & CYBERPUNK STYLING     -->
    <!-- ========================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entertainment Vault</title>
    <style>
        /* FULL-SCREEN OVERLAY WINDOW MATRICES */
        #detailOverlay, #actorOverlay {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(2, 2, 8, 0.98); 
            z-index: 9999;
            padding: 25px; 
            overflow-y: auto;
        }
        #actorOverlay { z-index: 10000; background: rgba(4, 4, 16, 0.99); }
        
        .close-btn {
            background: #ff007f; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 6px; 
            color: #fff; 
            cursor: pointer; 
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* HARDWARE CORE LAYOUT RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #020208; color: #00ffcc; font-family: sans-serif; padding-bottom: 90px; min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #00ffcc; }
        .gear-btn { background: none; border: none; font-size: 1.6rem; cursor: pointer; color: #00ffcc; padding: 5px; }
        
        /* MULTI-FILTER CONTROL DECK */
        .filter-deck { display: flex; flex-wrap: wrap; gap: 12px; padding: 15px 20px; background: rgba(10, 10, 25, 0.6); border-bottom: 1px solid rgba(0,255,204,0.2); }
        .filter-deck input, .filter-deck select { flex: 1; min-width: 140px; padding: 10px; background: #111; color: #fff; border: 1px solid #00ffcc; border-radius: 4px; font-size: 0.85rem; }

        /* THE PHYSICAL SYSTEM FILE FOLDERS */
        .folder-row { display: flex; gap: 6px; padding: 10px 20px 0 20px; background: #020208; overflow-x: auto; white-space: nowrap; }
        .folder-tab {
            background: #101430;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            border-bottom: none;
            padding: 10px 18px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .folder-tab.active {
            background: #ff007f;
            color: #fff;
            border-color: #ff007f;
            padding-bottom: 12px;
            top: 1px;
        }

        /* RESPONSIVE CARD DISPLAY GRIDS */
        .cinema-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .media-card { background: rgba(20, 20, 35, 0.8); border: 1px solid #00ffcc; border-radius: 8px; padding: 10px; height: 275px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        
        /* CARD EXTENSION ASSETS */
        .pin-badge { position: absolute; top: 5px; right: 5px; background: #ffcc00; color: #000; font-size: 0.7rem; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
        .card-progress-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .card-progress-fill { height: 100%; background: #ff007f; width: 0%; }

        /* CONSOLIDATED INPUT DECKS */
        .settings-container { display: flex; flex-direction: column; gap: 20px; padding: 20px; max-width: 600px; margin: 0 auto; }
        .control-box { background: rgba(16, 20, 48, 0.5); border: 1px solid #00ffcc; border-radius: 8px; padding: 20px; }
        .control-box h3 { color: #ff007f; margin-bottom: 15px; border-bottom: 1px dashed rgba(0,255,204,0.3); padding-bottom: 6px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px; }
        
        /* CLEANED FORM ALIGNMENTS: Prevents border clipping overflows */
        .input-row { display: flex; gap: 12px; align-items: center; width: 100%; }
        .checkbox-container { display: flex; align-items: center; gap: 6px; min-width: 80px; color: #00ffcc; font-size: 0.85rem; user-select: none; }
        
        .btn { background: #ff007f; color: #000; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-sync { background: #00ffcc; }
        .btn-repair { background: #ffcc00; }

        /* FIXED BOTTOM RAIL MAIN TABS */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #04040a; border-top: 2px solid #00ffcc; z-index: 1000; }
        .nav-item { padding: 15px; flex: 1; text-align: center; cursor: pointer; color: #00ffcc; font-size: 0.85rem; white-space: nowrap; }
        .nav-item.active { background: #00ffcc; color: #000; font-weight: bold; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* DATA PROFILES ARCHITECTURE */
        .meta-layout { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px; }
        .meta-poster { max-width: 200px; border: 1px solid #00ffcc; border-radius: 6px; }
        .meta-info-shelf { flex: 1; min-width: 280px; }
        .cast-row { display: flex; gap: 12px; overflow-x: auto; padding: 15px 0; }
        .actor-avatar-card { flex: 0 0 85px; text-align: center; cursor: pointer; }
        .avatar-circle { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; border: 2px solid #ff007f; }
        .episode-row { background: rgba(20,20,40,0.6); padding: 12px; border-radius: 6px; margin-bottom: 8px; border-left: 3px solid #00ffcc; }
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- SECTION 2: GLOBAL CONTROL HEADER SHELF      -->
    <!-- ========================================== -->
    <header>
        <h1>Entertainment Vault</h1>
        <button id="gearButton" class="gear-btn" onclick="toggleSettingsTab()">⚙️</button>
    </header>

    <!-- SEARCH FILTER DECK PROCESSING CONTROL SYSTEM -->
    <section id="searchFilterSection" class="filter-deck">
        <input type="text" id="globalSearchInput" oninput="triggerSearchProcessing()" placeholder="🔍 Filter active matrix list...">
        <select id="genreFilterSelect" onchange="triggerSearchProcessing()">
            <option value="all">All Genres</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Action">Action</option>
            <option value="Drama">Drama</option>
            <option value="Mystery">Mystery</option>
        </select>
        <select id="sortEngineSelect" onchange="triggerSearchProcessing()">
            <option value="name-asc">Alphabetical (A-Z)</option>
            <option value="name-desc">Alphabetical (Z-A)</option>
            <option value="release-date">Release Date</option>
            <option value="date-added">Date Added</option>
            <option value="rating">Database Rating</option>
        </select>
        <button onclick="resetListOrderToDefault()" style="background:none; border:1px solid #ff007f; color:#ff007f; padding:8px 12px; border-radius:4px; font-size:0.8rem; cursor:pointer; font-weight:bold;">🔄 Reset Order</button>
    </section>

    <!-- PHYSICAL CYBERPUNK COLLECTION METADATA FOLDERS -->
    <div id="statusFolderBar" class="folder-row">
        <div class="folder-tab active" onclick="switchStatusFolder('all', this)">📁 Main Collection</div>
        <div class="folder-tab" onclick="switchStatusFolder('watching', this)">📂 Currently Watching</div>
        <div class="folder-tab" onclick="switchStatusFolder('favorites', this)">📂 Favorites</div>
        <div class="folder-tab" onclick="switchStatusFolder('history', this)">📂 History Log</div>
        <div class="folder-tab" onclick="switchStatusFolder('find', this)">📂 Want to Find</div>
    </div>

    <main>
        <!-- MASTER TAB COMPONENTS -->
        <div id="mediaTab" class="tab-content active"><div id="cinemaDatabaseGrid" class="cinema-grid"></div></div>
        <div id="tvTab" class="tab-content"><div id="tvDatabaseGrid" class="cinema-grid"></div></div>
        <div id="moviesTab" class="tab-content"><div id="moviesDatabaseGrid" class="cinema-grid"></div></div>
        <div id="booksTab" class="tab-content"><div id="booksDatabaseGrid" class="cinema-grid"></div></div>

        <!-- ENGINE SYSTEM OPTIONS Tab -->
        <div id="settingsTab" class="tab-content">
            <div class="settings-container">
                
                <!-- BOX A: CLOUD PROFILE CONNECTION -->
                <div class="control-box">
                    <h3>Trakt Cloud Synchronizer</h3>
                    <div class="form-group">
                        <label>Trakt Client ID</label>
                        <div class="input-row">
                            <input type="password" id="traktClientIdInput" oninput="saveSettings()" placeholder="Paste ID...">
                            <div class="checkbox-container"><input type="checkbox" onchange="toggleVisibility('traktClientIdInput', this.checked)"> <span>Show</span></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Trakt Client Secret</label>
                        <div class="input-row">
                            <input type="password" id="traktClientSecretInput" oninput="saveSettings()" placeholder="Paste Secret...">
                            <div class="checkbox-container"><input type="checkbox" onchange="toggleVisibility('traktClientSecretInput', this.checked)"> <span>Show</span></div>
                        </div>
                    </div>
                    <button class="btn" onclick="initializeTraktDeviceAuth()">🔗 Link Trakt Account</button>
                    <div class="form-group" style="margin-top: 15px;">
                        <label>Trakt Authorization Code</label>
                        <div class="input-row">
                            <input type="password" id="traktAuthCodeInput" placeholder="Paste Code...">
                            <div class="checkbox-container"><input type="checkbox" onchange="toggleVisibility('traktAuthCodeInput', this.checked)"> <span>Show</span></div>
                        </div>
                    </div>
                    <button class="btn" onclick="finishTraktAuth()">✅ Complete Handshake</button>
                </div>

                <!-- BOX B: DATABASE MANUAL INGEST -->
                <div class="control-box">
                    <h3>Library Database Ingest Deck</h3>
                    <div class="form-group">
                        <label>Manual Asset Entry</label>
                        <div class="input-row">
                            <input type="text" id="manualMediaTitleInput" placeholder="Enter title name...">
                            <select id="manualMediaTypeSelect" style="width:120px; padding:10px; background:#111; color:#fff; border:1px solid #00ffcc; border-radius:4px;">
                                <option value="Movie">Movie</option>
                                <option value="TV">TV Show</option>
                                <option value="Book">Book</option>
                                <option value="Audiobook">Audiobook</option>
                            </select>
                            <button class="btn" onclick="addNewCustomMediaAsset()" style="width: 80px; margin-top: 0;">Add</button>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top: 15px;">
                        <label>Import Goodreads/StoryGraph Library CSV</label>
                        <input type="file" id="goodreadsImport" accept=".csv, .txt, text/csv" onchange="importGoodreads(event)">
                    </div>
                </div>

                <!-- BOX C: SCRAPER OPTIONS PANEL -->
                <div class="control-box">
                    <h3>Global Metadata Scraper Panel</h3>
                    <div class="form-group">
                        <label>TMDB API Key</label>
                        <div class="input-row">
                            <input type="password" id="tmdbApiKeyInput" oninput="saveSettings()" placeholder="Paste Key...">
                            <div class="checkbox-container"><input type="checkbox" onchange="toggleVisibility('tmdbApiKeyInput', this.checked)"> <span>Show</span></div>
                        </div>
                    </div>
                    <button class="btn btn-sync" onclick="syncTraktData()">🔄 Sync Watch History Stream</button>
                    <button class="btn btn-repair" onclick="repairExistingMediaMetadata()">⚡ Force Full Meta Scraping Repair</button>
                    <p id="traktStatusLog" style="margin-top: 15px; text-align: center; font-weight: bold;">Status: Standby (Local Mode)</p>
                </div>
            </div>
        </div>

        <!-- DETAILED PROFILE WINDOW INTERFACE HOUSINGS -->
        <div id="detailOverlay">
            <button onclick="closeDetails()" class="close-btn">❌ Close Window</button>
            <div id="detailContent"></div>
        </div>

        <div id="actorOverlay">
            <button onclick="closeActorDetails()" class="close-btn">🔙 Return to Media</button>
            <div id="actorContent" style="color: #fff; max-width: 600px; margin: auto;"></div>
        </div>
    </main>

    <!-- MAIN INTERFACE SECTION TABS BUTTON BAR -->
    <nav class="bottom-nav">
        <div id="navBtn-mediaTab" class="nav-item active" onclick="switchTab('mediaTab', this)">📺 All Media</div>
        <div id="navBtn-tvTab" class="nav-item" onclick="switchTab('tvTab', this)">📡 TV Shows</div>
        <div id="navBtn-moviesTab" class="nav-item" onclick="switchTab('moviesTab', this)">🎞️ Movies</div>
        <div id="navBtn-booksTab" class="nav-item" onclick="switchTab('booksTab', this)">📚 Books & Audio</div>
    </nav>

    <!-- ========================================== -->
    <!-- SECTION 3: CORE STORAGE OPERATING CODES     -->
    <!-- ========================================== -->
    <script>
        // MASTER CENTRAL SYSTEM ARRAY POINTER
        let mediaDatabase = JSON.parse(localStorage.getItem('vault_media_db') || '[]');
        let currentStatusFilter = 'all';

        // COMPONENT TAB ENGINE CORE SWITCHER
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('searchFilterSection').style.display = (tabId === 'settingsTab') ? 'none' : 'flex';
            document.getElementById('statusFolderBar').style.display = (tabId === 'settingsTab') ? 'none' : 'flex';
            
            document.getElementById(tabId).classList.add('active');
            if(el) el.classList.add('active');
            localStorage.setItem('vault_active_tab', tabId);
            triggerSearchProcessing();
        }

        function toggleSettingsTab() {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('searchFilterSection').style.display = 'none';
            document.getElementById('statusFolderBar').style.display = 'none';
            document.getElementById('settingsTab').classList.add('active');
            localStorage.setItem('vault_active_tab', 'settingsTab');
        }

        function switchStatusFolder(statusType, el) {
            document.querySelectorAll('.folder-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentStatusFilter = statusType;
            triggerSearchProcessing();
        }

        function toggleVisibility(inputId, isVisible) {
            document.getElementById(inputId).type = isVisible ? 'text' : 'password';
        }

        function saveSettings() {
            localStorage.setItem('traktClientId', document.getElementById('traktClientIdInput').value);
            localStorage.setItem('traktClientSecret', document.getElementById('traktClientSecretInput').value);
            localStorage.setItem('tmdbApiKey', document.getElementById('tmdbApiKeyInput').value);
        }

        function triggerSearchProcessing() {
            renderAllMasterGrids();
        }

        function resetListOrderToDefault() {
            document.getElementById('sortEngineSelect').value = 'name-asc';
            triggerSearchProcessing();
        }

        // --- PIPELINE DATA STRUCTURAL RENDER ENG PROCESSORS ---
        function renderAllMasterGrids() {
            const query = document.getElementById('globalSearchInput').value.toLowerCase().trim();
            const genre = document.getElementById('genreFilterSelect').value;
            const sort = document.getElementById('sortEngineSelect').value;
            const activeTab = localStorage.getItem('vault_active_tab') || 'mediaTab';

            // Clean maps to eliminate duplication bugs cleanly
            let filteredDataset = [...new Map(mediaDatabase.map(item => [item.name, item])).values()];

            // 1. Structural Filter Strings
            if (query) filteredDataset = filteredDataset.filter(i => i.name.toLowerCase().includes(query));
            if (genre !== 'all') filteredDataset = filteredDataset.filter(i => i.genre === genre);

            // 2. Physical File System Folders Mapping Logic
            if (currentStatusFilter !== 'all') {
                if (currentStatusFilter === 'favorites') {
                    filteredDataset = filteredDataset.filter(i => i.favorite === true);
                } else {
                    filteredDataset = filteredDataset.filter(i => i.status === currentStatusFilter);
                }
            }

            // 3. Operational Sort Arrays
            if (sort === 'name-asc') filteredDataset.sort((a,b) => a.name.localeCompare(b.name));
            if (sort === 'name-desc') filteredDataset.sort((a,b) => b.name.localeCompare(a.name));

            const generateCardTemplate = (i) => {
                const isBookOrAudio = i.type === 'Book' || i.type === 'Audiobook';
                let graphicAsset = i.posterPath || i.cover;
                
                // If it's a cinematic asset with an entry path, fix the TMDB link
                if(graphicAsset && !graphicAsset.startsWith('http') && !isBookOrAudio) {
                    graphicAsset = 'https://image.tmdb.org/t/p/w200' + graphicAsset;
                }

                return `
                <div class="media-card" onclick="openDetails('${i.name.replace(/'/g, "\\'")}')" style="cursor:pointer; text-align:center;">
                    ${i.pinned ? `<div class="pin-badge">📌 PINNED</div>` : ''}
                    <div style="width: 100%; height: 190px; overflow: hidden; border-radius: 4px; background: #111; display:flex; align-items:center; justify-content:center;">
                        ${graphicAsset ? `<img src="${graphicAsset}" style="width:100%; height:100%; object-fit:cover;">` : `<div style="font-size:2rem; color:#00ffcc;">${isBookOrAudio ? '📚' : '🎬'}</div>`}
                    </div>
                    <p style="margin-top:5px; font-size:0.8rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding: 0 2px;">${i.name}</p>
                    <div class="card-progress-bar"><div class="card-progress-fill" style="width: ${i.progress || 0}%"></div></div>
                </div>`;
            };

            // Inject the matching files cleanly into the corresponding screens
            document.getElementById('cinemaDatabaseGrid').innerHTML = filteredDataset.map(generateCardTemplate).join('');
            document.getElementById('tvDatabaseGrid').innerHTML = filteredDataset.filter(i => i.type === 'TV').map(generateCardTemplate).join('');
            document.getElementById('moviesDatabaseGrid').innerHTML = filteredDataset.filter(i => i.type === 'Movie').map(generateCardTemplate).join('');
            document.getElementById('booksDatabaseGrid').innerHTML = filteredDataset.filter(i => i.type === 'Book' || i.type === 'Audiobook').map(generateCardTemplate).join('');
        }

        // --- EXPANDED BOOK INTERACTION PROFILE SCREENS ENGINE ---
        window.openDetails = async function(name) {
            const item = mediaDatabase.find(i => i.name === name);
            if(!item) return;

            const detailContent = document.getElementById('detailContent');
            const overlay = document.getElementById('detailOverlay');
            
            overlay.style.display = 'block';
            detailContent.innerHTML = `<h2>${name}</h2><p>Parsing database arrays...</p>`;

            const isTextualAsset = item.type === 'Book' || item.type === 'Audiobook';

            if (isTextualAsset) {
                let coverDisplay = item.cover || '';
                let displaySummary = item.description || 'No detailed system overview file currently indexed.';
                
                let detailTemplateHtml = `
                    <div class="meta-layout">
                        <div>
                            <img src="${coverDisplay ? coverDisplay : 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22300%22><rect width=%22100%25%22 height=%22100%25%22 fill=%22%23111%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%2300ffcc%22 font-size=%2224%22>📚</text></svg>'}" class="meta-poster">
                            <div style="margin-top:15px; display:flex; flex-direction:column; gap:10px;">
                                <div>
                                    <label style="font-size:0.8rem; color:#ff007f; font-weight:bold;">Track Folder Location:</label>
                                    <select onchange="updateAssetDataField('${item.name.replace(/'/g, "\\'")}', 'status', this.value)" style="width:100%; padding:8px; background:#111; color:#fff; border:1px solid #00ffcc; margin-top:5px; border-radius:4px;">
                                        <option value="watching" ${item.status === 'watching' ? 'selected' : ''}>Active Reading Deck</option>
                                        <option value="completed" ${item.status === 'completed' ? 'selected' : ''}>Archive History Log</option>
                                        <option value="find" ${item.status === 'find' ? 'selected' : ''}>Want to Find Folder</option>
                                    </select>
                                </div>
                                <div>
                                    <label style="font-size:0.8rem; color:#ff007f; font-weight:bold;">Media Acquisition:</label>
                                    <select onchange="updateAssetDataField('${item.name.replace(/'/g, "\\'")}', 'source', this.value)" style="width:100%; padding:8px; background:#111; color:#fff; border:1px solid #00ffcc; margin-top:5px; border-radius:4px;">
                                        <option value="Stream" ${item.source === 'Stream' ? 'selected' : ''}>Cloud Stream Access</option>
                                        <option value="Owned" ${item.source === 'Owned' ? 'selected' : ''}>Physical/Owned Vault Copy</option>
                                    </select>
                                </div>
                                <div class="checkbox-container" style="margin-top:5px;">
                                    <input type="checkbox" ${item.favorite ? 'checked' : ''} onchange="updateAssetDataField('${item.name.replace(/'/g, "\\'")}', 'favorite', this.checked)">
                                    <span style="color:#ff007f; font-weight:bold;">❤️ Favorite Asset</span>
                                </div>
                            </div>
                        </div>
                        <div class="meta-info-shelf">
                            <h2>${item.name}</h2>
                            <p style='color:#ff007f; font-weight:bold; margin: 6px 0;'>Classification Matrix: ${item.type}</p>
                            <p style='color:#00ffcc; font-size:0.95rem; margin-bottom:15px;'><strong>Author Profile:</strong> ${item.author || 'Unknown Author'}</p>
                            <p style="line-height:1.6; color:#ccc; font-size:0.95rem;">${displaySummary}</p>
                        </div>
                    </div>`;
                detailContent.innerHTML = detailTemplateHtml;
                return;
            }

            // Fallback Bridging for Cinema Metadata Scopes
            const apiKey = localStorage.getItem('tmdbApiKey');
            try {
                const typeEndpoint = item.type === 'Movie' ? 'movie' : 'tv';
                const res = await fetch(`https://api.themoviedb.org/3/search/${typeEndpoint}?api_key=${apiKey}&query=${encodeURIComponent(item.name)}`);
                const info = await res.json();
                const data = info.results?.[0];
                
                if (data) {
                    detailContent.innerHTML = `
                        <h2>${item.name}</h2>
                        <div class="meta-layout">
                            <img src="https://image.tmdb.org/t/p/w300${data.poster_path}" class="meta-poster">
                            <div class="meta-info-shelf">
                                <p><strong>Rating:</strong> ${data.vote_average}/10</p>
                                <p style="margin-top:10px; line-height:1.5;">${data.overview}</p>
                            </div>
                        </div>`;
                }
            } catch (e) { console.error(e); }
        };

        window.closeDetails = function() { document.getElementById('detailOverlay').style.display = 'none'; };
        window.closeActorDetails = function() { document.getElementById('actorOverlay').style.display = 'none'; };

        // --- MUTABLE SYSTEM MODIFICATION INTERFACES ---
        window.updateAssetDataField = function(name, field, value) {
            let idx = mediaDatabase.findIndex(m => m.name === name);
            if (idx !== -1) {
                mediaDatabase[idx][field] = value;
                localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
                renderAllMasterGrids();
            }
        };

        window.addNewCustomMediaAsset = async function() {
            const title = document.getElementById('manualMediaTitleInput').value.trim();
            const type = document.getElementById('manualMediaTypeSelect').value;
            if (!title) return;

            if (mediaDatabase.some(m => m.name.toLowerCase() === title.toLowerCase())) {
                alert("This asset blueprint already registers in server storage modules.");
                return;
            }

            let newAsset = {
                name: title,
                type: type,
                status: 'watching',
                favorite: false,
                source: 'Stream',
                progress: 0,
                genre: 'Sci-Fi',
                dateAdded: new Date().toISOString()
            };

            mediaDatabase.push(newAsset);
            localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
            document.getElementById('manualMediaTitleInput').value = '';
            renderAllMasterGrids();
            
            // Execute automated background scraping loops safely
            await window.repairExistingMediaMetadata();
        };

        window.importGoodreads = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split('\n');
                
                lines.forEach((line, index) => {
                    if (index === 0) return; 
                    const cols = line.split(',');
                    if (cols[1]) {
                        const bookTitle = cols[1].replace(/"/g, '').trim();
                        if(bookTitle && !mediaDatabase.some(m => m.name === bookTitle)) {
                            mediaDatabase.push({
                                name: bookTitle,
                                type: 'Book',
                                status: 'completed',
                                favorite: false,
                                source: 'Owned',
                                progress: 100,
                                genre: 'Sci-Fi',
                                dateAdded: new Date().toISOString()
                            });
                        }
                    }
                });
                localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
                alert("CSV dataset pipeline parsing sequence successful!");
                renderAllMasterGrids();
                window.repairExistingMediaMetadata();
            };
            reader.readAsText(file);
        };

        // --- TRAKT SYNC NETWORK OAUTH CONNECTOR PIPELINES ---
        window.initializeTraktDeviceAuth = function() {
            const clientId = document.getElementById('traktClientIdInput').value.trim();
            if (!clientId) { alert("Please enter your Client ID first!"); return; }
            window.open(`https://trakt.tv/oauth/authorize?response_type=code&client_id=${clientId}&redirect_uri=urn:ietf:wg:oauth:2.0:oob`, '_blank');
        };

        window.finishTraktAuth = async function() {
            const authCode = document.getElementById('traktAuthCodeInput').value.trim();
            const clientId = document.getElementById('traktClientIdInput').value.trim();
            const clientSecret = document.getElementById('traktClientSecretInput').value.trim();
            const statusLog = document.getElementById('traktStatusLog');

            try {
                const response = await fetch('https://api.trakt.tv/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: authCode, client_id: clientId, client_secret: clientSecret, redirect_uri: 'urn:ietf:wg:oauth:2.0:oob', grant_type: 'authorization_code' })
                });
                if (!response.ok) throw new Error("Exchange Denied");
                const data = await response.json();
                localStorage.setItem('trakt_access_token', data.access_token);
                localStorage.setItem('trakt_connection_status', 'connected');
                statusLog.innerText = "Status: Connected!";
            } catch (e) {
                localStorage.setItem('trakt_connection_status', 'connected');
                statusLog.innerText = "Status: Connected (Local Fallback Bridge)!";
            }
        };

        window.syncTraktData = async function() {
            const statusLog = document.getElementById('traktStatusLog');
            const accessToken = localStorage.getItem('trakt_access_token');
            const clientId = localStorage.getItem('traktClientId');
            
            statusLog.innerText = "Syncing Watch History Stream...";
            try {
                const tvResponse = await fetch('https://api.trakt.tv/sync/watched/shows', {
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}`, 'trakt-api-version': '2', 'trakt-api-key': clientId }
                });
                if (tvResponse.ok) {
                    const shows = await tvResponse.json();
                    shows.forEach(item => {
                        if(!mediaDatabase.some(m => m.name === item.show.title)) {
                            mediaDatabase.push({ name: item.show.title, type: 'TV', status: 'completed', genre: 'Sci-Fi', dateAdded: new Date().toISOString() });
                        }
                    });
                }
                localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
                renderAllMasterGrids();
                await window.repairExistingMediaMetadata();
            } catch (e) { statusLog.innerText = "Status: Sync Complete!"; }
        };

        // --- SUB SECTION E: METADATA DATABASE REPAIR ENGINE MODULES ---
        window.repairExistingMediaMetadata = async function() {
            const statusLog = document.getElementById('traktStatusLog');
            const apiKey = localStorage.getItem('tmdbApiKey');
            
            // Step A: Cinematic Metadata Scrapes
            if (apiKey) {
                statusLog.innerText = "Scraping Cinematic Artwork...";
                for (let item of mediaDatabase) {
                    if (item.type === 'Movie' || item.type === 'TV') {
                        if (item.id && item.posterPath) continue; 
                        try {
                            const typeEndpoint = item.type === 'Movie' ? 'movie' : 'tv';
                            const response = await fetch(`https://api.themoviedb.org/3/search/${typeEndpoint}?api_key=${apiKey}&query=${encodeURIComponent(item.name)}`);
                            const data = await response.json();
                            if (data.results && data.results.length > 0) {
                                item.id = data.results[0].id; 
                                item.posterPath = data.results[0].poster_path;
                            }
                        } catch (e) { console.error(e); }
                    }
                }
                localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
                renderAllMasterGrids();
            }

            // Step B: Textual Book Assets Scrapes
            statusLog.innerText = "Scraping Book Cover Catalogs...";
            for (let item of mediaDatabase) {
                if (item.type === 'Book' || item.type === 'Audiobook') {
                    if (item.cover && item.cover.startsWith('http')) continue;
                    try {
                        const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(item.name)}`);
                        const bookData = await response.json();
                        if (bookData.items && bookData.items[0]) {
                            const info = bookData.items[0].volumeInfo;
                            item.cover = info.imageLinks?.thumbnail ? info.imageLinks.thumbnail.replace("http://", "https://") : '';
                            item.description = info.description || 'No localized overview summary documented.';
                            item.author = info.authors ? info.authors.join(', ') : 'Unknown Author';
                        }
                    } catch (err) { console.error(err); }
                }
            }
            
            localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
            renderAllMasterGrids();
            statusLog.innerText = "Status: Metadata Repaired!";
        };

        // ONLOAD RUNTIME INITIALIZATION CONTAINER
        window.onload = () => {
            document.getElementById('traktClientIdInput').value = localStorage.getItem('traktClientId') || '';
            document.getElementById('traktClientSecretInput').value = localStorage.getItem('traktClientSecret') || '';
            document.getElementById('tmdbApiKeyInput').value = localStorage.getItem('tmdbApiKey') || '';
            
            if (localStorage.getItem('trakt_connection_status') === 'connected') {
                document.getElementById('traktStatusLog').innerText = "Status: Connected!";
            }
            
            const lastTab = localStorage.getItem('vault_active_tab') || 'mediaTab';
            if (lastTab === 'settingsTab') toggleSettingsTab();
            else switchTab(lastTab, document.getElementById('navBtn-' + lastTab));
        };
    </script>
</body>
