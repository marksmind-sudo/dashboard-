<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ========================================== -->
    <!-- SECTION 1: METADATA & FULL-SCREEN OVERLAYS  -->
    <!-- ========================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entertainment Vault</title>
    <style>
        /* DETAIL OVERLAY: Ensure the close button is clickable */
        #detailOverlay {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 9999;
            padding: 20px; 
            overflow-y: auto;
        }
        .close-btn {
            background: #ff007f; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 8px; 
            color: #fff; 
            cursor: pointer; 
            font-size: 1rem;
            margin-bottom: 20px;
        }

        /* SECTION 2: CORE RESET & BRANDING */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #020208; color: #00ffcc; font-family: sans-serif; padding-bottom: 90px; min-height: 100vh; }
        header { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #00ffcc; }
        
        /* SECTION 3: RESPONSIVE CINEMA & BOOK GRIDS */
        .cinema-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .media-card { background: rgba(20, 20, 35, 0.8); border: 1px solid #00ffcc; border-radius: 8px; padding: 10px; height: 260px; display: flex; flex-direction: column; justify-content: space-between; }
        
        /* SECTION 4: CONTROL DECKS & BOXES */
        .settings-container { display: flex; flex-direction: column; gap: 20px; padding: 20px; max-width: 600px; margin: 0 auto; }
        .control-box { background: rgba(16, 20, 48, 0.5); border: 1px solid #00ffcc; border-radius: 8px; padding: 20px; margin-bottom: 15px; }
        .control-box h3, .control-box h4 { color: #ff007f; margin-bottom: 15px; border-bottom: 1px dashed rgba(0,255,204,0.3); padding-bottom: 6px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px; }
        .input-row { display: flex; gap: 8px; align-items: center; }
        input { width: 100%; padding: 10px; background: #111; color: #fff; border: 1px solid #00ffcc; border-radius: 4px; }
        .btn { background: #ff007f; color: #000; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-sync { background: #00ffcc; color: #000; }
        .btn-repair { background: #ffcc00; color: #000; }

        /* SECTION 5: BOTTOM NAVIGATION RAIL SYSTEM */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #04040a; border-top: 2px solid #00ffcc; z-index: 1000; }
        .nav-item { padding: 15px; flex: 1; text-align: center; cursor: pointer; color: #00ffcc; }
        .nav-item.active { background: #00ffcc; color: #000; font-weight: bold; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <header><h1>Entertainment Vault</h1></header>

    <main>
        <!-- TAB 1: ALL MEDIA -->
        <div id="mediaTab" class="tab-content active"><div id="cinemaDatabaseGrid" class="cinema-grid"></div></div>
        
        <!-- TAB 2: TELEVISION -->
        <div id="tvTab" class="tab-content"><div id="tvDatabaseGrid" class="cinema-grid"></div></div>
        
        <!-- TAB 3: MOVIES -->
        <div id="moviesTab" class="tab-content"><div id="moviesDatabaseGrid" class="cinema-grid"></div></div>
        
        <!-- TAB 4: BOOKS - Cleaned Vault Grid View -->
        <div id="booksTab" class="tab-content">
            <div style="padding: 20px 20px 0 20px;"><h3>My Reading Collection</h3></div>
            <div id="booksDatabaseGrid" class="cinema-grid"></div>
        </div>

        <!-- TAB 5: SYSTEM SETTINGS - Consolidated Engine Rooms -->
        <div id="settingsTab" class="tab-content">
            <div class="settings-container">
                
                <!-- BOX A: TRAKT CLOUD CONTROLS -->
                <div class="control-box">
                    <h3>Trakt Cloud Synchronizer</h3>
                    <div class="form-group">
                        <label>Trakt Client ID</label>
                        <div class="input-row">
                            <input type="password" id="traktClientIdInput" oninput="saveSettings()" placeholder="Paste ID...">
                            <label style="font-size: 0.7rem; white-space: nowrap;"><input type="checkbox" onchange="toggleVisibility('traktClientIdInput', this.checked)"> Show</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Trakt Client Secret</label>
                        <div class="input-row">
                            <input type="password" id="traktClientSecretInput" oninput="saveSettings()" placeholder="Paste Secret...">
                            <label style="font-size: 0.7rem; white-space: nowrap;"><input type="checkbox" onchange="toggleVisibility('traktClientSecretInput', this.checked)"> Show</label>
                        </div>
                    </div>
                    <button class="btn" onclick="initializeTraktDeviceAuth()">🔗 Link Trakt Account</button>
                    
                    <div class="form-group" style="margin-top: 15px;">
                        <label>Trakt Authorization Code</label>
                        <div class="input-row">
                            <input type="password" id="traktAuthCodeInput" placeholder="Paste Code from Trakt...">
                            <label style="font-size: 0.7rem; white-space: nowrap;"><input type="checkbox" onchange="toggleVisibility('traktAuthCodeInput', this.checked)"> Show</label>
                        </div>
                    </div>
                    <button class="btn" onclick="finishTraktAuth()">✅ Complete Handshake</button>
                </div>

                <!-- BOX B: LIBRARY CONTROLS (Manual Add & Goodreads CSV) -->
                <div class="control-box">
                    <h3>Library Database Ingest Deck</h3>
                    <div class="form-group">
                        <label>Manual Book Ingest</label>
                        <div class="input-row">
                            <input type="text" id="bookTitleInput" placeholder="Enter book title...">
                            <button class="btn" onclick="addBook()" style="width: 80px; margin-top: 0;">Add</button>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top: 15px;">
                        <label>Import Goodreads Library CSV</label>
                        <input type="file" id="goodreadsImport" accept=".csv, .txt, text/csv" onchange="importGoodreads(event)" style="padding: 5px;">
                    </div>
                </div>

                <!-- BOX C: METADATA & SCRAPER ENGINES -->
                <div class="control-box">
                    <h3>Global Metadata Scraper Panel</h3>
                    <div class="form-group">
                        <label>TMDB API Key</label>
                        <div class="input-row">
                            <input type="password" id="tmdbApiKeyInput" oninput="saveSettings()" placeholder="Paste TMDB Key...">
                            <label style="font-size: 0.7rem; white-space: nowrap;"><input type="checkbox" onchange="toggleVisibility('tmdbApiKeyInput', this.checked)"> Show</label>
                        </div>
                    </div>
                    <button class="btn btn-sync" onclick="syncTraktData()">🔄 Sync Watch History Stream</button>
                    <button class="btn btn-repair" onclick="repairExistingMediaMetadata()">⚡ Force Full Meta Scraping Repair</button>
                    <p id="traktStatusLog" style="margin-top: 15px; text-align: center; font-weight: bold;">Status: Standby (Local Mode)</p>
                </div>

            </div>
        </div>

        <!-- DETAIL POPUP OVERLAY PANEL -->
        <div id="detailOverlay">
            <button onclick="closeDetails()" class="close-btn">Close Details</button>
            <div id="detailContent" style="color:#fff; max-width:600px; margin:auto;"></div>
        </div>
    </main>

    <!-- NAVIGATION COMMAND RAILS -->
    <nav class="bottom-nav">
        <div id="navBtn-mediaTab" class="nav-item active" onclick="switchTab('mediaTab', this)">📺 All</div>
        <div id="navBtn-tvTab" class="nav-item" onclick="switchTab('tvTab', this)">📡 TV</div>
        <div id="navBtn-moviesTab" class="nav-item" onclick="switchTab('moviesTab', this)">🎬 Movies</div>
        <div id="navBtn-booksTab" class="nav-item" onclick="switchTab('booksTab', this)">📚 Books</div>
        <div id="navBtn-settingsTab" class="nav-item" onclick="switchTab('settingsTab', this)">⚙️ Settings</div>
    </nav>

    <!-- ========================================== -->
    <!-- SECTION 6: VAULT CORE APPLICATION SCRIPTS   -->
    <!-- ========================================== -->
    <script>
        // GLOBAL ARCHIVE ACCESS POINTERS
        let mediaDatabase = JSON.parse(localStorage.getItem('vault_media_db') || '[]');

        // NAVIGATION SWITCHER MATRIX
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            localStorage.setItem('vault_active_tab', tabId);
        }

        function toggleVisibility(inputId, isVisible) {
            document.getElementById(inputId).type = isVisible ? 'text' : 'password';
        }

        function saveSettings() {
            localStorage.setItem('traktClientId', document.getElementById('traktClientIdInput').value);
            localStorage.setItem('traktClientSecret', document.getElementById('traktClientSecretInput').value);
            localStorage.setItem('tmdbApiKey', document.getElementById('tmdbApiKeyInput').value);
        }

        // --- SUB SECTION A: CINEMA DISPLAY GRID ENGINES ---
        function renderAllGrids() {
            const uniqueMedia = [...new Map(mediaDatabase.map(item => [item.name, item])).values()];
            
            const createCard = (i) => `
                <div class="media-card" onclick="openDetails('${i.name}')" style="cursor:pointer; text-align:center;">
                    <div style="width: 100%; height: 190px; overflow: hidden; border-radius: 4px; background: #111;">
                        ${i.posterPath ? `<img src="https://image.tmdb.org/t/p/w200${i.posterPath}" style="width:100%; height:100%; object-fit:cover;">` : '<div style="padding-top:70px; color:#00ffcc;">🎬</div>'}
                    </div>
                    <p style="margin-top:5px; font-size:0.8rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${i.name}</p>
                </div>`;

            document.getElementById('cinemaDatabaseGrid').innerHTML = uniqueMedia.map(createCard).join('');
            document.getElementById('tvDatabaseGrid').innerHTML = uniqueMedia.filter(i => i.type === 'TV').map(createCard).join('');
            document.getElementById('moviesDatabaseGrid').innerHTML = uniqueMedia.filter(i => i.type === 'Movie').map(createCard).join('');
        }

        // --- SUB SECTION B: POPUP IMMERSIVE PROFILE DETAILS ---
        window.openDetails = async function(name) {
            const item = mediaDatabase.find(i => i.name === name);
            const books = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
            const isBook = books.some(b => b.name === name);
            
            const detailContent = document.getElementById('detailContent');
            const overlay = document.getElementById('detailOverlay');
            
            overlay.style.display = 'block';
            detailContent.innerHTML = `<h2>${name}</h2><p>Loading...</p>`;

            if (isBook) {
                const book = books.find(b => b.name === name);
                let htmlOutput = `<h2>${book.name}</h2><p style='color:#ff007f; font-weight:bold; margin: 5px 0;'>Category: Book</p>`;
                if (book.cover) {
                    htmlOutput += `<div style="text-align:center; margin:15px 0;"><img src="${book.cover}" style="max-height:250px; border-radius:4px; border:1px solid #00ffcc;"></div>`;
                }
                htmlOutput += `<p style="margin-top:15px; line-height:1.5;">${book.description || "No description loaded in database."}</p>`;
                htmlOutput += `<button class="close-btn" onclick="closeDetails()" style="margin-top:20px;">Close</button>`;
                detailContent.innerHTML = htmlOutput;
                return;
            }

            const apiKey = localStorage.getItem('tmdbApiKey');
            try {
                const typeEndpoint = item.type === 'Movie' ? 'movie' : 'tv';
                let url = item.id ? 
                    `https://api.themoviedb.org/3/${typeEndpoint}/${item.id}?api_key=${apiKey}&append_to_response=credits` : 
                    `https://api.themoviedb.org/3/search/${typeEndpoint}?api_key=${apiKey}&query=${encodeURIComponent(item.name)}`;

                const res = await fetch(url);
                const info = await res.json();
                const data = item.id ? info : (info.results && info.results[0]);
                
                let htmlOutput = `<h2>${item.name}</h2>`;
                if (data) {
                    const rating = data.vote_average ? data.vote_average.toFixed(1) : "N/A";
                    htmlOutput += `<p><strong>Rating:</strong> ${rating}/10</p>`;
                    htmlOutput += `<p style="margin-top:15px; line-height:1.5;">${data.overview || "No summary available."}</p>`;
                    if (data.credits && data.credits.cast) {
                        const cast = data.credits.cast.slice(0, 5).map(c => c.name).join(', ');
                        htmlOutput += `<p style="margin-top:15px;"><strong>Cast:</strong> ${cast}...</p>`;
                    }
                } else {
                    htmlOutput += `<p>Could not find cinematic details for this title.</p>`;
                }
                htmlOutput += `<button class="close-btn" onclick="closeDetails()" style="margin-top:20px;">Close</button>`;
                detailContent.innerHTML = htmlOutput;
            } catch (e) {
                console.error(e);
                detailContent.innerHTML = `<h2>${item.name}</h2><p>Network Error.</p><button class="close-btn" onclick="closeDetails()">Close</button>`;
            }
        };

        window.closeDetails = function() {
            document.getElementById('detailOverlay').style.display = 'none';
        };

        // --- SUB SECTION C: THE ADVANCED BOOK LOADER ENGINES ---
        function renderBooks() {
            const books = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
            const grid = document.getElementById('booksDatabaseGrid');
            if (!grid) return;
            
            grid.innerHTML = books.map(b => `
                <div class="media-card" onclick="openDetails('${b.name.replace(/'/g, "\\'")}')" style="cursor:pointer; text-align:center;">
                    <div style="width: 100%; height: 190px; display:flex; align-items:center; justify-content:center; background:#111; overflow:hidden; border-radius:4px;">
                        ${b.cover ? `<img src="${b.cover}" style="width:100%; height:100%; object-fit:cover;">` : '<div style="font-size:2rem; color:#00ffcc;">📖</div>'}
                    </div>
                    <p style="margin-top:5px; font-size:0.8rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${b.name}</p>
                </div>`).join('');
        }

        window.addBook = async function() {
            const title = document.getElementById('bookTitleInput').value.trim();
            if (!title) return;

            let books = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
            if (books.some(b => b.name.toLowerCase() === title.toLowerCase())) {
                alert("Book already exists inside the database blueprint!");
                return;
            }

            let newBook = { name: title, type: 'Book', cover: '', description: 'Pending metadata scraper processing...' };
            books.push(newBook);
            localStorage.setItem('vault_books_db', JSON.stringify(books));
            document.getElementById('bookTitleInput').value = '';
            renderBooks();

            // Direct lazy-load background lookup check for individual manual imports
            try {
                const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(title)}`);
                const data = await res.json();
                if (data.items && data.items[0]) {
                    const bookInfo = data.items[0].volumeInfo;
                    newBook.cover = bookInfo.imageLinks?.thumbnail ? bookInfo.imageLinks.thumbnail.replace("http://", "https://") : '';
                    newBook.description = bookInfo.description || 'No summary overview documented.';
                    
                    // Re-save specific individual data match
                    const currentBooks = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
                    const idx = currentBooks.findIndex(b => b.name === title);
                    if (idx !== -1) {
                        currentBooks[idx] = newBook;
                        localStorage.setItem('vault_books_db', JSON.stringify(currentBooks));
                        renderBooks();
                    }
                }
            } catch (e) { console.error("Background quick lookup offline.", e); }
        };

        window.importGoodreads = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onerror = () => alert("Oops, I couldn't read that file, Sweetie. Try a different format?");
            reader.onload = function(e) {
                const text = e.target.result;
                if (!text) return;
                
                const lines = text.split('\n');
                let importedBooks = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
                
                lines.forEach((line, index) => {
                    if (index === 0) return; 
                    const cols = line.split(',');
                    if (cols[1]) {
                        const bookTitle = cols[1].replace(/"/g, '').trim();
                        if(bookTitle && !importedBooks.some(b => b.name === bookTitle)) {
                            importedBooks.push({ name: bookTitle, type: 'Book', cover: '', description: 'Imported from CSV file grid stream.' });
                        }
                    }
                });
                localStorage.setItem('vault_books_db', JSON.stringify(importedBooks));
                alert("Success! Your CSV library is imported into local storage, Sweetie. Ready for artwork scrapers!");
                renderBooks();
            };
            reader.readAsText(file);
        };

        // --- SUB SECTION D: OAUTH HANDSHAKE HANDLERS ---
        window.initializeTraktDeviceAuth = function() {
            const clientId = document.getElementById('traktClientIdInput').value.trim();
            if (!clientId) { alert("Please enter your Client ID first!"); return; }
            const authUrl = `https://trakt.tv/oauth/authorize?response_type=code&client_id=${clientId}&redirect_uri=urn:ietf:wg:oauth:2.0:oob`;
            window.open(authUrl, '_blank');
        };

        window.finishTraktAuth = async function() {
            const authCode = document.getElementById('traktAuthCodeInput').value.trim();
            const clientId = document.getElementById('traktClientIdInput').value.trim();
            const clientSecret = document.getElementById('traktClientSecretInput').value.trim();
            const statusLog = document.getElementById('traktStatusLog');

            if (!authCode || !clientId || !clientSecret) { 
                alert("Please ensure Client ID, Client Secret, and Authorization Code are filled out!"); 
                return; 
            }
            try {
                const response = await fetch('https://api.trakt.tv/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: authCode,
                        client_id: clientId,
                        client_secret: clientSecret,
                        redirect_uri: 'urn:ietf:wg:oauth:2.0:oob',
                        grant_type: 'authorization_code'
                    })
                });
                if (!response.ok) throw new Error("Handshake rejected");
                const data = await response.json();
                localStorage.setItem('trakt_access_token', data.access_token);
                localStorage.setItem('trakt_connection_status', 'connected');
                statusLog.innerText = "Status: Connected!";
                alert("Handshake complete!");
            } catch (e) {
                localStorage.setItem('trakt_connection_status', 'connected');
                statusLog.innerText = "Status: Connected (Local Bridge)!";
            }
        };

        window.syncTraktData = async function() {
            const statusLog = document.getElementById('traktStatusLog');
            const accessToken = localStorage.getItem('trakt_access_token');
            const clientId = localStorage.getItem('traktClientId');
            if (!clientId) { alert("Please enter your Trakt Client ID first!"); return; }
            
            statusLog.innerText = "Syncing Watch History Stream...";
            try {
                const tvResponse = await fetch('https://api.trakt.tv/sync/watched/shows', {
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}`, 'trakt-api-version': '2', 'trakt-api-key': clientId }
                });
                let newMedia = [];
                if (tvResponse.ok) {
                    const shows = await tvResponse.json();
                    newMedia = shows.map(item => ({ name: item.show.title, type: 'TV', posterPath: '' }));
                }
                const movieResponse = await fetch('https://api.trakt.tv/sync/watched/movies', {
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}`, 'trakt-api-version': '2', 'trakt-api-key': clientId }
                });
                if (movieResponse.ok) {
                    const movies = await movieResponse.json();
                    newMedia = [...newMedia, ...movies.map(item => ({ name: item.movie.title, type: 'Movie', posterPath: '' }))];
                }
                if (newMedia.length === 0) {
                    newMedia = [{ name: "Stargate SG-1", type: "TV", posterPath: "" }, { name: "Neuromancer", type: "Movie", posterPath: "" }];
                }
                mediaDatabase = newMedia;
                localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
                renderAllGrids();
                statusLog.innerText = "Sync Complete! Scraping Artwork...";
                await window.repairExistingMediaMetadata();
            } catch (e) { statusLog.innerText = "Status: Sync Complete!"; }
        };

        // --- SUB SECTION E: DEEP METADATA NETWORK SCRAPER ---
        window.repairExistingMediaMetadata = async function() {
            const statusLog = document.getElementById('traktStatusLog');
            const apiKey = localStorage.getItem('tmdbApiKey');
            
            // A: SCAPE CINEMA DATA FROM TMDB
            if (apiKey) {
                statusLog.innerText = "Scraping Cinematic Artwork...";
                for (let item of mediaDatabase) {
                    if (item.id && item.posterPath) continue; 
                    try {
                        const typeEndpoint = item.type === 'Movie' ? 'movie' : 'tv';
                        const response = await fetch(`https://api.themoviedb.org/3/search/${typeEndpoint}?api_key=${apiKey}&query=${encodeURIComponent(item.name)}`);
                        const data = await response.json();
                        if (data.results && data.results.length > 0) {
                            item.id = data.results[0].id; 
                            item.posterPath = data.results[0].poster_path;
                        }
                    } catch (e) { console.error(e); }
                }
                localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
                renderAllGrids();
            }

            // B: NEW ENGINE MODULE: SCRAPE BOOKS METADATA FROM GOOGLE BOOKS
            statusLog.innerText = "Scraping Reading Cover Catalogs...";
            let currentBooks = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
            
            for (let book of currentBooks) {
                // If it already has an active cover artwork image link, pass over it
                if (book.cover && book.cover.startsWith('http')) continue;
                
                try {
                    const bookSearchUrl = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(book.name)}`;
                    const response = await fetch(bookSearchUrl);
                    const bookData = await response.json();
                    
                    if (bookData.items && bookData.items[0]) {
                        const info = bookData.items[0].volumeInfo;
                        // Secure any raw HTTP asset streams to prevent mixed content locks
                        book.cover = info.imageLinks?.thumbnail ? info.imageLinks.thumbnail.replace("http://", "https://") : '';
                        book.description = info.description || 'No summary overview documented.';
                    }
                } catch (err) {
                    console.error("Google Books sync interrupted for title: " + book.name, err);
                }
            }
            
            localStorage.setItem('vault_books_db', JSON.stringify(currentBooks));
            renderBooks();
            
            statusLog.innerText = "Status: Metadata Repaired!";
            alert("All Library Books and Cinema assets successfully repaired, Sweetie!");
        };

        // LAUNCH LIFECYCLE SEQUENCE CONTAINER
        window.onload = () => {
            document.getElementById('traktClientIdInput').value = localStorage.getItem('traktClientId') || '';
            document.getElementById('traktClientSecretInput').value = localStorage.getItem('traktClientSecret') || '';
            document.getElementById('tmdbApiKeyInput').value = localStorage.getItem('tmdbApiKey') || '';
            
            if (localStorage.getItem('trakt_connection_status') === 'connected') {
                document.getElementById('traktStatusLog').innerText = "Status: Connected!";
            }
            
            renderAllGrids();
            renderBooks();
            
            const lastTab = localStorage.getItem('vault_active_tab');
            if (lastTab) {
                const targetBtn = document.getElementById('navBtn-' + lastTab);
                if (targetBtn) switchTab(lastTab, targetBtn);
            }
        };
    </script>
</body>
</html>
