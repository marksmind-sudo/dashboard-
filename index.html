<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Vault</title>
    
    <!-- ==================================================================== -->
    <!-- 1. STYLESHEET & DESIGN SYSTEM                                        -->
    <!-- ==================================================================== -->
    <style>
        /* ------------------------------------------------------------------ */
        /* Core Dark Theme Variables & Global Reset                           */
        /* ------------------------------------------------------------------ */
        :root {
            --bg-color: #05080a;
            --card-bg: #0d131a;
            --card-border: #1a2633;
            --text-main: #e1e6ed;
            --text-muted: #8b9bb4;
            --accent-pink: #ff006e;
            --accent-pink-hover: #d9005d;
            --accent-teal: #00ffd0;
            --accent-gold: #ffb703;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            padding-bottom: 70px; /* Space for bottom tab bar */
            min-height: 100vh;
        }

        /* ------------------------------------------------------------------ */
        /* Header & Main Controls                                             */
        /* ------------------------------------------------------------------ */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--card-border);
        }

        .logo {
            color: var(--accent-teal);
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .gear-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .gear-btn:hover {
            color: var(--accent-teal);
        }

        /* ------------------------------------------------------------------ */
        /* Navigation & Filter Bars                                          */
        /* ------------------------------------------------------------------ */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--card-border);
        }

        .filter-input, .filter-select {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
        }

        .filter-input:focus, .filter-select:focus {
            border-color: var(--accent-teal);
        }

        .btn-reset {
            background: transparent;
            border: 1px solid var(--accent-pink);
            color: var(--accent-pink);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn-reset:hover {
            background: var(--accent-pink);
            color: #fff;
        }

        .folder-tabs {
            display: flex;
            gap: 10px;
            padding: 12px 20px;
            overflow-x: auto;
        }

        .tab-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .tab-btn.active {
            background: var(--accent-pink);
            color: #fff;
            border-color: var(--accent-pink);
        }

        /* ------------------------------------------------------------------ */
        /* Media Poster Grid Layout                                           */
        /* ------------------------------------------------------------------ */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            padding: 20px;
        }

        .media-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .media-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-teal);
        }

        .poster-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 3;
            background: #151d27;
        }

        .poster-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge-rating {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.8);
            color: var(--accent-gold);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .badge-favorite {
            position: absolute;
            top: 8px;
            left: 8px;
            color: var(--accent-pink);
            font-size: 1.1rem;
        }

        .card-title {
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-teal);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ------------------------------------------------------------------ */
        /* Settings Station Styles                                            */
        /* ------------------------------------------------------------------ */
        .settings-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .settings-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 20px;
        }

        .panel-title {
            color: var(--accent-pink);
            font-size: 1.1rem;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .panel-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .btn-action {
            background: var(--accent-teal);
            color: #000;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-action.pink {
            background: var(--accent-pink);
            color: #fff;
        }

        .btn-action.gold {
            background: var(--accent-gold);
            color: #000;
        }

        .btn-action:hover {
            opacity: 0.9;
        }

        /* ------------------------------------------------------------------ */
        /* ACTOR DETAIL PAGE: Horizontal Scrolling Carousel Fix               */
        /* ------------------------------------------------------------------ */
        .actor-profile {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .actor-header {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .actor-headshot {
            width: 140px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--card-border);
        }

        .actor-media-section {
            margin-top: 24px;
        }

        .section-heading {
            color: var(--accent-teal);
            font-size: 1rem;
            margin-bottom: 12px;
        }

        /* CRITICAL FIX: Horizontal flex-row carousel for actor credits */
        .actor-media-row {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: nowrap !important;
            overflow-x: auto !important;
            gap: 16px;
            padding-bottom: 12px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* Smooth scroll on mobile/tablet */
        }

        .actor-media-row::-webkit-scrollbar {
            height: 6px;
        }

        .actor-media-row::-webkit-scrollbar-thumb {
            background: var(--accent-teal);
            border-radius: 4px;
        }

        .actor-media-row::-webkit-scrollbar-track {
            background: var(--card-bg);
        }

        .actor-media-card {
            flex: 0 0 140px !important; /* Forces cards into horizontal track */
            width: 140px !important;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }

        .actor-media-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 6px;
        }

        .actor-media-card .title {
            font-size: 0.75rem;
            color: var(--text-main);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .actor-media-card .role {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* ------------------------------------------------------------------ */
        /* Fixed Bottom Tab Navigation Bar                                    */
        /* ------------------------------------------------------------------ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: #020406;
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--accent-teal);
        }
    </style>
</head>
<body>

    <!-- ==================================================================== -->
    <!-- 2. APPLICATION HEADER & TOOLBAR                                     -->
    <!-- ==================================================================== -->
    <header>
        <div class="logo">Cinematic Vault</div>
        <button class="gear-btn" id="toggleSettingsBtn" title="Settings Panel">⚙️</button>
    </header>

    <!-- Main Filters Section -->
    <div class="filter-bar" id="mainFilterBar">
        <input type="text" id="searchInput" class="filter-input" placeholder="🔍 Search titles...">
        
        <select id="mediaTypeSelect" class="filter-select">
            <option value="All">All Cinematic Media</option>
            <option value="TV">TV Shows</option>
            <option value="Movie">Movies</option>
        </select>

        <!-- Genre Dropdown Selector -->
        <select id="genreSelect" class="filter-select">
            <option value="All Genres">All Genres</option>
            <option value="Action">Action</option>
            <option value="Adventure">Adventure</option>
            <option value="Comedy">Comedy</option>
            <option value="Crime">Crime</option>
            <option value="Drama">Drama</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Mystery">Mystery</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Science Fiction">Science Fiction</option>
            <option value="Thriller">Thriller</option>
        </select>

        <select id="sortSelect" class="filter-select">
            <option value="AZ">Alphabetical (A-Z)</option>
            <option value="Rating">TMDB Rating</option>
        </select>

        <button class="btn-reset" id="resetFiltersBtn">🔄 Reset</button>
    </div>

    <!-- Collection Category Tabs -->
    <div class="folder-tabs" id="folderTabs">
        <button class="tab-btn active" data-folder="Main Collection">📁 Main Collection</button>
        <button class="tab-btn" data-folder="Currently Watching">📁 Currently Watching</button>
        <button class="tab-btn" data-folder="Awaiting Episodes">📁 Awaiting Episodes</button>
        <button class="tab-btn" data-folder="Recently Watched">📁 Recently Watched</button>
    </div>

    <!-- ==================================================================== -->
    <!-- 3. MAIN CONTENT CONTAINER (GRID / SETTINGS / ACTOR VIEW)            -->
    <!-- ==================================================================== -->
    <main id="appContainer">
        <!-- Media Cards populate here dynamically via JavaScript -->
        <div class="grid-container" id="mediaGrid"></div>
    </main>

    <!-- ==================================================================== -->
    <!-- 4. BOTTOM NAVIGATION BAR                                             -->
    <!-- ==================================================================== -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-type="All">🎬 All Titles</div>
        <div class="nav-item" data-type="TV">📺 TV Shows</div>
        <div class="nav-item" data-type="Movie">🎞️ Movies</div>
    </nav>

    <!-- ==================================================================== -->
    <!-- 5. APPLICATION LOGIC & DATABASE SCRIPTS                              -->
    <!-- ==================================================================== -->
    <script>
        /* ------------------------------------------------------------------ */
        /* Configuration & App State                                         */
        /* ------------------------------------------------------------------ */
        // Configuration parameters
        const TRAKT_CLIENT_ID = 'YOUR_TRAKT_CLIENT_ID_HERE'; // Configure your Trakt Client ID here

        // Sample Collection Database
        const mediaDatabase = [
            { id: 1, title: '12 Monkeys', type: 'TV', genre: 'Drama, Sci-Fi & Fantasy, Mystery', rating: 7.4, favorite: true, poster: 'https://via.placeholder.com/150x225/111/fff?text=12+Monkeys' },
            { id: 2, title: '3 Body Problem', type: 'TV', genre: 'Sci-Fi, Drama, Mystery', rating: 7.5, favorite: false, poster: 'https://via.placeholder.com/150x225/111/fff?text=3+Body+Problem' },
            { id: 3, title: '3rd Rock from the Sun', type: 'TV', genre: 'Comedy, Sci-Fi', rating: 7.5, favorite: false, poster: 'https://via.placeholder.com/150x225/111/fff?text=3rd+Rock' },
            { id: 4, title: 'A Man on the Inside', type: 'TV', genre: 'Comedy, Crime', rating: 7.4, favorite: false, poster: 'https://via.placeholder.com/150x225/111/fff?text=Man+On+Inside' },
            { id: 5, title: 'A Taste for Murder', type: 'TV', genre: 'Crime, Mystery, Drama', rating: 7.1, favorite: false, poster: 'https://via.placeholder.com/150x225/111/fff?text=Taste+for+Murder' },
            { id: 6, title: 'Agatha All Along', type: 'TV', genre: 'Sci-Fi & Fantasy, Comedy, Action & Adventure', rating: 7.4, favorite: false, poster: 'https://via.placeholder.com/150x225/111/fff?text=Agatha' },
            { id: 7, title: 'Altered Carbon', type: 'TV', genre: 'Sci-Fi, Action, Drama', rating: 7.6, favorite: false, poster: 'https://via.placeholder.com/150x225/111/fff?text=Altered+Carbon' },
            { id: 8, title: 'Babylon 5', type: 'TV', genre: 'Drama, Sci-Fi & Fantasy, Action & Adventure', rating: 8.0, favorite: true, poster: 'https://via.placeholder.com/150x225/111/fff?text=Babylon+5' }
        ];

        let currentView = 'grid'; // Options: 'grid', 'settings', 'actor'
        let activeFilterType = 'All';
        let activeGenre = 'All Genres';
        let searchQuery = '';

        /* ------------------------------------------------------------------ */
        /* FIX 1: Trakt Integration & OAuth Redirect Handler                  */
        /* ------------------------------------------------------------------ */
        /**
         * Initiates authentic Trakt OAuth redirect sequence.
         */
        function handleTraktAuth() {
            if (!TRAKT_CLIENT_ID || TRAKT_CLIENT_ID === 'YOUR_TRAKT_CLIENT_ID_HERE') {
                alert('Please enter your Trakt API Client ID in the settings code block.');
                return;
            }

            // Redirect back to this exact page after user approves on Trakt
            const redirectUri = window.location.origin + window.location.pathname;
            const authUrl = `https://trakt.tv/oauth/authorize?response_type=code&client_id=${TRAKT_CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}`;
            
            // Redirect the browser directly to Trakt
            window.location.href = authUrl;
        }

        /**
         * Checks if the user was redirected back from Trakt with an OAuth code.
         */
        function checkTraktOAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const authCode = urlParams.get('code');

            if (authCode) {
                // Strip auth code from URL bar cleanly
                window.history.replaceState({}, document.title, window.location.pathname);
                alert('Trakt connection successfully authorized!');
                console.log('Trakt Authorization Code Received:', authCode);
            }
        }

        /* ------------------------------------------------------------------ */
        /* FIX 2: Multi-Genre Matching Engine                                */
        /* ------------------------------------------------------------------ */
        /**
         * Evaluates media genre strings against selected drop-down values.
         * Handles comma lists and normalizes Sci-Fi / Science Fiction aliases.
         */
        function filterByGenre(items, selectedGenre) {
            if (!selectedGenre || selectedGenre === 'All Genres') {
                return items;
            }

            const cleanTarget = selectedGenre.trim().toLowerCase();

            return items.filter(item => {
                if (!item.genre) return false;
                const itemGenre = item.genre.toLowerCase();

                // Normalize Sci-Fi and Science Fiction equivalency
                if (cleanTarget === 'sci-fi' || cleanTarget === 'science fiction') {
                    return itemGenre.includes('sci-fi') || itemGenre.includes('science fiction');
                }

                // Match partial strings inside multi-genre arrays/strings
                return itemGenre.includes(cleanTarget);
            });
        }

        /* ------------------------------------------------------------------ */
        /* Core UI Rendering Logic                                            */
        /* ------------------------------------------------------------------ */
        function renderCollection() {
            const container = document.getElementById('appContainer');
            container.innerHTML = '<div class="grid-container" id="mediaGrid"></div>';
            const grid = document.getElementById('mediaGrid');

            // Apply active filters
            let filtered = mediaDatabase.filter(item => {
                const matchesType = (activeFilterType === 'All' || item.type === activeFilterType);
                const matchesSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesType && matchesSearch;
            });

            // Apply genre filter
            filtered = filterByGenre(filtered, activeGenre);

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 40px;">No titles found matching your selection.</p>';
                return;
            }

            // Build Media Poster Cards
            grid.innerHTML = filtered.map(item => `
                <div class="media-card" onclick="renderActorPage('Geena Davis')">
                    <div class="poster-wrapper">
                        ${item.favorite ? '<span class="badge-favorite">❤️</span>' : ''}
                        <span class="badge-rating">★ ${item.rating}</span>
                        <img class="poster-img" src="${item.poster}" alt="${item.title}">
                    </div>
                    <div class="card-title">${item.title}</div>
                </div>
            `).join('');
        }

        function renderSettings() {
            const container = document.getElementById('appContainer');
            container.innerHTML = `
                <div class="settings-container">
                    <div class="settings-panel">
                        <div class="panel-title">Database Backup & Recovery Station</div>
                        <div class="panel-desc">Export your entire local collection database or import a restored JSON file.</div>
                        <button class="btn-action">💾 Export Full Database Backup (.json)</button>
                    </div>

                    <div class="settings-panel">
                        <div class="panel-title">Trakt Account Sync Integration</div>
                        <div class="panel-desc">Connect your Trakt.tv account to automatically scrobble watched episodes and sync your collection state.</div>
                        <button class="btn-action pink" onclick="handleTraktAuth()">🔗 Authorize Trakt Account Sync</button>
                    </div>

                    <div class="settings-panel">
                        <div class="panel-title">TMDB Metadata Panel</div>
                        <div class="panel-desc">Repair missing posters, backdrop art, and performer details from The Movie Database.</div>
                        <button class="btn-action gold">⚡ Repair Movie & TV Art (TMDB)</button>
                    </div>
                </div>
            `;
        }

        /* ------------------------------------------------------------------ */
        /* FIX 3: Actor Detail View Render with Horizontal Scroll Rows        */
        /* ------------------------------------------------------------------ */
        function renderActorPage(actorName) {
            const container = document.getElementById('appContainer');
            
            container.innerHTML = `
                <div class="actor-profile">
                    <button class="btn-action pink" onclick="renderCollection()" style="margin-bottom: 16px;">← Back to Collection</button>
                    
                    <div class="actor-header">
                        <img src="https://via.placeholder.com/140x200/222/fff?text=${encodeURIComponent(actorName)}" class="actor-headshot" alt="${actorName}">
                        <div>
                            <h2 style="color: var(--accent-pink); font-size: 1.6rem;">${actorName}</h2>
                            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 6px;">Department: Acting</p>
                            <p style="color: var(--text-main); font-size: 0.85rem; margin-top: 12px; line-height: 1.4;">
                                Award-winning performer known across multiple iconic film and television projects in your vault.
                            </p>
                        </div>
                    </div>

                    <!-- Row 1: From My History -->
                    <div class="actor-media-section">
                        <div class="section-heading">From My History</div>
                        <div class="actor-media-row">
                            <div class="actor-media-card">
                                <img src="https://via.placeholder.com/140x210/111/fff?text=Beetlejuice" alt="Beetlejuice">
                                <div class="title">Beetlejuice</div>
                                <div class="role">Barbara</div>
                            </div>
                        </div>
                    </div>

                    <!-- Row 2: Acting in TV Shows -->
                    <div class="actor-media-section">
                        <div class="section-heading">Acting in TV Shows</div>
                        <div class="actor-media-row">
                            <div class="actor-media-card">
                                <img src="https://via.placeholder.com/140x210/111/fff?text=Letterman" alt="Letterman">
                                <div class="title">David Letterman</div>
                                <div class="role">Guest</div>
                            </div>
                            <div class="actor-media-card">
                                <img src="https://via.placeholder.com/140x210/111/fff?text=Carson" alt="Carson">
                                <div class="title">Johnny Carson</div>
                                <div class="role">Self</div>
                            </div>
                        </div>
                    </div>

                    <!-- Row 3: Acting in Movies -->
                    <div class="actor-media-section">
                        <div class="section-heading">Acting in Movies</div>
                        <div class="actor-media-row">
                            <div class="actor-media-card">
                                <img src="https://via.placeholder.com/140x210/111/fff?text=Beetlejuice" alt="Beetlejuice">
                                <div class="title">Beetlejuice</div>
                                <div class="role">Barbara</div>
                            </div>
                            <div class="actor-media-card">
                                <img src="https://via.placeholder.com/140x210/111/fff?text=The+Fly" alt="The Fly">
                                <div class="title">The Fly</div>
                                <div class="role">Veronica Quaife</div>
                            </div>
                            <div class="actor-media-card">
                                <img src="https://via.placeholder.com/140x210/111/fff?text=Thelma" alt="Thelma">
                                <div class="title">Thelma & Louise</div>
                                <div class="role">Thelma</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        /* ------------------------------------------------------------------ */
        /* Event Listeners & Startup Initialization                          */
        /* ------------------------------------------------------------------ */
        document.addEventListener('DOMContentLoaded', () => {
            // Check Trakt redirect state
            checkTraktOAuthCallback();

            // Render initial collection grid
            renderCollection();

            // Genre Dropdown Event
            document.getElementById('genreSelect').addEventListener('change', (e) => {
                activeGenre = e.target.value;
                renderCollection();
            });

            // Media Type Filter Event
            document.getElementById('mediaTypeSelect').addEventListener('change', (e) => {
                activeFilterType = e.target.value;
                renderCollection();
            });

            // Search Bar Input Event
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderCollection();
            });

            // Reset Filters Event
            document.getElementById('resetFiltersBtn').addEventListener('click', () => {
                activeGenre = 'All Genres';
                activeFilterType = 'All';
                searchQuery = '';
                document.getElementById('genreSelect').value = 'All Genres';
                document.getElementById('mediaTypeSelect').value = 'All';
                document.getElementById('searchInput').value = '';
                renderCollection();
            });

            // Toggle Settings View
            document.getElementById('toggleSettingsBtn').addEventListener('click', () => {
                if (currentView === 'settings') {
                    currentView = 'grid';
                    renderCollection();
                } else {
                    currentView = 'settings';
                    renderSettings();
                }
            });
        });
    </script>
</body>
</html>
