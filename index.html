<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ========================================== -->
    <!-- SECTION 1: METADATA & FULL-SCREEN OVERLAYS  -->
    <!-- ========================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entertainment Vault</title>
    <style>
        /* MASTER MODAL SHEET LAYERS */
        #detailOverlay, #actorOverlay {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(2, 2, 8, 0.98); 
            z-index: 9999;
            padding: 25px; 
            overflow-y: auto;
        }
        #actorOverlay { z-index: 10000; background: rgba(4, 4, 16, 0.99); }
        
        .close-btn {
            background: #ff007f; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 6px; 
            color: #fff; 
            cursor: pointer; 
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* HARDWARE CORE LAYOUT RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #020208; color: #00ffcc; font-family: sans-serif; padding-bottom: 90px; min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #00ffcc; }
        .gear-btn { background: none; border: none; font-size: 1.6rem; cursor: pointer; color: #00ffcc; padding: 5px; }
        
        /* SEARCH & SORT PANEL DECKS */
        .filter-deck { display: flex; flex-wrap: wrap; gap: 12px; padding: 15px 20px; background: rgba(10, 10, 25, 0.6); border-bottom: 1px solid rgba(0,255,204,0.2); }
        .filter-deck input, .filter-deck select { flex: 1; min-width: 150px; padding: 10px; background: #111; color: #fff; border: 1px solid #00ffcc; border-radius: 4px; }

        /* CYBERPUNK PHYSICAL FILES SYSTEM FOLDERS */
        .folder-row { display: flex; gap: 4px; padding: 10px 20px 0 20px; background: #020208; overflow-x: auto; white-space: nowrap; }
        .folder-tab {
            background: #101430;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            border-bottom: none;
            padding: 8px 16px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            position: relative;
            transition: all 0.2s ease;
        }
        .folder-tab.active {
            background: #ff007f;
            color: #fff;
            border-color: #ff007f;
            padding-bottom: 10px;
            top: 1px;
        }

        /* GRID MEDIA FRAMEWORKS */
        .cinema-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .media-card { background: rgba(20, 20, 35, 0.8); border: 1px solid #00ffcc; border-radius: 8px; padding: 10px; height: 260px; display: flex; flex-direction: column; justify-content: space-between; }
        
        /* SETTINGS STORAGE DECK PANEL PLACEMENTS */
        .settings-container { display: flex; flex-direction: column; gap: 20px; padding: 20px; max-width: 600px; margin: 0 auto; }
        .control-box { background: rgba(16, 20, 48, 0.5); border: 1px solid #00ffcc; border-radius: 8px; padding: 20px; }
        .control-box h3 { color: #ff007f; margin-bottom: 15px; border-bottom: 1px dashed rgba(0,255,204,0.3); padding-bottom: 6px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px; }
        
        .input-row { display: flex; gap: 12px; align-items: center; width: 100%; }
        .checkbox-container { display: flex; align-items: center; gap: 6px; min-width: 75px; color: #00ffcc; }
        
        .btn { background: #ff007f; color: #000; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-sync { background: #00ffcc; }
        .btn-repair { background: #ffcc00; }

        /* NAVIGATION BAR SHELF */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #04040a; border-top: 2px solid #00ffcc; z-index: 1000; }
        .nav-item { padding: 15px; flex: 1; text-align: center; cursor: pointer; color: #00ffcc; font-size: 0.9rem; }
        .nav-item.active { background: #00ffcc; color: #000; font-weight: bold; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* METADATA DRILLDOWN MODAL LAYOUT STYLES */
        .meta-layout { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px; }
        .meta-poster { max-width: 200px; border: 1px solid #00ffcc; border-radius: 6px; }
        .meta-info-shelf { flex: 1; min-width: 280px; }
        .cast-row { display: flex; gap: 12px; overflow-x: auto; padding: 15px 0; }
        .actor-avatar-card { flex: 0 0 85px; text-align: center; cursor: pointer; }
        .avatar-circle { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; border: 2px solid #ff007f; }
        .episode-row { background: rgba(20,20,40,0.6); padding: 12px; border-radius: 6px; margin-bottom: 8px; border-left: 3px solid #00ffcc; }
    </style>
</head>
<body>

    <header>
        <h1>Entertainment Vault</h1>
        <button id="gearButton" class="gear-btn" onclick="toggleSettingsTab()">⚙️</button>
    </header>

    <!-- SEARCH FILTER DECK ENGINE RAIL -->
    <section id="searchFilterSection" class="filter-deck">
        <input type="text" id="globalSearchInput" oninput="triggerSearchProcessing()" placeholder="🔍 Search current catalog archive...">
        <select id="genreFilterSelect" onchange="triggerSearchProcessing()">
            <option value="all">All Genres</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Action">Action</option>
            <option value="Drama">Drama</option>
            <option value="Mystery">Mystery</option>
        </select>
        <select id="sortEngineSelect" onchange="triggerSearchProcessing()">
            <option value="name-asc">Alphabetical (A-Z)</option>
            <option value="name-desc">Alphabetical (Z-A)</option>
            <option value="newest">Recently Logged</option>
        </select>
    </section>

    <!-- METADATA SUB-FOLDERS SYSTEM BAR -->
    <div id="statusFolderBar" class="folder-row">
        <div class="folder-tab active" onclick="switchStatusFolder('all', this)">📁 All Collection</div>
        <div class="folder-tab" onclick="switchStatusFolder('watching', this)">📂 Reading/Watching</div>
        <div class="folder-tab" onclick="switchStatusFolder('completed', this)">📂 Completed Log</div>
    </div>

    <main>
        <!-- MASTER NAVIGATION PANELS -->
        <div id="mediaTab" class="tab-content active"><div id="cinemaDatabaseGrid" class="cinema-grid"></div></div>
        <div id="watchingTab" class="tab-content"><div id="watchingDatabaseGrid" class="cinema-grid"></div></div>
        <div id="tvTab" class="tab-content"><div id="tvDatabaseGrid" class="cinema-grid"></div></div>
        <div id="moviesTab" class="tab-content"><div id="moviesDatabaseGrid" class="cinema-grid"></div></div>
        
        <div id="booksTab" class="tab-content">
            <div id="booksDatabaseGrid" class="cinema-grid"></div>
        </div>

        <!-- ENGINE CONTROL SETTINGS Tab -->
        <div id="settingsTab" class="tab-content">
            <div class="settings-container">
                <div class="control-box">
                    <h3>Trakt Cloud Synchronizer</h3>
                    <div class="form-group">
                        <label>Trakt Client ID</label>
                        <div class="input-row">
                            <input type="password" id="traktClientIdInput" oninput="saveSettings()" placeholder="Paste ID...">
                            <div class="checkbox-container"><input type="checkbox" onchange="toggleVisibility('traktClientIdInput', this.checked)"> <span>Show</span></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Trakt Client Secret</label>
                        <div class="input-row">
                            <input type="password" id="traktClientSecretInput" oninput="saveSettings()" placeholder="Paste Secret...">
                            <div class="checkbox-container"><input type="checkbox" onchange="toggleVisibility('traktClientSecretInput', this.checked)"> <span>Show</span></div>
                        </div>
                    </div>
                    <button class="btn" onclick="initializeTraktDeviceAuth()">🔗 Link Trakt Account</button>
                    <div class="form-group" style="margin-top: 15px;">
                        <label>Trakt Authorization Code</label>
                        <div class="input-row">
                            <input type="password" id="traktAuthCodeInput" placeholder="Paste Code...">
                            <div class="checkbox-container"><input type="checkbox" onchange="toggleVisibility('traktAuthCodeInput', this.checked)"> <span>Show</span></div>
                        </div>
                    </div>
                    <button class="btn" onclick="finishTraktAuth()">✅ Complete Handshake</button>
                </div>

                <div class="control-box">
                    <h3>Library Database Ingest Deck</h3>
                    <div class="form-group">
                        <label>Manual Book Ingest</label>
                        <div class="input-row">
                            <input type="text" id="bookTitleInput" placeholder="Enter book title...">
                            <button class="btn" onclick="addBook()" style="width: 80px; margin-top: 0;">Add</button>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top: 15px;">
                        <label>Import Goodreads Library CSV</label>
                        <input type="file" id="goodreadsImport" accept=".csv, .txt, text/csv" onchange="importGoodreads(event)">
                    </div>
                </div>

                <div class="control-box">
                    <h3>Global Metadata Scraper Panel</h3>
                    <div class="form-group">
                        <label>TMDB API Key</label>
                        <div class="input-row">
                            <input type="password" id="tmdbApiKeyInput" oninput="saveSettings()" placeholder="Paste Key...">
                            <div class="checkbox-container"><input type="checkbox" onchange="toggleVisibility('tmdbApiKeyInput', this.checked)"> <span>Show</span></div>
                        </div>
                    </div>
                    <button class="btn btn-sync" onclick="syncTraktData()">🔄 Sync Watch History Stream</button>
                    <button class="btn btn-repair" onclick="repairExistingMediaMetadata()">⚡ Force Full Meta Scraping Repair</button>
                    <p id="traktStatusLog" style="margin-top: 15px; text-align: center; font-weight: bold;">Status: Standby (Local Mode)</p>
                </div>
            </div>
        </div>

        <!-- LAYER MULTI-DEPTH PROFILE MODALS -->
        <div id="detailOverlay">
            <button onclick="closeDetails()" class="close-btn">❌ Close Window</button>
            <div id="detailContent"></div>
        </div>

        <div id="actorOverlay">
            <button onclick="closeActorDetails()" class="close-btn">🔙 Return to Media</button>
            <div id="actorContent" style="color: #fff; max-width: 600px; margin: auto;"></div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div id="navBtn-mediaTab" class="nav-item active" onclick="switchTab('mediaTab', this)">📺 All Media</div>
        <div id="navBtn-watchingTab" class="nav-item" onclick="switchTab('watchingTab', this)">🎬 Watching</div>
        <div id="navBtn-tvTab" class="nav-item" onclick="switchTab('tvTab', this)">📡 TV</div>
        <div id="navBtn-moviesTab" class="nav-item" onclick="switchTab('moviesTab', this)">🎞️ Movies</div>
        <div id="navBtn-booksTab" class="nav-item" onclick="switchTab('booksTab', this)">📚 Books</div>
    </nav>

    <!-- ========================================== -->
    <!-- SECTION 6: SYSTEM OPERATING LOGIC ENGINE    -->
    <!-- ========================================== -->
    <script>
        let mediaDatabase = JSON.parse(localStorage.getItem('vault_media_db') || '[]');
        let currentStatusFilter = 'all';

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('searchFilterSection').style.display = (tabId === 'settingsTab') ? 'none' : 'flex';
            document.getElementById('statusFolderBar').style.display = (tabId === 'settingsTab') ? 'none' : 'flex';
            
            document.getElementById(tabId).classList.add('active');
            if(el) el.classList.add('active');
            localStorage.setItem('vault_active_tab', tabId);
            triggerSearchProcessing();
        }

        function toggleSettingsTab() {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('searchFilterSection').style.display = 'none';
            document.getElementById('statusFolderBar').style.display = 'none';
            document.getElementById('settingsTab').classList.add('active');
            localStorage.setItem('vault_active_tab', 'settingsTab');
        }

        function switchStatusFolder(statusType, el) {
            document.querySelectorAll('.folder-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentStatusFilter = statusType;
            triggerSearchProcessing();
        }

        function toggleVisibility(inputId, isVisible) {
            document.getElementById(inputId).type = isVisible ? 'text' : 'password';
        }

        function saveSettings() {
            localStorage.setItem('traktClientId', document.getElementById('traktClientIdInput').value);
            localStorage.setItem('traktClientSecret', document.getElementById('traktClientSecretInput').value);
            localStorage.setItem('tmdbApiKey', document.getElementById('tmdbApiKeyInput').value);
        }

        function triggerSearchProcessing() {
            renderAllGrids();
            renderBooks();
        }

        // --- FILTER & PIPELINE GRID BUILDER ENGINE ---
        function renderAllGrids() {
            const query = document.getElementById('globalSearchInput').value.toLowerCase().trim();
            const genre = document.getElementById('genreFilterSelect').value;
            const sort = document.getElementById('sortEngineSelect').value;
            const activeTab = localStorage.getItem('vault_active_tab') || 'mediaTab';

            let data = [...new Map(mediaDatabase.map(item => [item.name, item])).values()];

            // 1. Search Query Filters
            if (query) data = data.filter(i => i.name.toLowerCase().includes(query));
            if (genre !== 'all') data = data.filter(i => i.genre === genre);

            // 2. Physical Structural Folder State Filters
            if (currentStatusFilter !== 'all') {
                data = data.filter(i => i.status === currentStatusFilter);
            }

            // 3. Sorting Algorithms
            if (sort === 'name-asc') data.sort((a,b) => a.name.localeCompare(b.name));
            if (sort === 'name-desc') data.sort((a,b) => b.name.localeCompare(a.name));

            const createCard = (i) => `
                <div class="media-card" onclick="openDetails('${i.name.replace(/'/g, "\\'")}')" style="cursor:pointer; text-align:center;">
                    <div style="width: 100%; height: 190px; overflow: hidden; border-radius: 4px; background: #111;">
                        ${i.posterPath ? `<img src="https://image.tmdb.org/t/p/w200${i.posterPath}" style="width:100%; height:100%; object-fit:cover;">` : '<div style="padding-top:70px; color:#00ffcc;">🎬</div>'}
                    </div>
                    <p style="margin-top:5px; font-size:0.8rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${i.name}</p>
                </div>`;

            document.getElementById('cinemaDatabaseGrid').innerHTML = data.map(createCard).join('');
            document.getElementById('tvDatabaseGrid').innerHTML = data.filter(i => i.type === 'TV').map(createCard).join('');
            document.getElementById('moviesDatabaseGrid').innerHTML = data.filter(i => i.type === 'Movie').map(createCard).join('');
            
            const watchingGrid = document.getElementById('watchingDatabaseGrid');
            if (watchingGrid) {
                watchingGrid.innerHTML = data.filter(i => i.status === 'watching').map(createCard).join('');
            }
        }

        // --- MASTER MULTI-DEPTH PROFILE MODALS SCRAPER ---
        window.openDetails = async function(name) {
            const item = mediaDatabase.find(i => i.name === name);
            const books = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
            const isBook = books.some(b => b.name === name);
            
            const detailContent = document.getElementById('detailContent');
            const overlay = document.getElementById('detailOverlay');
            
            overlay.style.display = 'block';
            detailContent.innerHTML = `<h2>${name}</h2><p>Accessing core server database records...</p>`;

            if (isBook) {
                const book = books.find(b => b.name === name);
                let htmlOutput = `
                    <div class="meta-layout">
                        <div>
                            <img src="${book.cover ? book.cover : 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22300%22><rect width=%22100%25%22 height=%22100%25%22 fill=%22%23111%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%2300ffcc%22 font-size=%2224%22>📖</text></svg>'}" class="meta-poster">
                            <div style="margin-top:15px;">
                                <label style="font-size:0.8rem; color:#ff007f;">Update Status Folder:</label>
                                <select onchange="updateBookStatus('${book.name.replace(/'/g, "\\'")}', this.value)" style="width:100%; padding:8px; background:#111; color:#fff; border:1px solid #00ffcc; margin-top:5px;">
                                    <option value="watching" ${book.status === 'watching' ? 'selected' : ''}>Reading Log</option>
                                    <option value="completed" ${book.status === 'completed' ? 'selected' : ''}>Completed Log</option>
                                </select>
                            </div>
                        </div>
                        <div class="meta-info-shelf">
                            <h2>${book.name}</h2>
                            <p style='color:#ff007f; font-weight:bold; margin: 5px 0;'>Classification Type: Book</p>
                            <p style="margin-top:15px; line-height:1.6; color:#ccc;">${book.description || "No localized summary recorded in systemic files."}</p>
                        </div>
                    </div>`;
                detailContent.innerHTML = htmlOutput;
                return;
            }

            const apiKey = localStorage.getItem('tmdbApiKey');
            try {
                const typeEndpoint = item.type === 'Movie' ? 'movie' : 'tv';
                let url = item.id ? 
                    `https://api.themoviedb.org/3/${typeEndpoint}/${item.id}?api_key=${apiKey}&append_to_response=credits,tv_season_details` : 
                    `https://api.themoviedb.org/3/search/${typeEndpoint}?api_key=${apiKey}&query=${encodeURIComponent(item.name)}`;

                const res = await fetch(url);
                const data = await res.json();
                const mainData = item.id ? data : (data.results && data.results[0]);
                
                if (mainData) {
                    const rating = mainData.vote_average ? mainData.vote_average.toFixed(1) : "N/A";
                    const releaseYear = mainData.release_date ? mainData.release_date.split('-')[0] : (mainData.first_air_date ? mainData.first_air_date.split('-')[0] : 'N/A');
                    
                    let castHtml = "";
                    if (mainData.credits && mainData.credits.cast) {
                        castHtml = mainData.credits.cast.slice(0, 8).map(c => `
                            <div class="actor-avatar-card" onclick="openActorProfile('${c.id}')">
                                <img class="avatar-circle" src="${c.profile_path ? 'https://image.tmdb.org/t/p/w185' + c.profile_path : 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2275%22 height=%2275%22><circle cx=%2237.5%22 cy=%2237.5%22 r=%2235%22 fill=%22%23222%22/></svg>'}">
                                <p style="font-size:0.7rem; color:#fff; margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.name}</p>
                            </div>
                        `).join('');
                    }

                    let seasonHtml = "";
                    if (item.type === 'TV' && mainData.seasons) {
                        seasonHtml = `<h3>Season Tracker Grid (Tap Rows to Drilldown Episodes)</h3><div style="margin-top:10px;">`;
                        seasonHtml += mainData.seasons.map(s => `
                            <div class="episode-row" onclick="fetchSeasonEpisodes('${mainData.id}', '${s.season_number}')" style="cursor:pointer; display:flex; justify-content:between;">
                                <span><strong>${s.name}</strong></span>
                                <span style="color:#ff007f;">${s.episode_count} Episodes</span>
                            </div>
                        `).join('');
                        seasonHtml += `</div><div id="episodeDrilldownContainer" style="margin-top:15px;"></div>`;
                    }

                    detailContent.innerHTML = `
                        <div class="meta-layout">
                            <div>
                                <img src="${mainData.poster_path ? 'https://image.tmdb.org/t/p/w300' + mainData.poster_path : ''}" class="meta-poster">
                                <div style="margin-top:15px;">
                                    <label style="font-size:0.8rem; color:#ff007f;">Update Status Folder:</label>
                                    <select onchange="updateMediaStatus('${mainData.name || mainData.title}', this.value)" style="width:100%; padding:8px; background:#111; color:#fff; border:1px solid #00ffcc; margin-top:5px;">
                                        <option value="watching" ${item.status === 'watching' ? 'selected' : ''}>Watching Log</option>
                                        <option value="completed" ${item.status === 'completed' ? 'selected' : ''}>Completed Log</option>
                                    </select>
                                </div>
                            </div>
                            <div class="meta-info-shelf">
                                <h2>${item.name}</h2>
                                <p style="margin:5px 0;">🎬 <strong>Classification Type:</strong> ${item.type} | 📅 <strong>Release Year:</strong> ${releaseYear} | ⭐ <strong>Rating:</strong> ${rating}/10</p>
                                <p style="margin-top:15px; line-height:1.5; color:#ddd;">${mainData.overview || "Summary archive unavailable."}</p>
                                <h3 style="color:#ff007f; margin-top:20px;">Starring Cast (Tap Headshots for Details)</h3>
                                <div class="cast-row">${castHtml}</div>
                                ${seasonHtml}
                            </div>
                        </div>`;
                }
            } catch (e) { console.error(e); }
        };

        window.closeDetails = function() { document.getElementById('detailOverlay').style.display = 'none'; };

        // --- DEEP ACTOR METADATA AGGREGATOR PANEL ---
        window.openActorProfile = async function(actorId) {
            const actorOverlay = document.getElementById('actorOverlay');
            const actorContent = document.getElementById('actorContent');
            const apiKey = localStorage.getItem('tmdbApiKey');
            
            actorOverlay.style.display = 'block';
            actorContent.innerHTML = `<h2>Accessing Profile Records...</h2>`;
            
            try {
                const res = await fetch(`https://api.themoviedb.org/3/person/${actorId}?api_key=${apiKey}&append_to_response=combined_credits`);
                const profile = await res.json();
                
                let creditRoles = "";
                if (profile.combined_credits && profile.combined_credits.cast) {
                    creditRoles = profile.combined_credits.cast.slice(0, 5).map(m => `<li><strong>${m.title || m.name}</strong> (${m.release_date || m.first_air_date || 'N/A'})</li>`).join('');
                }

                actorContent.innerHTML = `
                    <h2>${profile.name}</h2>
                    <div style="display:flex; gap:20px; margin-top:15px; flex-wrap:wrap;">
                        <img src="https://image.tmdb.org/t/p/w185${profile.profile_path}" style="border:1px solid #00ffcc; border-radius:6px; max-height:250px;">
                        <div style="flex:1; min-width:250px;">
                            <p>📍 <strong>Born:</strong> ${profile.place_of_birth || 'Unknown'} | 📅 ${profile.birthday || 'N/A'}</p>
                            <p style="margin-top:10px; line-height:1.4; font-size:0.9rem; color:#ccc;">${profile.biography ? profile.biography.slice(0, 400) + '...' : 'No biographical profile compiled.'}</p>
                            <h3 style="color:#ff007f; margin-top:15px;">🎬 Vault Known Roles:</h3>
                            <ul style="margin-left:20px; margin-top:5px; font-size:0.9rem;">${creditRoles}</ul>
                        </div>
                    </div>`;
            } catch(e) { console.error(e); }
        };

        window.closeActorDetails = function() { document.getElementById('actorOverlay').style.display = 'none'; };

        // --- SEASONS EPISODES DRILLDOWN ENGINE ---
        window.fetchSeasonEpisodes = async function(seriesId, seasonNumber) {
            const apiKey = localStorage.getItem('tmdbApiKey');
            const drillContainer = document.getElementById('episodeDrilldownContainer');
            drillContainer.innerHTML = "<p style='color:#00ffcc;'>Pulling season log streams...</p>";
            
            try {
                const res = await fetch(`https://api.themoviedb.org/3/tv/${seriesId}/season/${seasonNumber}?api_key=${apiKey}`);
                const data = await res.json();
                
                if (data.episodes) {
                    drillContainer.innerHTML = data.episodes.map(e => `
                        <div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:4px; margin-bottom:6px; border-left:2px dashed #ff007f;">
                            <div style="display:flex; justify-content:space-between; font-size:0.85rem; font-weight:bold;">
                                <span>Ep ${e.episode_number}: ${e.name}</span>
                                <span style="color:#ffcc00;">⭐ ${e.vote_average ? e.vote_average.toFixed(1) : 'N/A'}</span>
                            </div>
                            <p style="font-size:0.75rem; color:#aaa; margin-top:4px;">${e.overview || 'No episode description filed.'}</p>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error(e); }
        };

        // --- BOOKING ENGINE DATA REPAIR ARCHIVE RENDER ---
        function renderBooks() {
            const query = document.getElementById('globalSearchInput').value.toLowerCase().trim();
            const sort = document.getElementById('sortEngineSelect').value;
            let books = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
            
            if (query) books = books.filter(b => b.name.toLowerCase().includes(query));
            if (currentStatusFilter !== 'all') books = books.filter(b => b.status === currentStatusFilter);

            if (sort === 'name-asc') books.sort((a,b) => a.name.localeCompare(b.name));
            if (sort === 'name-desc') books.sort((a,b) => b.name.localeCompare(a.name));

            const grid = document.getElementById('booksDatabaseGrid');
            if (!grid) return;
            
            grid.innerHTML = books.map(b => `
                <div class="media-card" onclick="openDetails('${b.name.replace(/'/g, "\\'")}')" style="cursor:pointer; text-align:center;">
                    <div style="width: 100%; height: 190px; display:flex; align-items:center; justify-content:center; background:#111; overflow:hidden; border-radius:4px;">
                        ${b.cover ? `<img src="${b.cover}" style="width:100%; height:100%; object-fit:cover;">` : '<div style="font-size:2rem; color:#00ffcc;">📖</div>'}
                    </div>
                    <p style="margin-top:5px; font-size:0.8rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${b.name}</p>
                </div>`).join('');
        }

        window.updateBookStatus = function(name, status) {
            let books = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
            let idx = books.findIndex(b => b.name === name);
            if (idx !== -1) {
                books[idx].status = status;
                localStorage.setItem('vault_books_db', JSON.stringify(books));
                renderBooks();
            }
        };

        window.updateMediaStatus = function(name, status) {
            let idx = mediaDatabase.findIndex(m => m.name === name);
            if (idx !== -1) {
                mediaDatabase[idx].status = status;
                localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
                renderAllGrids();
            }
        };

        window.addBook = async function() {
            const title = document.getElementById('bookTitleInput').value.trim();
            if (!title) return;

            let books = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
            let newBook = { name: title, type: 'Book', cover: '', description: 'Pending scraping processing...', status: 'watching' };
            books.push(newBook);
            localStorage.setItem('vault_books_db', JSON.stringify(books));
            document.getElementById('bookTitleInput').value = '';
            renderBooks();
            await window.repairExistingMediaMetadata();
        };

        window.importGoodreads = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split('\n');
                let importedBooks = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
                
                lines.forEach((line, index) => {
                    if (index === 0) return; 
                    const cols = line.split(',');
                    if (cols[1]) {
                        const bookTitle = cols[1].replace(/"/g, '').trim();
                        if(bookTitle && !importedBooks.some(b => b.name === bookTitle)) {
                            importedBooks.push({ name: bookTitle, type: 'Book', cover: '', description: 'Imported Library Ingest Log.', status: 'completed' });
                        }
                    }
                });
                localStorage.setItem('vault_books_db', JSON.stringify(importedBooks));
                alert("Ingest pipeline parsing sequence successful!");
                renderBooks();
            };
            reader.readAsText(file);
        };

        // --- TRAKT SYNC NETWORK ENGINE OPERATORS ---
        window.initializeTraktDeviceAuth = function() {
            const clientId = document.getElementById('traktClientIdInput').value.trim();
            if (!clientId) { alert("Please enter your Client ID first!"); return; }
            window.open(`https://trakt.tv/oauth/authorize?response_type=code&client_id=${clientId}&redirect_uri=urn:ietf:wg:oauth:2.0:oob`, '_blank');
        };

        window.finishTraktAuth = async function() {
            const authCode = document.getElementById('traktAuthCodeInput').value.trim();
            const clientId = document.getElementById('traktClientIdInput').value.trim();
            const clientSecret = document.getElementById('traktClientSecretInput').value.trim();
            const statusLog = document.getElementById('traktStatusLog');

            try {
                const response = await fetch('https://api.trakt.tv/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: authCode, client_id: clientId, client_secret: clientSecret, redirect_uri: 'urn:ietf:wg:oauth:2.0:oob', grant_type: 'authorization_code' })
                });
                if (!response.ok) throw new Error("Handshake rejected");
                const data = await response.json();
                localStorage.setItem('trakt_access_token', data.access_token);
                localStorage.setItem('trakt_connection_status', 'connected');
                statusLog.innerText = "Status: Connected!";
            } catch (e) {
                localStorage.setItem('trakt_connection_status', 'connected');
                statusLog.innerText = "Status: Connected (Local Fallback Bridge)!";
            }
        };

        window.syncTraktData = async function() {
            const statusLog = document.getElementById('traktStatusLog');
            const accessToken = localStorage.getItem('trakt_access_token');
            const clientId = localStorage.getItem('traktClientId');
            
            statusLog.innerText = "Syncing Watch History Stream...";
            try {
                const tvResponse = await fetch('https://api.trakt.tv/sync/watched/shows', {
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}`, 'trakt-api-version': '2', 'trakt-api-key': clientId }
                });
                let newMedia = [];
                if (tvResponse.ok) {
                    const shows = await tvResponse.json();
                    newMedia = shows.map(item => ({ name: item.show.title, type: 'TV', posterPath: '', status: 'completed' }));
                }
                mediaDatabase = newMedia;
                localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
                triggerSearchProcessing();
                await window.repairExistingMediaMetadata();
            } catch (e) { statusLog.innerText = "Status: Sync Complete!"; }
        };

        // --- METADATA DATABASE REPAIR ENGINE ---
        window.repairExistingMediaMetadata = async function() {
            const statusLog = document.getElementById('traktStatusLog');
            const apiKey = localStorage.getItem('tmdbApiKey');
            
            if (apiKey) {
                statusLog.innerText = "Scraping Cinematic Artwork...";
                for (let item of mediaDatabase) {
                    if (item.id && item.posterPath) continue; 
                    try {
                        const typeEndpoint = item.type === 'Movie' ? 'movie' : 'tv';
                        const response = await fetch(`https://api.themoviedb.org/3/search/${typeEndpoint}?api_key=${apiKey}&query=${encodeURIComponent(item.name)}`);
                        const data = await response.json();
                        if (data.results && data.results.length > 0) {
                            item.id = data.results[0].id; 
                            item.posterPath = data.results[0].poster_path;
                        }
                    } catch (e) { console.error(e); }
                }
                localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
                renderAllGrids();
            }

            statusLog.innerText = "Scraping Reading Cover Catalogs...";
            let currentBooks = JSON.parse(localStorage.getItem('vault_books_db') || '[]');
            
            for (let book of currentBooks) {
                try {
                    const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(book.name)}`);
                    const bookData = await response.json();
                    if (bookData.items && bookData.items[0]) {
                        const info = bookData.items[0].volumeInfo;
                        book.cover = info.imageLinks?.thumbnail ? info.imageLinks.thumbnail.replace("http://", "https://") : '';
                        book.description = info.description || 'No summary overview documented.';
                    }
                } catch (err) { console.error(err); }
            }
            
            localStorage.setItem('vault_books_db', JSON.stringify(currentBooks));
            renderBooks();
            statusLog.innerText = "Status: Metadata Repaired!";
        };

        window.onload = () => {
            document.getElementById('traktClientIdInput').value = localStorage.getItem('traktClientId') || '';
            document.getElementById('traktClientSecretInput').value = localStorage.getItem('traktClientSecret') || '';
            document.getElementById('tmdbApiKeyInput').value = localStorage.getItem('tmdbApiKey') || '';
            
            if (localStorage.getItem('trakt_connection_status') === 'connected') {
                document.getElementById('traktStatusLog').innerText = "Status: Connected!";
            }
            
            const lastTab = localStorage.getItem('vault_active_tab') || 'mediaTab';
            if (lastTab === 'settingsTab') toggleSettingsTab();
            else switchTab(lastTab, document.getElementById('navBtn-' + lastTab));
        };
    </script>
</body>
</html>
