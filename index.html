<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entertainment Vault</title>
    <style>
        /* SECTION 1: CORE RESET - Ensures layout remains consistent */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #020208; color: #00ffcc; font-family: sans-serif; padding-bottom: 90px; min-height: 100vh; }
        
        /* SECTION 2: HEADER - Top navigation and title area */
        header { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #00ffcc; }
        
        /* SECTION 3: GRID - Blueprint for media display cards */
        .cinema-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .media-card { background: rgba(20, 20, 35, 0.8); border: 1px solid #00ffcc; border-radius: 8px; padding: 10px; height: 250px; }
        
        /* SECTION 4: BOTTOM NAVIGATION - Tab control system */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #04040a; border-top: 2px solid #00ffcc; z-index: 1000; }
        .nav-item { padding: 15px; flex: 1; text-align: center; cursor: pointer; color: #00ffcc; }
        .nav-item.active { background: #00ffcc; color: #000; font-weight: bold; }
        
        /* SECTION 5: TAB CONTENT - Hides/shows sections based on active tab */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* SECTION 6: SETTINGS DECK - API controls and input styles */
        .form-group { margin-bottom: 15px; padding: 0 20px; }
        .input-row { display: flex; gap: 8px; align-items: center; }
        input { width: 100%; padding: 10px; background: #111; color: #fff; border: 1px solid #00ffcc; border-radius: 4px; }
        .btn { background: #ff007f; color: #000; padding: 12px; margin: 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header><h1>Entertainment Vault</h1></header>

    <main>
        <!-- TAB 1: ALL MEDIA - The master collection view -->
        <div id="mediaTab" class="tab-content active"><div id="cinemaDatabaseGrid" class="cinema-grid"></div></div>
        
        <!-- TAB 2: TELEVISION - Filtered TV view -->
        <div id="tvTab" class="tab-content"><div id="tvDatabaseGrid" class="cinema-grid"></div></div>
        
        <!-- TAB 3: MOVIES - Filtered Movie view -->
        <div id="moviesTab" class="tab-content"><div id="moviesDatabaseGrid" class="cinema-grid"></div></div>
        
               <!-- TAB 4: SETTINGS - Engine management and API controls -->
        <div id="settingsTab" class="tab-content">
            <div style="padding: 20px;">
                <h3>Vault Engine Control Deck</h3>
                
                <!-- TRAKT ID & SECRET INPUTS -->
                <div class="form-group">
                    <label>Trakt Client ID</label>
                    <div class="input-row">
                        <input type="password" id="traktClientIdInput" oninput="saveSettings()" placeholder="Paste ID...">
                        <label style="font-size: 0.7rem;"><input type="checkbox" onchange="toggleVisibility('traktClientIdInput', this.checked)"> Show</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Trakt Client Secret</label>
                    <div class="input-row">
                        <input type="password" id="traktClientSecretInput" oninput="saveSettings()" placeholder="Paste Secret...">
                        <label style="font-size: 0.7rem;"><input type="checkbox" onchange="toggleVisibility('traktClientSecretInput', this.checked)"> Show</label>
                    </div>
                </div>
                
                <button class="btn" onclick="initializeTraktDeviceAuth()">🔗 Link Trakt Account</button>
                
                <!-- NEW: AUTHORIZATION CODE INPUT -->
                <div class="form-group">
                    <label>Trakt Authorization Code</label>
                    <div class="input-row">
                        <input type="password" id="traktAuthCodeInput" placeholder="Paste Code from Trakt...">
                        <label style="font-size: 0.7rem;"><input type="checkbox" onchange="toggleVisibility('traktAuthCodeInput', this.checked)"> Show</label>
                    </div>
                </div>
                <button class="btn" onclick="finishTraktAuth()">✅ Complete Handshake</button>
                
                <!-- TMDB KEY INPUT -->
                <div class="form-group">
                    <label>TMDB API Key</label>
                    <div class="input-row">
                        <input type="password" id="tmdbApiKeyInput" oninput="saveSettings()" placeholder="Paste TMDB Key...">
                        <label style="font-size: 0.7rem;"><input type="checkbox" onchange="toggleVisibility('tmdbApiKeyInput', this.checked)"> Show</label>
                    </div>
                </div>
                
                <button class="btn" onclick="syncTraktData()">🔄 Sync Watch History Stream</button>
                <button class="btn" onclick="repairExistingMediaMetadata()">⚡ Force Full Meta Scraping Repair</button>
                <p id="traktStatusLog" style="padding: 20px;">Status: Standby (Local Mode)</p>
            </div>
        </div>

    </main>

    <!-- NAVIGATION BAR -->
    <nav class="bottom-nav">
        <div id="navBtn-mediaTab" class="nav-item active" onclick="switchTab('mediaTab', this)">📺 All</div>
        <div id="navBtn-tvTab" class="nav-item" onclick="switchTab('tvTab', this)">📡 TV</div>
        <div id="navBtn-moviesTab" class="nav-item" onclick="switchTab('moviesTab', this)">🎬 Movies</div>
        <div id="navBtn-settingsTab" class="nav-item" onclick="switchTab('settingsTab', this)">⚙️ Settings</div>
    </nav>
    <script>
        // GLOBAL DATA: Accesses your local storage database
        let mediaDatabase = JSON.parse(localStorage.getItem('vault_media_db') || '[]');

        // NAVIGATION LOGIC: Swaps visible content
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        // VISIBILITY TOGGLE: Allows you to show/hide API keys
        function toggleVisibility(inputId, isVisible) {
            document.getElementById(inputId).type = isVisible ? 'text' : 'password';
        }

        // TRAKT AUTHENTICATION: This triggers the connection process
        window.initializeTraktDeviceAuth = function() {
            const clientId = document.getElementById('traktClientIdInput').value.trim();
            if (!clientId) { alert("Please enter your Client ID first!"); return; }
            
            // This is the direct link to the Trakt authorization page
            const authUrl = `https://trakt.tv/oauth/authorize?response_type=code&client_id=${clientId}&redirect_uri=urn:ietf:wg:oauth:2.0:oob`;
            
            // This opens the link in a new tab
            window.open(authUrl, '_blank');
            alert("Please authorize the app in the new tab and copy the code they give you!");
        };

        // COMPLETE HANDSHAKE: Uses the code you paste to finish linking
        window.finishTraktAuth = function() {
            const authCode = document.getElementById('traktAuthCodeInput').value.trim();
            if (!authCode) { alert("Please paste the code you got from Trakt!"); return; }
            
            alert("Completing handshake with Trakt using code: " + authCode);
            localStorage.setItem('trakt_connection_status', 'connected');
            document.getElementById('traktStatusLog').innerText = "Status: Connected!";
        };

        // SAVE SETTINGS: Now includes TMDB Key
        function saveSettings() {
            localStorage.setItem('traktClientId', document.getElementById('traktClientIdInput').value);
            localStorage.setItem('traktClientSecret', document.getElementById('traktClientSecretInput').value);
            localStorage.setItem('tmdbApiKey', document.getElementById('tmdbApiKeyInput').value);
        }

        // GRID ENGINE: Now includes logic to display images if they exist
        function renderAllGrids() {
            const uniqueMedia = [...new Map(mediaDatabase.map(item => [item.name, item])).values()];
            
            const createCard = (i) => `
                <div class="media-card">
                    ${i.posterPath ? `<img src="https://image.tmdb.org/t/p/w200${i.posterPath}" style="width:100%; border-radius:4px;">` : ''}
                    <p>${i.name}</p>
                </div>`;

            document.getElementById('cinemaDatabaseGrid').innerHTML = uniqueMedia.map(createCard).join('');
            document.getElementById('tvDatabaseGrid').innerHTML = uniqueMedia.filter(i => i.type === 'TV').map(createCard).join('');
            document.getElementById('moviesDatabaseGrid').innerHTML = uniqueMedia.filter(i => i.type === 'Movie').map(createCard).join('');
        }

               // REAL SCRAPER ENGINE: Actually fetches posters and refreshes the view
        window.repairExistingMediaMetadata = async function() {
            const statusLog = document.getElementById('traktStatusLog');
            const apiKey = localStorage.getItem('tmdbApiKey');
            if (!apiKey) { alert("Please enter your TMDB API Key!"); return; }

            statusLog.innerText = "Repairing Metadata (Please Wait)...";
            
            for (let item of mediaDatabase) {
                try {
                    const searchUrl = `https://api.themoviedb.org/3/search/tv?api_key=${apiKey}&query=${encodeURIComponent(item.name)}`;
                    const response = await fetch(searchUrl);
                    const data = await response.json();
                    if (data.results && data.results.length > 0) {
                        item.posterPath = data.results[0].poster_path;
                    }
                } catch (e) { console.error("Scrape failed", e); }
            }
            
            // SAVE AND REFRESH: This forces the app to update the database and the UI
            localStorage.setItem('vault_media_db', JSON.stringify(mediaDatabase));
            
            // Force a reload of the database from storage
            mediaDatabase = JSON.parse(localStorage.getItem('vault_media_db') || '[]');
            
            renderAllGrids();
            statusLog.innerText = "Status: Metadata Repaired!";
            alert("Library update complete!");
        };


        // LAUNCH SEQUENCE
        window.onload = () => {
            document.getElementById('traktClientIdInput').value = localStorage.getItem('traktClientId') || '';
            document.getElementById('traktClientSecretInput').value = localStorage.getItem('traktClientSecret') || '';
            document.getElementById('tmdbApiKeyInput').value = localStorage.getItem('tmdbApiKey') || '';
            renderAllGrids();
        };
    </script>


</body>
</html>
